<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Piazzetta – Campo dei Fiori</title>
  <meta name="theme-color" content="#4a7c59">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:       #4a7c59;
      --verde-scuro: #3a6347;
      --verde-light: #e8f4e0;
      --testo:       #222;
      --testo-muted: #888;
    }

    body { font-family: 'Nunito', sans-serif; background: #f0f4f0; color: var(--testo); padding-bottom: 160px; }

    /* ── Header ── */
    .top-header {
      background: var(--verde); color: #fff; display: flex; align-items: center;
      padding: 0 1rem; height: 56px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .top-header h1 { font-size: 1.1rem; font-weight: 800; flex: 1; text-align: center; }

    /* ── Feed ── */
    .feed { padding: 10px 12px; display: flex; flex-direction: column; gap: 12px; max-width: 640px; margin: 0 auto; }

    /* ── Post card ── */
    .post-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden; }
    .post-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px 8px; }
    .post-avatar {
      width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
      background: var(--verde-light); display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
    }
    .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .post-meta { flex: 1; min-width: 0; }
    .post-autore { font-size: 0.9rem; font-weight: 800; }
    .post-data   { font-size: 0.72rem; color: var(--testo-muted); margin-top: 1px; }
    .post-delete-btn {
      background: none; border: none; font-size: 1rem; cursor: pointer; opacity: 0.4; padding: 4px;
      border-radius: 8px; flex-shrink: 0; transition: opacity 0.15s, background 0.15s;
    }
    .post-delete-btn:hover { opacity: 1; background: #fdebd0; }
    .post-text { font-size: 0.95rem; line-height: 1.55; padding: 0 14px 10px; white-space: pre-wrap; word-break: break-word; }

    /* ── Media grid (feed) ── */
    .media-grid { display: grid; gap: 3px; }
    .media-grid.c1 { grid-template-columns: 1fr; }
    .media-grid.c2 { grid-template-columns: 1fr 1fr; }
    .media-grid.c3 { grid-template-columns: 1fr 1fr; }
    .media-grid.c3 .mgitem:first-child { grid-column: 1 / -1; }
    .media-grid.cmany { grid-template-columns: 1fr 1fr; }
    .mgitem { background: #000; position: relative; }
    .mgitem img, .mgitem video { width: 100%; display: block; object-fit: contain; height: auto; }
    .mgitem video { background: #000; }

    .audio-list { padding: 4px 14px; display: flex; flex-direction: column; gap: 6px; }
    .audio-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--verde-light); border-radius: 10px; padding: 7px 10px;
    }
    .audio-row .aico { font-size: 1.1rem; flex-shrink: 0; }
    .audio-row audio { flex: 1; height: 32px; min-width: 0; }

    /* ── Reactions ── */
    .post-reactions { display: flex; align-items: center; gap: 4px; padding: 8px 14px; flex-wrap: wrap; }
    .reaction-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: #f5f5f5; border: 1.5px solid #e8e8e8; border-radius: 20px; padding: 4px 10px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: background 0.15s, border-color 0.15s; color: var(--testo);
    }
    .reaction-btn.active { background: var(--verde-light); border-color: var(--verde); color: var(--verde-scuro); }
    .reaction-btn:hover  { background: var(--verde-light); }

    /* ── Comments ── */
    .post-footer { border-top: 1px solid #f0f0f0; padding: 8px 14px; display: flex; align-items: center; }
    .btn-comments {
      background: none; border: none; font-size: 0.82rem; font-weight: 700;
      color: var(--testo-muted); cursor: pointer; padding: 4px 0; transition: color 0.15s;
    }
    .btn-comments:hover { color: var(--verde); }
    .comments-section { padding: 0 14px 12px; display: none; }
    .comments-section.open { display: block; }
    .comment-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .comment-item { display: flex; gap: 8px; align-items: flex-start; }
    .comment-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: var(--verde-light); display: flex; align-items: center; justify-content: center; font-size: 1rem; overflow: hidden;
    }
    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-bubble { background: #f5f8f5; border-radius: 12px; padding: 7px 10px; flex: 1; min-width: 0; font-size: 0.85rem; }
    .comment-autore { font-weight: 800; font-size: 0.78rem; margin-bottom: 2px; }
    .comment-text   { color: #444; white-space: pre-wrap; word-break: break-word; }
    .comment-data   { font-size: 0.68rem; color: #bbb; margin-top: 3px; }

    /* comment media */
    .cmedia-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 6px; }
    .cmedia-grid.single { grid-template-columns: 1fr; }
    .cmedia-grid img  { width: 100%; border-radius: 8px; display: block; height: auto; object-fit: contain; }
    .cmedia-grid video { width: 100%; border-radius: 8px; display: block; height: auto; }
    .caudio-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .caudio-row  { display: flex; align-items: center; gap: 6px; background: var(--verde-light); border-radius: 8px; padding: 5px 8px; }
    .caudio-row audio { flex: 1; height: 28px; min-width: 0; }

    /* comment reactions */
    .comment-reactions { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
    .comment-reaction-btn {
      background: #eee; border: 1px solid #ddd; border-radius: 14px; padding: 2px 7px;
      font-size: 0.78rem; font-weight: 700; cursor: pointer; color: var(--testo); transition: background 0.12s;
    }
    .comment-reaction-btn.active { background: var(--verde-light); border-color: var(--verde); }

    /* comment input */
    .comment-input-wrap { display: flex; gap: 8px; align-items: flex-end; }
    .comment-input-inner { flex: 1; }
    .comment-textarea {
      width: 100%; border: 1.5px solid #ddd; border-radius: 12px;
      padding: 8px 10px; font-family: 'Nunito', sans-serif; font-size: 0.88rem;
      resize: none; outline: none; transition: border-color 0.15s; min-height: 36px; max-height: 120px;
    }
    .comment-textarea:focus { border-color: var(--verde); }
    .comment-media-btns { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .comment-media-btn {
      background: none; border: 1.5px solid #ddd; border-radius: 20px;
      padding: 3px 9px; font-size: 0.78rem; cursor: pointer; font-family: 'Nunito', sans-serif;
      transition: background 0.12s, border-color 0.12s;
    }
    .comment-media-btn:hover { background: var(--verde-light); border-color: var(--verde); }
    .comment-media-btn.recording { background: #ffe5e5; border-color: #e74c3c; color: #e74c3c; animation: pulse 1s infinite; }
    .comment-send-btn {
      background: var(--verde); color: #fff; border: none; border-radius: 12px;
      padding: 8px 14px; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
    }
    .comment-send-btn:hover { background: var(--verde-scuro); }

    /* ── Preview allegati (modal + commenti) ── */
    .preview-wrap { margin: 8px 0; }
    .preview-count { font-size: 0.78rem; color: var(--testo-muted); font-weight: 700; margin-bottom: 4px; }
    .preview-grid  { display: flex; flex-wrap: wrap; gap: 8px; }
    .prev-item     { position: relative; border-radius: 10px; overflow: visible; }
    .prev-item img, .prev-item video { display: block; width: 90px; height: auto; object-fit: contain; border-radius: 10px; background: #f0f0f0; }
    .prev-item.audio {
      display: flex; align-items: center; gap: 6px;
      background: var(--verde-light); border-radius: 10px; padding: 6px 10px; width: 100%;
    }
    .prev-item.audio .aico { font-size: 1.1rem; }
    .prev-item.audio audio { flex: 1; height: 30px; }
    .prev-item.audio .aname { font-size: 0.72rem; font-weight: 700; color: var(--verde-scuro); max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prev-remove {
      position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%;
      background: #e74c3c; color: #fff; border: none; font-size: 0.7rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; z-index: 5;
    }
    .prev-item.audio .prev-remove { position: static; flex-shrink: 0; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 80px; right: 18px; width: 56px; height: 56px;
      background: var(--verde); color: #fff; font-size: 1.8rem; border: none; border-radius: 50%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25); cursor: pointer; z-index: 200;
      display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.15s;
    }
    .fab:hover { background: var(--verde-scuro); transform: scale(1.08); }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 500;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 640px;
      padding: 20px 18px 24px; max-height: 90vh; overflow-y: auto;
      transform: translateY(100%); transition: transform 0.25s ease;
    }
    .modal-backdrop.open .modal-sheet { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .modal-title  { font-size: 1.05rem; font-weight: 800; }
    .modal-close  { background: #f0f0f0; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .form-textarea {
      width: 100%; border: 1.5px solid #ddd; border-radius: 12px;
      padding: 10px 12px; font-family: 'Nunito', sans-serif; font-size: 0.95rem;
      resize: none; outline: none; min-height: 100px; transition: border-color 0.15s;
    }
    .form-textarea:focus { border-color: var(--verde); }
    .media-btns { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 6px; }
    .media-btn {
      display: flex; align-items: center; gap: 5px; background: #f5f5f5; border: 1.5px solid #e0e0e0;
      border-radius: 20px; padding: 6px 14px; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .media-btn:hover { background: var(--verde-light); border-color: var(--verde); }
    .media-btn.recording { background: #ffe5e5; border-color: #e74c3c; color: #e74c3c; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }
    .upload-progress { height: 4px; background: #e0e0e0; border-radius: 2px; margin: 8px 0; display: none; }
    .upload-progress-bar { height: 100%; background: var(--verde); border-radius: 2px; transition: width 0.3s; }
    .btn-pubblica {
      width: 100%; background: var(--verde); color: #fff; border: none; border-radius: 14px;
      padding: 12px; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
      cursor: pointer; margin-top: 10px; transition: background 0.15s;
    }
    .btn-pubblica:hover:not(:disabled) { background: var(--verde-scuro); }
    .btn-pubblica:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 62px; background: #fff;
      border-top: 1px solid #e0e0e0; display: flex; align-items: stretch; z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.07);
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #999; font-size: 0.62rem; font-weight: 600; gap: 2px; }
    .nav-item.active { color: var(--verde); }
    .nav-item .nav-icon { font-size: 1.3rem; line-height: 1; }

    .spinner { width: 34px; height: 34px; border: 3px solid #eee; border-top-color: var(--verde); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 2.5rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-msg { color: var(--testo-muted); text-align: center; padding: 2rem; }
    .login-required { text-align: center; padding: 3rem 1rem; color: var(--testo-muted); }
    .login-required a { color: var(--verde); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>

  <header class="top-header">
    <h1>🏡 La Piazzetta</h1>
    <div id="nav-auth-slot"></div>
  </header>

  <div id="feed" class="feed"><div class="spinner"></div></div>

  <button class="fab" id="fab-new-post" title="Nuovo post" style="display:none">＋</button>

  <!-- Modal nuovo post -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">📝 Scrivi qualcosa…</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <textarea class="form-textarea" id="post-text" placeholder="Cosa vuoi condividere in piazzetta?" rows="4"></textarea>
      <div class="media-btns">
        <label class="media-btn">📷 Foto<input type="file" accept="image/*" id="input-foto" multiple style="display:none"></label>
        <label class="media-btn">🎬 Video<input type="file" accept="video/*" id="input-video" multiple style="display:none"></label>
        <button class="media-btn" id="btn-audio">🎙️ Registra</button>
        <label class="media-btn">🎵 Audio<input type="file" accept="audio/*,.mp3,.m4a,.wav,.ogg,.aac,.flac,.weba,.opus" id="input-audio-file" multiple style="display:none"></label>
      </div>
      <div id="post-preview"></div>
      <div class="upload-progress" id="upload-progress"><div class="upload-progress-bar" id="upload-bar" style="width:0%"></div></div>
      <button class="btn-pubblica" id="btn-pubblica">Pubblica</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><img src="https://res.cloudinary.com/dxqyprtzh/image/upload/v1780171524/viso_campo_brd2ic.webp" alt="" style="width:28px;height:28px;border-radius:50%;object-fit:cover;display:block;">Home</a>
    <a href="piazzetta.html" class="nav-item active"><span class="nav-icon">🏡</span>Piazzetta</a>
    <a href="comunita.html" class="nav-item"><span class="nav-icon">🏘️</span>Comunità</a>
    <a href="staff.html" class="nav-item"><span class="nav-icon">🤡</span>Staff</a>
    <a href="giornale.html" class="nav-item"><span class="nav-icon">📰</span>Giornale</a>
  </nav>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDoc, doc, updateDoc,
      query, orderBy, limit, serverTimestamp, onSnapshot, deleteDoc,
      increment, setDoc, arrayUnion, arrayRemove
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { setupNavAuth }      from './js/nav-auth.js';
    import { setupDocumentiNav } from './js/nav-docs.js';

    const firebaseConfig = {
      apiKey: "AIzaSyC18lzwqhYcW29TsEO6Oy4Bqvb2PMBUmAg",
      authDomain: "campo-dei-fiori.firebaseapp.com",
      projectId: "campo-dei-fiori",
      storageBucket: "campo-dei-fiori.firebasestorage.app",
      messagingSenderId: "928976798756",
      appId: "1:928976798756:web:1b90027ec9f03b203e44b1"
    };

    const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    const CLOUD_NAME   = 'dxqyprtzh';
    const CLOUD_PRESET = 'campo_dei_fiori';
    const ADMIN_UID    = 'mCSgNMVEphVIIf4HX0bkcKq2ZKv2';
    const EMOJIS       = ['❤️','😂','👏','🔥','😢'];
    const MAX_FILES    = 10;

    setupNavAuth('nav-auth-slot');
    setupDocumentiNav();

    let currentUser = null;
    let currentUserData = null;
    let isAdmin = false;

    // ── Auth ──────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, async user => {
      if (!user) {
        document.getElementById('feed').innerHTML =
          `<div class="login-required"><p>Devi essere loggato per vedere la Piazzetta.<br>
           <a href="login.html">Accedi →</a></p></div>`;
        return;
      }
      currentUser = user;
      isAdmin = user.uid === ADMIN_UID;
      try {
        let snap = await getDoc(doc(db, 'utenti', user.uid));
        if (!snap.exists()) snap = await getDoc(doc(db, 'staff', user.uid));
        if (snap.exists()) currentUserData = snap.data();
      } catch(_) {}
      document.getElementById('fab-new-post').style.display = 'flex';
      loadFeed();
    });

    // ── Cloudinary ────────────────────────────────────────────────────────
    async function uploadOne(file, type) {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLOUD_PRESET);
      const resType = type === 'image' ? 'image' : 'video'; // Cloudinary usa 'video' per audio e video
      const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resType}/upload`, { method:'POST', body:fd });
      const data = await res.json();
      if (!data.secure_url) throw new Error('Upload fallito: ' + (data.error?.message || file.name));
      return data.secure_url;
    }

    async function uploadAll(items, barEl, progEl) {
      if (progEl) progEl.style.display = 'block';
      let done = 0;
      const results = await Promise.all(
        items.map(item => uploadOne(item.file, item.type).then(url => {
          done++;
          if (barEl) barEl.style.width = Math.round(done / items.length * 100) + '%';
          return { url, type: item.type, name: item.name };
        }))
      );
      setTimeout(() => { if (progEl) progEl.style.display = 'none'; if (barEl) barEl.style.width = '0%'; }, 500);
      return results;
    }

    // ── Normalizza media (retrocompatibilità vecchi post con mediaUrl) ────
    function normalizeMedia(data) {
      if (Array.isArray(data.media) && data.media.length > 0) return data.media;
      if (data.mediaUrl) return [{ url: data.mediaUrl, type: data.mediaType || 'image', name: '' }];
      return [];
    }

    // ── Render griglia media (feed post) ─────────────────────────────────
    function renderMediaGrid(mediaList) {
      if (!mediaList.length) return '';
      const imgs   = mediaList.filter(m => m.type === 'image');
      const vids   = mediaList.filter(m => m.type === 'video');
      const audios = mediaList.filter(m => m.type === 'audio');
      const visual = [...imgs, ...vids];
      let html = '';

      if (visual.length) {
        const n = visual.length;
        const cls = n === 1 ? 'c1' : n === 2 ? 'c2' : n === 3 ? 'c3' : 'cmany';
        html += `<div class="media-grid ${cls}">`;
        visual.forEach(m => {
          html += `<div class="mgitem">`;
          if (m.type === 'image')
            html += `<img src="${esc(m.url)}" loading="lazy" alt="foto">`;
          else
            html += `<video src="${esc(m.url)}" controls playsinline></video>`;
          html += `</div>`;
        });
        html += `</div>`;
      }

      if (audios.length) {
        html += `<div class="audio-list">`;
        audios.forEach(m => {
          html += `<div class="audio-row"><span class="aico">🎵</span><audio src="${esc(m.url)}" controls></audio></div>`;
        });
        html += `</div>`;
      }
      return html;
    }

    // ── Render griglia media (commenti) ───────────────────────────────────
    function renderCommentMedia(data) {
      const list = normalizeMedia(data);
      if (!list.length) return '';
      const imgs   = list.filter(m => m.type === 'image');
      const vids   = list.filter(m => m.type === 'video');
      const audios = list.filter(m => m.type === 'audio');
      const visual = [...imgs, ...vids];
      let html = '';
      if (visual.length) {
        html += `<div class="cmedia-grid${visual.length === 1 ? ' single' : ''}">`;
        visual.forEach(m => {
          if (m.type === 'image') html += `<img src="${esc(m.url)}" loading="lazy">`;
          else html += `<video src="${esc(m.url)}" controls playsinline></video>`;
        });
        html += `</div>`;
      }
      if (audios.length) {
        html += `<div class="caudio-list">`;
        audios.forEach(m => {
          html += `<div class="caudio-row"><span>🎵</span><audio src="${esc(m.url)}" controls></audio></div>`;
        });
        html += `</div>`;
      }
      return html;
    }

    // ── Preview allegati (anteprima nel modal / commenti) ─────────────────
    // Renderizza la lista `items` nel container con id `containerId`.
    // `onRemove(idx)` viene chiamata quando l'utente clicca ✕.
    function renderPreview(items, containerId, onRemove) {
      const wrap = document.getElementById(containerId);
      if (!wrap) return;
      if (!items.length) { wrap.innerHTML = ''; return; }

      let html = `<div class="preview-wrap">
        <div class="preview-count">${items.length} allegat${items.length === 1 ? 'o' : 'i'}</div>
        <div class="preview-grid">`;

      items.forEach((item, idx) => {
        if (item.type === 'image') {
          html += `<div class="prev-item">
            <img src="${esc(item.previewUrl)}" alt="">
            <button class="prev-remove" data-idx="${idx}">✕</button>
          </div>`;
        } else if (item.type === 'video') {
          html += `<div class="prev-item">
            <video src="${esc(item.previewUrl)}" muted playsinline></video>
            <button class="prev-remove" data-idx="${idx}">✕</button>
          </div>`;
        } else {
          html += `<div class="prev-item audio">
            <span class="aico">🎵</span>
            <audio src="${esc(item.previewUrl)}" controls></audio>
            <span class="aname">${esc(item.name)}</span>
            <button class="prev-remove" data-idx="${idx}">✕</button>
          </div>`;
        }
      });

      html += `</div></div>`;
      wrap.innerHTML = html;

      // Attacca i listener DOPO aver impostato innerHTML
      wrap.querySelectorAll('.prev-remove').forEach(btn => {
        btn.addEventListener('click', () => onRemove(parseInt(btn.dataset.idx)));
      });
    }

    // ── Modal nuovo post ──────────────────────────────────────────────────
    // Array piatto degli allegati del post corrente.
    // Ogni elemento: { file: File, type: 'image'|'video'|'audio', name: string, previewUrl: string }
    const postItems = [];

    function postAddFile(file, type) {
      if (postItems.length >= MAX_FILES) { alert(`Massimo ${MAX_FILES} allegati per post.`); return; }
      postItems.push({ file, type, name: file.name || type, previewUrl: URL.createObjectURL(file) });
      redrawPostPreview();
    }

    function postRemoveFile(idx) {
      URL.revokeObjectURL(postItems[idx].previewUrl);
      postItems.splice(idx, 1);
      redrawPostPreview();
    }

    function postClear() {
      postItems.forEach(i => URL.revokeObjectURL(i.previewUrl));
      postItems.length = 0; // Svuota l'array mantenendo lo stesso riferimento
      redrawPostPreview();
    }

    function redrawPostPreview() {
      renderPreview(postItems, 'post-preview', postRemoveFile);
    }

    // Registrazione audio post
    let postRecorder = null, postAudioChunks = [], postRecording = false;

    const fab      = document.getElementById('fab-new-post');
    const backdrop = document.getElementById('modal-backdrop');

    fab.addEventListener('click', () => backdrop.classList.add('open'));
    document.getElementById('modal-close').addEventListener('click', closePostModal);
    backdrop.addEventListener('click', e => { if (e.target === backdrop) closePostModal(); });

    function closePostModal() {
      backdrop.classList.remove('open');
      document.getElementById('post-text').value = '';
      postClear();
      if (postRecording) stopPostRec();
    }

    document.getElementById('input-foto').addEventListener('change', e => {
      Array.from(e.target.files).forEach(f => postAddFile(f, 'image'));
      e.target.value = '';
    });
    document.getElementById('input-video').addEventListener('change', e => {
      Array.from(e.target.files).forEach(f => postAddFile(f, 'video'));
      e.target.value = '';
    });
    document.getElementById('input-audio-file').addEventListener('change', e => {
      Array.from(e.target.files).forEach(f => postAddFile(f, 'audio'));
      e.target.value = '';
    });

    const btnAudio = document.getElementById('btn-audio');
    btnAudio.addEventListener('click', async () => {
      if (postRecording) { stopPostRec(); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        postAudioChunks = [];
        postRecorder = new MediaRecorder(stream);
        postRecorder.ondataavailable = e => postAudioChunks.push(e.data);
        postRecorder.onstop = () => {
          const blob = new Blob(postAudioChunks, { type: 'audio/webm' });
          postAddFile(new File([blob], `rec_${Date.now()}.webm`, { type: 'audio/webm' }), 'audio');
          stream.getTracks().forEach(t => t.stop());
        };
        postRecorder.start();
        postRecording = true;
        btnAudio.textContent = '⏹️ Stop'; btnAudio.classList.add('recording');
      } catch(err) { alert('Microfono non disponibile: ' + err.message); }
    });

    function stopPostRec() {
      if (postRecorder && postRecording) {
        postRecorder.stop(); postRecording = false;
        btnAudio.textContent = '🎙️ Registra'; btnAudio.classList.remove('recording');
      }
    }

    document.getElementById('btn-pubblica').addEventListener('click', async () => {
      if (!currentUser) return;
      const text = document.getElementById('post-text').value.trim();
      if (!text && postItems.length === 0) { alert('Scrivi qualcosa o aggiungi un allegato!'); return; }

      const btn = document.getElementById('btn-pubblica');
      btn.disabled = true; btn.textContent = 'Pubblicazione…';

      try {
        // Copia l'array prima dell'upload (evita race condition se l'utente aggiunge file durante l'upload)
        const itemsToUpload = [...postItems];
        const barEl  = document.getElementById('upload-bar');
        const progEl = document.getElementById('upload-progress');
        const media  = itemsToUpload.length ? await uploadAll(itemsToUpload, barEl, progEl) : [];

        const nome = currentUserData?.nome || currentUser.displayName || 'Anonimo';
        const foto = currentUserData?.fotoProfilo || null;

        await addDoc(collection(db, 'piazzetta_posts'), {
          authorId:      currentUser.uid,
          authorName:    nome,
          authorPhoto:   foto,
          text:          text,
          media:         media,   // Array completo: [{url, type, name}, ...]
          timestamp:     serverTimestamp(),
          reactions:     {},
          commentsCount: 0,
        });
        closePostModal();
      } catch(err) {
        alert('Errore: ' + err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Pubblica';
      }
    });

    // ── Feed ──────────────────────────────────────────────────────────────
    function loadFeed() {
      const feedEl = document.getElementById('feed');
      feedEl.innerHTML = '<div class="spinner"></div>';
      const q = query(collection(db, 'piazzetta_posts'), orderBy('timestamp', 'desc'), limit(40));
      onSnapshot(q, snap => {
        feedEl.innerHTML = '';
        if (snap.empty) { feedEl.innerHTML = '<p class="empty-msg">Ancora nessun post. Sii il primo a scrivere! ☀️</p>'; return; }
        snap.forEach(d => feedEl.appendChild(buildPostCard(d.id, d.data())));
      }, err => { feedEl.innerHTML = '<p class="empty-msg">Errore caricamento.</p>'; console.error(err); });
    }

    function fmtDate(ts) {
      if (!ts?.toDate) return '';
      const d = ts.toDate();
      return d.toLocaleDateString('it-IT', { day:'numeric', month:'long' }) +
             ' · ' + d.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
    }

    function buildPostCard(postId, data) {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.dataset.postId = postId;

      const avatar = data.authorPhoto
        ? `<div class="post-avatar"><img src="${esc(data.authorPhoto)}" alt=""></div>`
        : `<div class="post-avatar">🧒</div>`;

      const mediaHtml = renderMediaGrid(normalizeMedia(data));

      const reactHtml = EMOJIS.map(emoji => {
        const cnt = (data.reactions || {})[emoji] || 0;
        return `<button class="reaction-btn" data-emoji="${emoji}" onclick="toggleReaction('${postId}','${emoji}',this)">${emoji}${cnt > 0 ? ' <span>' + cnt + '</span>' : ''}</button>`;
      }).join('');

      const canDel = isAdmin || (currentUser && currentUser.uid === data.authorId);
      const commCnt = data.commentsCount || 0;

      card.innerHTML = `
        <div class="post-header">
          ${avatar}
          <div class="post-meta">
            <div class="post-autore">${esc(data.authorName || 'Anonimo')}</div>
            <div class="post-data">${fmtDate(data.timestamp)}</div>
          </div>
          <button class="post-delete-btn" style="${canDel ? '' : 'display:none'}" onclick="deletePost('${postId}',this)">🗑️</button>
        </div>
        ${data.text ? `<div class="post-text">${esc(data.text)}</div>` : ''}
        ${mediaHtml}
        <div class="post-reactions">${reactHtml}</div>
        <div class="post-footer">
          <button class="btn-comments" onclick="toggleComments('${postId}')">💬 ${commCnt > 0 ? commCnt + ' commenti' : 'Commenta'}</button>
        </div>
        <div class="comments-section" id="cs-${postId}"></div>`;

      return card;
    }

    // ── Reactions ─────────────────────────────────────────────────────────
    window.toggleReaction = async (postId, emoji, btn) => {
      if (!currentUser) { alert('Fai il login per reagire!'); return; }
      const pRef = doc(db, 'piazzetta_posts', postId);
      const uRef = doc(db, 'piazzetta_posts', postId, 'user_reactions', currentUser.uid);
      try {
        const uSnap = await getDoc(uRef);
        const mine  = uSnap.exists() ? (uSnap.data().emojis || []) : [];
        if (mine.includes(emoji)) {
          await updateDoc(pRef, { [`reactions.${emoji}`]: increment(-1) });
          uSnap.exists() && await updateDoc(uRef, { emojis: arrayRemove(emoji) });
          btn.classList.remove('active');
          adjCount(btn, -1);
        } else {
          await updateDoc(pRef, { [`reactions.${emoji}`]: increment(1) });
          uSnap.exists() ? await updateDoc(uRef, { emojis: arrayUnion(emoji) }) : await setDoc(uRef, { emojis: [emoji] });
          btn.classList.add('active');
          adjCount(btn, 1);
        }
      } catch(err) { console.error(err); }
    };

    function adjCount(btn, delta) {
      let span = btn.querySelector('span');
      if (!span) { btn.append(' '); span = document.createElement('span'); btn.append(span); span.textContent = '0'; }
      const next = parseInt(span.textContent || '0') + delta;
      if (next <= 0) { const tn = span.previousSibling; tn && btn.removeChild(tn); btn.removeChild(span); }
      else span.textContent = next;
    }

    // ── Delete post ───────────────────────────────────────────────────────
    window.deletePost = async (postId, btn) => {
      if (!confirm('Eliminare questo post?')) return;
      try { await deleteDoc(doc(db, 'piazzetta_posts', postId)); btn.closest('.post-card')?.remove(); }
      catch(err) { alert(err.message); }
    };

    // ── Comments ──────────────────────────────────────────────────────────
    const loadedCs = new Set();

    window.toggleComments = async postId => {
      const sec = document.getElementById(`cs-${postId}`);
      if (!sec) return;
      const open = sec.classList.toggle('open');
      if (open && !loadedCs.has(postId)) { loadedCs.add(postId); loadComments(postId, sec); }
    };

    function loadComments(postId, sec) {
      sec.innerHTML = '<div style="color:#aaa;font-size:0.82rem;padding:4px 0">Caricamento…</div>';
      const q = query(collection(db, 'piazzetta_posts', postId, 'comments'), orderBy('timestamp', 'asc'));
      onSnapshot(q, snap => {
        const list = document.createElement('div');
        list.className = 'comment-list';
        snap.forEach(d => list.appendChild(buildCommentEl(postId, d.id, d.data())));
        const existing = sec.querySelector('.comment-input-wrap');
        sec.innerHTML = '';
        sec.appendChild(list);
        sec.appendChild(existing || buildCommentInput(postId));
      }, err => { sec.innerHTML = `<p style="color:#e74c3c;font-size:0.82rem">${err.message}</p>`; });
    }

    function buildCommentEl(postId, commentId, data) {
      const el = document.createElement('div');
      el.className = 'comment-item';
      const avatar = data.authorPhoto
        ? `<div class="comment-avatar"><img src="${esc(data.authorPhoto)}" alt=""></div>`
        : `<div class="comment-avatar">🧒</div>`;
      const mediaHtml = renderCommentMedia(data);
      const reactHtml = EMOJIS.map(emoji => {
        const cnt = (data.reactions || {})[emoji] || 0;
        return `<button class="comment-reaction-btn" data-emoji="${emoji}" onclick="toggleCR('${postId}','${commentId}','${emoji}',this)">${emoji}${cnt > 0 ? ' ' + cnt : ''}</button>`;
      }).join('');
      const canDel = isAdmin || (currentUser && currentUser.uid === data.authorId);
      el.innerHTML = `${avatar}
        <div class="comment-bubble">
          <div class="comment-autore">${esc(data.authorName || 'Anonimo')}</div>
          ${data.text ? `<div class="comment-text">${esc(data.text)}</div>` : ''}
          ${mediaHtml}
          <div class="comment-reactions">${reactHtml}</div>
          <div class="comment-data">${fmtDate(data.timestamp)}${canDel ? ` <button onclick="deleteComment('${postId}','${commentId}',this)" style="margin-left:8px;background:none;border:none;cursor:pointer;font-size:0.75rem;color:#ccc;">✕</button>` : ''}</div>
        </div>`;
      return el;
    }

    window.toggleCR = async (postId, commentId, emoji, btn) => {
      if (!currentUser) return;
      const ref = doc(db, 'piazzetta_posts', postId, 'comments', commentId);
      try {
        const snap = await getDoc(ref);
        const cur  = ((snap.data()?.reactions) || {})[emoji] || 0;
        await updateDoc(ref, { [`reactions.${emoji}`]: increment(1) });
        btn.classList.add('active');
        btn.textContent = emoji + ' ' + (cur + 1);
      } catch(err) { console.error(err); }
    };

    window.deleteComment = async (postId, commentId, btn) => {
      if (!confirm('Eliminare commento?')) return;
      try {
        await deleteDoc(doc(db, 'piazzetta_posts', postId, 'comments', commentId));
        await updateDoc(doc(db, 'piazzetta_posts', postId), { commentsCount: increment(-1) });
        btn.closest('.comment-item')?.remove();
      } catch(err) { alert(err.message); }
    };

    // ── Comment input ─────────────────────────────────────────────────────
    function buildCommentInput(postId) {
      // Array locale degli allegati del commento.
      // È un semplice array mutato direttamente — nessuna factory, nessuna closure extra.
      const cItems = [];
      const previewId = `cprev-${postId}-${Date.now()}`;

      let cRec = null, cAudioChunks = [], cRecording = false;

      const wrap = document.createElement('div');
      wrap.className = 'comment-input-wrap';

      wrap.innerHTML = `
        <div class="comment-input-inner">
          <textarea class="comment-textarea" placeholder="Scrivi un commento…" rows="1"></textarea>
          <div class="comment-media-btns">
            <label class="comment-media-btn">📷<input type="file" accept="image/*" multiple style="display:none" class="ci-foto"></label>
            <label class="comment-media-btn">🎬<input type="file" accept="video/*" multiple style="display:none" class="ci-vid"></label>
            <button class="comment-media-btn ci-rec">🎙️</button>
            <label class="comment-media-btn">🎵<input type="file" accept="audio/*,.mp3,.m4a,.wav,.ogg,.aac,.flac,.weba,.opus" multiple style="display:none" class="ci-aud"></label>
          </div>
          <div id="${previewId}"></div>
        </div>
        <button class="comment-send-btn">Invia</button>`;

      const textarea = wrap.querySelector('.comment-textarea');
      const recBtn   = wrap.querySelector('.ci-rec');
      const sendBtn  = wrap.querySelector('.comment-send-btn');

      textarea.addEventListener('input', () => { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; });

      function cAddFile(file, type) {
        if (cItems.length >= MAX_FILES) { alert(`Massimo ${MAX_FILES} allegati.`); return; }
        cItems.push({ file, type, name: file.name || type, previewUrl: URL.createObjectURL(file) });
        cRedraw();
      }

      function cRemoveFile(idx) {
        URL.revokeObjectURL(cItems[idx].previewUrl);
        cItems.splice(idx, 1);
        cRedraw();
      }

      function cRedraw() { renderPreview(cItems, previewId, cRemoveFile); }

      wrap.querySelector('.ci-foto').addEventListener('change', e => { Array.from(e.target.files).forEach(f => cAddFile(f, 'image')); e.target.value = ''; });
      wrap.querySelector('.ci-vid').addEventListener('change',  e => { Array.from(e.target.files).forEach(f => cAddFile(f, 'video')); e.target.value = ''; });
      wrap.querySelector('.ci-aud').addEventListener('change',  e => { Array.from(e.target.files).forEach(f => cAddFile(f, 'audio')); e.target.value = ''; });

      recBtn.addEventListener('click', async () => {
        if (cRecording) {
          cRec.stop(); cRecording = false;
          recBtn.textContent = '🎙️'; recBtn.classList.remove('recording'); return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          cAudioChunks = [];
          cRec = new MediaRecorder(stream);
          cRec.ondataavailable = e => cAudioChunks.push(e.data);
          cRec.onstop = () => {
            const blob = new Blob(cAudioChunks, { type: 'audio/webm' });
            cAddFile(new File([blob], `rec_${Date.now()}.webm`, { type: 'audio/webm' }), 'audio');
            stream.getTracks().forEach(t => t.stop());
          };
          cRec.start(); cRecording = true;
          recBtn.textContent = '⏹️'; recBtn.classList.add('recording');
        } catch(err) { alert('Microfono non disponibile'); }
      });

      sendBtn.addEventListener('click', async () => {
        if (!currentUser) { alert('Fai il login!'); return; }
        const text = textarea.value.trim();
        if (!text && cItems.length === 0) return;

        sendBtn.disabled = true; sendBtn.textContent = '…';
        try {
          // Copia snapshot dell'array prima dell'upload
          const snapshot = [...cItems];
          const media = snapshot.length
            ? await Promise.all(snapshot.map(item => uploadOne(item.file, item.type).then(url => ({ url, type: item.type, name: item.name }))))
            : [];

          const nome = currentUserData?.nome || currentUser.displayName || 'Anonimo';
          const foto = currentUserData?.fotoProfilo || null;

          await addDoc(collection(db, 'piazzetta_posts', postId, 'comments'), {
            authorId: currentUser.uid, authorName: nome, authorPhoto: foto,
            text, media,
            timestamp: serverTimestamp(), reactions: {},
          });
          await updateDoc(doc(db, 'piazzetta_posts', postId), { commentsCount: increment(1) });

          textarea.value = ''; textarea.style.height = 'auto';
          cItems.forEach(i => URL.revokeObjectURL(i.previewUrl));
          cItems.length = 0; cRedraw();

          const footerBtn = wrap.closest('.post-card')?.querySelector('.btn-comments');
          if (footerBtn) {
            const cur = parseInt(footerBtn.textContent.match(/\d+/)?.[0] || '0');
            footerBtn.textContent = `💬 ${cur + 1} commenti`;
          }
        } catch(err) { alert('Errore: ' + err.message); }
        finally { sendBtn.disabled = false; sendBtn.textContent = 'Invia'; }
      });

      return wrap;
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
