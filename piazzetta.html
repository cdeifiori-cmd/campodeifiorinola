<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Piazzetta – Campo dei Fiori</title>
  <meta name="theme-color" content="#4a7c59">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:       #4a7c59;
      --verde-scuro: #3a6347;
      --verde-light: #e8f4e0;
      --testo:       #222;
      --testo-muted: #888;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #f0f4f0;
      color: var(--testo);
      padding-bottom: 160px;
    }

    /* ── Header ── */
    .top-header {
      background: var(--verde); color: #fff;
      display: flex; align-items: center;
      padding: 0 1rem; height: 56px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .top-header h1 { font-size: 1.1rem; font-weight: 800; flex: 1; text-align: center; }

    /* ── Feed ── */
    .feed { padding: 10px 12px; display: flex; flex-direction: column; gap: 12px; max-width: 640px; margin: 0 auto; }

    /* ── Post card ── */
    .post-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden; }
    .post-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px 8px; }
    .post-avatar {
      width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
      background: var(--verde-light); display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
    }
    .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .post-meta { flex: 1; min-width: 0; }
    .post-autore { font-size: 0.9rem; font-weight: 800; }
    .post-data   { font-size: 0.72rem; color: var(--testo-muted); margin-top: 1px; }
    .post-delete-btn {
      background: none; border: none; font-size: 1rem; cursor: pointer;
      opacity: 0.4; padding: 4px; border-radius: 8px; flex-shrink: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .post-delete-btn:hover { opacity: 1; background: #fdebd0; }
    .post-text { font-size: 0.95rem; line-height: 1.55; padding: 0 14px 10px; white-space: pre-wrap; word-break: break-word; }

    /* ── Media grid (post feed) ── */
    .media-grid {
      display: grid; gap: 3px;
      margin-bottom: 2px;
    }
    .media-grid.count-1 { grid-template-columns: 1fr; }
    .media-grid.count-2 { grid-template-columns: 1fr 1fr; }
    .media-grid.count-3 { grid-template-columns: 1fr 1fr; }
    .media-grid.count-3 .media-grid-item:first-child { grid-column: 1 / -1; }
    .media-grid.count-4,
    .media-grid.count-many { grid-template-columns: 1fr 1fr; }

    .media-grid-item { position: relative; overflow: hidden; background: #000; }
    .media-grid-item img,
    .media-grid-item video {
      width: 100%; display: block; object-fit: cover;
      max-height: 320px; min-height: 120px;
    }
    .media-grid.count-1 .media-grid-item img,
    .media-grid.count-1 .media-grid-item video { max-height: 420px; }

    .media-audio-row {
      padding: 4px 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .audio-player-wrap {
      display: flex; align-items: center; gap: 8px;
      background: var(--verde-light); border-radius: 10px;
      padding: 7px 10px;
    }
    .audio-player-wrap .audio-icon { font-size: 1.1rem; flex-shrink: 0; }
    .audio-player-wrap audio { flex: 1; height: 32px; min-width: 0; }
    .audio-player-wrap .audio-name {
      font-size: 0.72rem; color: var(--verde-scuro); font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;
    }

    /* ── Reactions ── */
    .post-reactions { display: flex; align-items: center; gap: 4px; padding: 8px 14px; flex-wrap: wrap; }
    .reaction-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: #f5f5f5; border: 1.5px solid #e8e8e8;
      border-radius: 20px; padding: 4px 10px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s, border-color 0.15s; color: var(--testo);
    }
    .reaction-btn.active { background: var(--verde-light); border-color: var(--verde); color: var(--verde-scuro); }
    .reaction-btn:hover  { background: var(--verde-light); }

    /* ── Comments toggle ── */
    .post-footer { border-top: 1px solid #f0f0f0; padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
    .btn-comments {
      background: none; border: none; font-size: 0.82rem; font-weight: 700;
      color: var(--testo-muted); cursor: pointer; display: flex; align-items: center; gap: 4px;
      padding: 4px 0; transition: color 0.15s;
    }
    .btn-comments:hover { color: var(--verde); }

    /* ── Comments section ── */
    .comments-section { padding: 0 14px 12px; display: none; }
    .comments-section.open { display: block; }
    .comment-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .comment-item { display: flex; gap: 8px; align-items: flex-start; }
    .comment-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: var(--verde-light); display: flex; align-items: center; justify-content: center; font-size: 1rem; overflow: hidden;
    }
    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-bubble { background: #f5f8f5; border-radius: 12px; padding: 7px 10px; flex: 1; min-width: 0; font-size: 0.85rem; }
    .comment-autore { font-weight: 800; font-size: 0.78rem; margin-bottom: 2px; }
    .comment-text   { color: #444; white-space: pre-wrap; word-break: break-word; }
    .comment-data   { font-size: 0.68rem; color: #bbb; margin-top: 3px; }

    /* comment media */
    .comment-media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 6px; }
    .comment-media-grid.single { grid-template-columns: 1fr; }
    .comment-media-grid img { width: 100%; border-radius: 8px; display: block; max-height: 180px; object-fit: cover; }
    .comment-media-grid video { width: 100%; border-radius: 8px; display: block; max-height: 180px; }
    .comment-audio-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .comment-audio-item { display: flex; align-items: center; gap: 6px; background: var(--verde-light); border-radius: 8px; padding: 5px 8px; }
    .comment-audio-item audio { flex: 1; height: 28px; min-width: 0; }

    /* comment reactions */
    .comment-reactions { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
    .comment-reaction-btn {
      background: #eee; border: 1px solid #ddd; border-radius: 14px; padding: 2px 7px;
      font-size: 0.78rem; font-weight: 700; cursor: pointer; color: var(--testo); transition: background 0.12s;
    }
    .comment-reaction-btn.active { background: var(--verde-light); border-color: var(--verde); }

    /* comment input */
    .comment-input-wrap { display: flex; gap: 8px; align-items: flex-end; }
    .comment-input-inner { flex: 1; }
    .comment-textarea {
      width: 100%; border: 1.5px solid #ddd; border-radius: 12px;
      padding: 8px 10px; font-family: 'Nunito', sans-serif; font-size: 0.88rem;
      resize: none; outline: none; transition: border-color 0.15s; min-height: 36px; max-height: 120px;
    }
    .comment-textarea:focus { border-color: var(--verde); }
    .comment-media-btns { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .comment-media-btn {
      background: none; border: 1.5px solid #ddd; border-radius: 20px;
      padding: 3px 9px; font-size: 0.78rem; cursor: pointer;
      transition: background 0.12s, border-color 0.12s; font-family: 'Nunito', sans-serif;
    }
    .comment-media-btn:hover { background: var(--verde-light); border-color: var(--verde); }
    .comment-media-btn.recording { background: #ffe5e5; border-color: #e74c3c; color: #e74c3c; animation: pulse 1s infinite; }
    .comment-send-btn {
      background: var(--verde); color: #fff; border: none; border-radius: 12px;
      padding: 8px 14px; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
    }
    .comment-send-btn:hover { background: var(--verde-scuro); }

    /* ── Preview griglia allegati ── */
    .preview-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin: 8px 0;
    }
    .preview-item {
      position: relative; border-radius: 10px; overflow: visible;
      background: #f0f0f0;
    }
    .preview-item img,
    .preview-item video { display: block; width: 100px; height: 80px; object-fit: cover; border-radius: 10px; }
    .preview-item.audio-item {
      display: flex; align-items: center; gap: 6px;
      background: var(--verde-light); border-radius: 10px; padding: 6px 10px;
      width: 100%;
    }
    .preview-item.audio-item .audio-icon { font-size: 1.2rem; }
    .preview-item.audio-item audio { flex: 1; height: 32px; }
    .preview-item.audio-item .audio-fname { font-size: 0.75rem; font-weight: 700; color: var(--verde-scuro); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preview-remove {
      position: absolute; top: -6px; right: -6px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #e74c3c; color: #fff; border: none;
      font-size: 0.7rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1; z-index: 5;
    }
    .preview-item.audio-item .preview-remove { position: static; flex-shrink: 0; }
    .preview-count { font-size: 0.78rem; color: var(--testo-muted); font-weight: 700; margin-bottom: 2px; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 80px; right: 18px;
      width: 56px; height: 56px; background: var(--verde); color: #fff;
      font-size: 1.8rem; border: none; border-radius: 50%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25); cursor: pointer; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.15s;
    }
    .fab:hover { background: var(--verde-scuro); transform: scale(1.08); }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 500; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: #fff; border-radius: 20px 20px 0 0;
      width: 100%; max-width: 640px; padding: 20px 18px 24px;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(100%); transition: transform 0.25s ease;
    }
    .modal-backdrop.open .modal-sheet { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .modal-title { font-size: 1.05rem; font-weight: 800; }
    .modal-close {
      background: #f0f0f0; border: none; border-radius: 50%;
      width: 32px; height: 32px; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .form-textarea {
      width: 100%; border: 1.5px solid #ddd; border-radius: 12px;
      padding: 10px 12px; font-family: 'Nunito', sans-serif; font-size: 0.95rem;
      resize: none; outline: none; min-height: 100px; transition: border-color 0.15s;
    }
    .form-textarea:focus { border-color: var(--verde); }
    .media-btns { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 6px; }
    .media-btn {
      display: flex; align-items: center; gap: 5px;
      background: #f5f5f5; border: 1.5px solid #e0e0e0; border-radius: 20px;
      padding: 6px 14px; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .media-btn:hover { background: var(--verde-light); border-color: var(--verde); }
    .media-btn.recording { background: #ffe5e5; border-color: #e74c3c; color: #e74c3c; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    .upload-progress { height: 4px; background: #e0e0e0; border-radius: 2px; margin: 8px 0; display: none; }
    .upload-progress-bar { height: 100%; background: var(--verde); border-radius: 2px; transition: width 0.3s; }
    .btn-pubblica {
      width: 100%; background: var(--verde); color: #fff; border: none; border-radius: 14px;
      padding: 12px; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
      cursor: pointer; margin-top: 10px; transition: background 0.15s;
    }
    .btn-pubblica:hover:not(:disabled) { background: var(--verde-scuro); }
    .btn-pubblica:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 62px; background: #fff;
      border-top: 1px solid #e0e0e0; display: flex; align-items: stretch; z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.07);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-decoration: none; color: #999; font-size: 0.62rem; font-weight: 600; gap: 2px;
    }
    .nav-item.active { color: var(--verde); }
    .nav-item .nav-icon { font-size: 1.3rem; line-height: 1; }

    .spinner { width: 34px; height: 34px; border: 3px solid #eee; border-top-color: var(--verde); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 2.5rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-msg { color: var(--testo-muted); text-align: center; padding: 2rem; }
    .login-required { text-align: center; padding: 3rem 1rem; color: var(--testo-muted); }
    .login-required a { color: var(--verde); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>

  <header class="top-header">
    <h1>🏡 La Piazzetta</h1>
    <div id="nav-auth-slot"></div>
  </header>

  <div id="feed" class="feed"><div class="spinner"></div></div>

  <button class="fab" id="fab-new-post" title="Nuovo post" style="display:none">＋</button>

  <!-- Modal nuovo post -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-sheet" id="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">📝 Scrivi qualcosa…</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <textarea class="form-textarea" id="post-text" placeholder="Cosa vuoi condividere in piazzetta?" rows="4"></textarea>
      <div class="media-btns">
        <label class="media-btn">
          📷 Foto
          <input type="file" accept="image/*" id="input-foto" multiple style="display:none">
        </label>
        <label class="media-btn">
          🎬 Video
          <input type="file" accept="video/*" id="input-video" multiple style="display:none">
        </label>
        <button class="media-btn" id="btn-audio">🎙️ Registra</button>
        <label class="media-btn">
          🎵 Allega audio
          <input type="file" accept="audio/*,.mp3,.m4a,.wav,.ogg,.aac,.flac,.weba,.opus" id="input-audio-file" multiple style="display:none">
        </label>
      </div>
      <div id="post-preview-wrap"></div>
      <div class="upload-progress" id="upload-progress">
        <div class="upload-progress-bar" id="upload-bar" style="width:0%"></div>
      </div>
      <button class="btn-pubblica" id="btn-pubblica">Pubblica</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><img src="https://res.cloudinary.com/dxqyprtzh/image/upload/v1780171524/viso_campo_brd2ic.webp" alt="" style="width:28px;height:28px;border-radius:50%;object-fit:cover;display:block;">Home</a>
    <a href="piazzetta.html" class="nav-item active"><span class="nav-icon">🏡</span>Piazzetta</a>
    <a href="comunita.html" class="nav-item"><span class="nav-icon">🏘️</span>Comunità</a>
    <a href="staff.html" class="nav-item"><span class="nav-icon">🤡</span>Staff</a>
    <a href="giornale.html" class="nav-item"><span class="nav-icon">📰</span>Giornale</a>
  </nav>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc,
      query, orderBy, limit, serverTimestamp, onSnapshot, deleteDoc,
      increment, setDoc, arrayUnion, arrayRemove
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { setupNavAuth }      from './js/nav-auth.js';
    import { setupDocumentiNav } from './js/nav-docs.js';

    const firebaseConfig = {
      apiKey: "AIzaSyC18lzwqhYcW29TsEO6Oy4Bqvb2PMBUmAg",
      authDomain: "campo-dei-fiori.firebaseapp.com",
      projectId: "campo-dei-fiori",
      storageBucket: "campo-dei-fiori.firebasestorage.app",
      messagingSenderId: "928976798756",
      appId: "1:928976798756:web:1b90027ec9f03b203e44b1"
    };

    const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    const CLOUD_NAME   = 'dxqyprtzh';
    const CLOUD_PRESET = 'campo_dei_fiori';
    const ADMIN_UID    = 'mCSgNMVEphVIIf4HX0bkcKq2ZKv2';
    const EMOJIS       = ['❤️','😂','👏','🔥','😢'];
    const MAX_FILES    = 10;

    setupNavAuth('nav-auth-slot');
    setupDocumentiNav();

    let currentUser = null;
    let currentUserData = null;
    let isAdmin = false;

    // ── Auth ──────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, async user => {
      if (!user) {
        document.getElementById('feed').innerHTML =
          `<div class="login-required"><p>Devi essere loggato per vedere la Piazzetta.<br>
           <a href="login.html">Accedi →</a></p></div>`;
        return;
      }
      currentUser = user;
      isAdmin = user.uid === ADMIN_UID;
      try {
        let snap = await getDoc(doc(db, 'utenti', user.uid));
        if (!snap.exists()) snap = await getDoc(doc(db, 'staff', user.uid));
        if (snap.exists()) currentUserData = snap.data();
      } catch(_) {}
      document.getElementById('fab-new-post').style.display = 'flex';
      loadFeed();
    });

    // ── Cloudinary upload ─────────────────────────────────────────────────
    function cloudResourceType(type) {
      return type === 'image' ? 'image' : 'video'; // Cloudinary usa 'video' per audio e video
    }

    async function uploadOne(file, type, onProgress) {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLOUD_PRESET);
      const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${cloudResourceType(type)}/upload`;
      onProgress?.(30);
      const res  = await fetch(url, { method: 'POST', body: fd });
      onProgress?.(90);
      const data = await res.json();
      onProgress?.(100);
      if (!data.secure_url) throw new Error(`Upload fallito per ${file.name}`);
      return data.secure_url;
    }

    async function uploadAll(items, progressEl, barEl) {
      if (progressEl) progressEl.style.display = 'block';
      const total = items.length;
      let done = 0;
      const results = await Promise.all(items.map(item =>
        uploadOne(item.file, item.type, pct => {
          if (barEl) barEl.style.width = Math.round((done / total + pct / 100 / total) * 100) + '%';
        }).then(url => {
          done++;
          if (barEl) barEl.style.width = Math.round(done / total * 100) + '%';
          return { url, type: item.type, name: item.name };
        })
      ));
      setTimeout(() => {
        if (progressEl) progressEl.style.display = 'none';
        if (barEl) barEl.style.width = '0%';
      }, 600);
      return results;
    }

    // ── Media items list (shared helper) ─────────────────────────────────
    // item = { file, type:'image'|'video'|'audio', name, previewUrl }

    function makeMediaManager(previewContainerId, counterId) {
      const items = []; // { file, type, name, previewUrl }

      function add(file, type) {
        if (items.length >= MAX_FILES) {
          alert(`Puoi allegare al massimo ${MAX_FILES} file per post.`);
          return false;
        }
        const previewUrl = URL.createObjectURL(file);
        const name = file.name || `${type}_${Date.now()}`;
        items.push({ file, type, name, previewUrl });
        render();
        return true;
      }

      function remove(idx) {
        URL.revokeObjectURL(items[idx].previewUrl);
        items.splice(idx, 1);
        render();
      }

      function clear() {
        items.forEach(i => URL.revokeObjectURL(i.previewUrl));
        items.length = 0;
        render();
      }

      function render() {
        const wrap = document.getElementById(previewContainerId);
        if (!wrap) return;
        if (!items.length) { wrap.innerHTML = ''; return; }
        let html = `<div class="preview-count">${items.length} allegat${items.length === 1 ? 'o' : 'i'}</div><div class="preview-grid">`;
        items.forEach((item, idx) => {
          if (item.type === 'image') {
            html += `<div class="preview-item">
              <img src="${item.previewUrl}" alt="${escHtml(item.name)}">
              <button class="preview-remove" data-idx="${idx}" title="Rimuovi">✕</button>
            </div>`;
          } else if (item.type === 'video') {
            html += `<div class="preview-item">
              <video src="${item.previewUrl}" muted></video>
              <button class="preview-remove" data-idx="${idx}" title="Rimuovi">✕</button>
            </div>`;
          } else {
            html += `<div class="preview-item audio-item">
              <span class="audio-icon">🎵</span>
              <audio src="${item.previewUrl}" controls></audio>
              <span class="audio-fname">${escHtml(item.name)}</span>
              <button class="preview-remove" data-idx="${idx}" title="Rimuovi">✕</button>
            </div>`;
          }
        });
        html += '</div>';
        wrap.innerHTML = html;
        wrap.querySelectorAll('.preview-remove').forEach(btn => {
          btn.addEventListener('click', () => remove(parseInt(btn.dataset.idx)));
        });
      }

      return { items, add, remove, clear, render };
    }

    // ── Modal nuovo post ──────────────────────────────────────────────────
    let postMediaMgr = makeMediaManager('post-preview-wrap');
    let postRecorder = null;
    let postAudioChunks = [];
    let postRecording = false;

    const fab      = document.getElementById('fab-new-post');
    const backdrop = document.getElementById('modal-backdrop');
    const btnClose = document.getElementById('modal-close');

    fab.addEventListener('click', () => {
      // Re-create manager each time modal opens to have fresh state
      postMediaMgr = makeMediaManager('post-preview-wrap');
      backdrop.classList.add('open');
    });
    btnClose.addEventListener('click', closeModal);
    backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });

    function closeModal() {
      backdrop.classList.remove('open');
      document.getElementById('post-text').value = '';
      postMediaMgr.clear();
      if (postRecording) stopPostRecording();
    }

    document.getElementById('input-foto').addEventListener('change', e => {
      Array.from(e.target.files).forEach(f => postMediaMgr.add(f, 'image'));
      e.target.value = '';
    });
    document.getElementById('input-video').addEventListener('change', e => {
      Array.from(e.target.files).forEach(f => postMediaMgr.add(f, 'video'));
      e.target.value = '';
    });
    document.getElementById('input-audio-file').addEventListener('change', e => {
      Array.from(e.target.files).forEach(f => postMediaMgr.add(f, 'audio'));
      e.target.value = '';
    });

    document.getElementById('btn-audio').addEventListener('click', async () => {
      if (postRecording) { stopPostRecording(); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        postAudioChunks = [];
        postRecorder = new MediaRecorder(stream);
        postRecorder.ondataavailable = e => postAudioChunks.push(e.data);
        postRecorder.onstop = () => {
          const blob = new Blob(postAudioChunks, { type: 'audio/webm' });
          const file = new File([blob], `registrazione_${Date.now()}.webm`, { type: 'audio/webm' });
          postMediaMgr.add(file, 'audio');
          stream.getTracks().forEach(t => t.stop());
        };
        postRecorder.start();
        postRecording = true;
        const btn = document.getElementById('btn-audio');
        btn.textContent = '⏹️ Stop'; btn.classList.add('recording');
      } catch(err) { alert('Microfono non disponibile: ' + err.message); }
    });

    function stopPostRecording() {
      if (postRecorder && postRecording) {
        postRecorder.stop(); postRecording = false;
        const btn = document.getElementById('btn-audio');
        btn.textContent = '🎙️ Registra'; btn.classList.remove('recording');
      }
    }

    document.getElementById('btn-pubblica').addEventListener('click', async () => {
      if (!currentUser) return;
      const text = document.getElementById('post-text').value.trim();
      if (!text && !postMediaMgr.items.length) { alert('Scrivi qualcosa o aggiungi un allegato!'); return; }

      const btn = document.getElementById('btn-pubblica');
      btn.disabled = true; btn.textContent = 'Pubblicazione…';

      try {
        const progEl = document.getElementById('upload-progress');
        const barEl  = document.getElementById('upload-bar');
        const media  = postMediaMgr.items.length
          ? await uploadAll(postMediaMgr.items, progEl, barEl)
          : [];

        const nome = currentUserData?.nome || currentUser.displayName || 'Anonimo';
        const foto = currentUserData?.fotoProfilo || null;

        await addDoc(collection(db, 'piazzetta_posts'), {
          authorId:    currentUser.uid,
          authorName:  nome,
          authorPhoto: foto,
          text:        text,
          media:       media,   // [{url, type, name}]
          timestamp:   serverTimestamp(),
          reactions:   {},
          commentsCount: 0,
        });
        closeModal();
      } catch(err) {
        alert('Errore: ' + err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Pubblica';
      }
    });

    // ── Feed ──────────────────────────────────────────────────────────────
    function loadFeed() {
      const feedEl = document.getElementById('feed');
      feedEl.innerHTML = '<div class="spinner"></div>';
      const q = query(collection(db, 'piazzetta_posts'), orderBy('timestamp', 'desc'), limit(40));
      onSnapshot(q, snap => {
        feedEl.innerHTML = '';
        if (snap.empty) {
          feedEl.innerHTML = '<p class="empty-msg">Ancora nessun post. Sii il primo a scrivere! ☀️</p>';
          return;
        }
        snap.forEach(d => feedEl.appendChild(renderPost(d.id, d.data())));
      }, err => {
        feedEl.innerHTML = '<p class="empty-msg">Errore caricamento. Riprova.</p>';
        console.error(err);
      });
    }

    function formatDT(ts) {
      if (!ts?.toDate) return '';
      const d = ts.toDate();
      return d.toLocaleDateString('it-IT', { day:'numeric', month:'long' }) +
             ' · ' + d.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
    }

    // Normalizza i media del post: supporta sia il vecchio campo mediaUrl/mediaType
    // che il nuovo array media:[{url,type,name}]
    function normalizeMedia(data) {
      if (Array.isArray(data.media) && data.media.length) return data.media;
      if (data.mediaUrl) return [{ url: data.mediaUrl, type: data.mediaType || 'image', name: '' }];
      return [];
    }

    function buildMediaHtml(mediaList) {
      if (!mediaList.length) return '';
      const imgs   = mediaList.filter(m => m.type === 'image');
      const vids   = mediaList.filter(m => m.type === 'video');
      const audios = mediaList.filter(m => m.type === 'audio');

      const visualItems = [...imgs, ...vids];
      let html = '';

      if (visualItems.length) {
        const cnt = visualItems.length;
        const cls = cnt === 1 ? 'count-1' : cnt === 2 ? 'count-2' : cnt === 3 ? 'count-3' : 'count-many';
        html += `<div class="media-grid ${cls}">`;
        visualItems.forEach(m => {
          html += `<div class="media-grid-item">`;
          if (m.type === 'image')
            html += `<img src="${escHtml(m.url)}" alt="foto" loading="lazy">`;
          else
            html += `<video src="${escHtml(m.url)}" controls playsinline></video>`;
          html += `</div>`;
        });
        html += `</div>`;
      }

      if (audios.length) {
        html += `<div class="media-audio-row">`;
        audios.forEach(m => {
          const fname = m.name ? escHtml(m.name) : '🎵 Audio';
          html += `<div class="audio-player-wrap">
            <span class="audio-icon">🎵</span>
            <audio src="${escHtml(m.url)}" controls></audio>
            <span class="audio-name">${fname}</span>
          </div>`;
        });
        html += `</div>`;
      }

      return html;
    }

    function renderPost(postId, data) {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.dataset.postId = postId;

      const avatarHtml = data.authorPhoto
        ? `<div class="post-avatar"><img src="${escHtml(data.authorPhoto)}" alt="${escHtml(data.authorName || '')}"></div>`
        : `<div class="post-avatar">🧒</div>`;

      const mediaList = normalizeMedia(data);
      const mediaHtml = buildMediaHtml(mediaList);

      const reactions = data.reactions || {};
      const reactionsHtml = EMOJIS.map(emoji => {
        const count = reactions[emoji] || 0;
        return `<button class="reaction-btn" data-emoji="${emoji}" onclick="toggleReaction('${postId}','${emoji}',this)">${emoji}${count > 0 ? ' <span>' + count + '</span>' : ''}</button>`;
      }).join('');

      const commCount = data.commentsCount || 0;
      const canDelete = isAdmin || (currentUser && currentUser.uid === data.authorId);

      card.innerHTML = `
        <div class="post-header">
          ${avatarHtml}
          <div class="post-meta">
            <div class="post-autore">${escHtml(data.authorName || 'Anonimo')}</div>
            <div class="post-data">${formatDT(data.timestamp)}</div>
          </div>
          <button class="post-delete-btn" title="Elimina" onclick="deletePost('${postId}',this)" style="${canDelete ? 'display:block' : 'display:none'}">🗑️</button>
        </div>
        ${data.text ? `<div class="post-text">${escHtml(data.text)}</div>` : ''}
        ${mediaHtml}
        <div class="post-reactions">${reactionsHtml}</div>
        <div class="post-footer">
          <button class="btn-comments" onclick="toggleComments('${postId}',this)">
            💬 ${commCount > 0 ? commCount + ' commenti' : 'Commenta'}
          </button>
        </div>
        <div class="comments-section" id="comments-${postId}"></div>`;

      return card;
    }

    // ── Reactions ─────────────────────────────────────────────────────────
    window.toggleReaction = async (postId, emoji, btn) => {
      if (!currentUser) { alert('Fai il login per reagire!'); return; }
      const postRef     = doc(db, 'piazzetta_posts', postId);
      const reactionKey = `reactions.${emoji}`;
      const urRef       = doc(db, 'piazzetta_posts', postId, 'user_reactions', currentUser.uid);
      try {
        const urSnap = await getDoc(urRef);
        const mine   = urSnap.exists() ? (urSnap.data().emojis || []) : [];
        const already = mine.includes(emoji);
        if (already) {
          await updateDoc(postRef, { [reactionKey]: increment(-1) });
          await updateDoc(urRef, { emojis: arrayRemove(emoji) });
          btn.classList.remove('active');
          updateReactionCount(btn, -1);
        } else {
          await updateDoc(postRef, { [reactionKey]: increment(1) });
          urSnap.exists()
            ? await updateDoc(urRef, { emojis: arrayUnion(emoji) })
            : await setDoc(urRef, { emojis: [emoji] });
          btn.classList.add('active');
          updateReactionCount(btn, 1);
        }
      } catch(err) { console.error('Reaction error:', err); }
    };

    function updateReactionCount(btn, delta) {
      let span = btn.querySelector('span');
      if (!span) {
        btn.appendChild(document.createTextNode(' '));
        span = document.createElement('span');
        btn.appendChild(span);
        span.textContent = '0';
      }
      const next = (parseInt(span.textContent || '0')) + delta;
      if (next <= 0) {
        const tn = span.previousSibling;
        if (tn) btn.removeChild(tn);
        btn.removeChild(span);
      } else { span.textContent = next; }
    }

    // ── Delete post ───────────────────────────────────────────────────────
    window.deletePost = async (postId, btn) => {
      if (!confirm('Eliminare questo post?')) return;
      try {
        await deleteDoc(doc(db, 'piazzetta_posts', postId));
        btn.closest('.post-card')?.remove();
      } catch(err) { alert('Errore: ' + err.message); }
    };

    // ── Comments ──────────────────────────────────────────────────────────
    const loadedComments = new Set();

    window.toggleComments = async (postId) => {
      const section = document.getElementById(`comments-${postId}`);
      if (!section) return;
      const isOpen = section.classList.toggle('open');
      if (isOpen && !loadedComments.has(postId)) {
        loadedComments.add(postId);
        await loadComments(postId, section);
      }
    };

    async function loadComments(postId, section) {
      section.innerHTML = '<div style="color:#aaa;font-size:0.82rem;padding:4px 0">Caricamento…</div>';
      try {
        const q = query(collection(db, 'piazzetta_posts', postId, 'comments'), orderBy('timestamp', 'asc'));
        onSnapshot(q, snap => {
          const list = document.createElement('div');
          list.className = 'comment-list';
          snap.forEach(d => list.appendChild(renderComment(postId, d.id, d.data())));
          // Preserve existing input if already built
          const existingInput = section.querySelector('.comment-input-wrap');
          section.innerHTML = '';
          section.appendChild(list);
          section.appendChild(existingInput || buildCommentInput(postId));
        });
      } catch(err) {
        section.innerHTML = `<div style="color:#e74c3c;font-size:0.82rem">${err.message}</div>`;
      }
    }

    function buildCommentMediaHtml(data) {
      const mediaList = normalizeMedia(data);
      if (!mediaList.length) return '';

      const imgs   = mediaList.filter(m => m.type === 'image');
      const vids   = mediaList.filter(m => m.type === 'video');
      const audios = mediaList.filter(m => m.type === 'audio');
      const visual = [...imgs, ...vids];
      let html = '';

      if (visual.length) {
        const cls = visual.length === 1 ? 'single' : '';
        html += `<div class="comment-media-grid ${cls}">`;
        visual.forEach(m => {
          if (m.type === 'image')
            html += `<img src="${escHtml(m.url)}" loading="lazy">`;
          else
            html += `<video src="${escHtml(m.url)}" controls playsinline></video>`;
        });
        html += `</div>`;
      }
      if (audios.length) {
        html += `<div class="comment-audio-list">`;
        audios.forEach(m => {
          html += `<div class="comment-audio-item"><span>🎵</span><audio src="${escHtml(m.url)}" controls></audio></div>`;
        });
        html += `</div>`;
      }
      return html;
    }

    function renderComment(postId, commentId, data) {
      const item = document.createElement('div');
      item.className = 'comment-item';

      const avatarHtml = data.authorPhoto
        ? `<div class="comment-avatar"><img src="${escHtml(data.authorPhoto)}" alt=""></div>`
        : `<div class="comment-avatar">🧒</div>`;

      const mediaHtml = buildCommentMediaHtml(data);

      const reactions = data.reactions || {};
      const reactHtml = EMOJIS.map(emoji => {
        const count = reactions[emoji] || 0;
        return `<button class="comment-reaction-btn" data-emoji="${emoji}" onclick="toggleCommentReaction('${postId}','${commentId}','${emoji}',this)">${emoji}${count > 0 ? ' ' + count : ''}</button>`;
      }).join('');

      const canDel = isAdmin || (currentUser && currentUser.uid === data.authorId);

      item.innerHTML = `
        ${avatarHtml}
        <div class="comment-bubble">
          <div class="comment-autore">${escHtml(data.authorName || 'Anonimo')}</div>
          ${data.text ? `<div class="comment-text">${escHtml(data.text)}</div>` : ''}
          ${mediaHtml}
          <div class="comment-reactions">${reactHtml}</div>
          <div class="comment-data">
            ${formatDT(data.timestamp)}
            ${canDel ? `<button onclick="deleteComment('${postId}','${commentId}',this)" style="margin-left:8px;background:none;border:none;cursor:pointer;font-size:0.75rem;color:#ccc;">✕</button>` : ''}
          </div>
        </div>`;
      return item;
    }

    window.toggleCommentReaction = async (postId, commentId, emoji, btn) => {
      if (!currentUser) return;
      const ref = doc(db, 'piazzetta_posts', postId, 'comments', commentId);
      const key = `reactions.${emoji}`;
      try {
        const snap = await getDoc(ref);
        const cur  = (snap.data()?.reactions || {})[emoji] || 0;
        await updateDoc(ref, { [key]: increment(1) });
        btn.classList.add('active');
        btn.textContent = emoji + ' ' + (cur + 1);
      } catch(err) { console.error(err); }
    };

    window.deleteComment = async (postId, commentId, btn) => {
      if (!confirm('Eliminare commento?')) return;
      try {
        await deleteDoc(doc(db, 'piazzetta_posts', postId, 'comments', commentId));
        await updateDoc(doc(db, 'piazzetta_posts', postId), { commentsCount: increment(-1) });
        btn.closest('.comment-item')?.remove();
      } catch(err) { alert(err.message); }
    };

    // ── Comment input builder ─────────────────────────────────────────────
    function buildCommentInput(postId) {
      const wrap = document.createElement('div');
      wrap.className = 'comment-input-wrap';
      wrap.dataset.postId = postId;

      const previewId = `cprev-${postId}`;
      let cRecorder = null, cAudioChunks = [], cRecording = false;

      // Use a local media manager scoped to this comment input
      let mgr = null; // initialized after innerHTML set

      wrap.innerHTML = `
        <div class="comment-input-inner">
          <textarea class="comment-textarea" placeholder="Scrivi un commento…" rows="1"></textarea>
          <div class="comment-media-btns">
            <label class="comment-media-btn">📷<input type="file" accept="image/*" multiple style="display:none" class="c-foto"></label>
            <label class="comment-media-btn">🎬<input type="file" accept="video/*" multiple style="display:none" class="c-video"></label>
            <button class="comment-media-btn c-rec-btn">🎙️</button>
            <label class="comment-media-btn">🎵<input type="file" accept="audio/*,.mp3,.m4a,.wav,.ogg,.aac,.flac,.weba,.opus" multiple style="display:none" class="c-audio"></label>
          </div>
          <div id="${previewId}"></div>
        </div>
        <button class="comment-send-btn">Invia</button>`;

      // Create an inline media manager that renders into previewId
      // We can't use makeMediaManager directly because it uses document.getElementById
      // and the element may not be in DOM yet — we append first.
      // So we set innerHTML first, then wire up.

      const textarea  = wrap.querySelector('.comment-textarea');
      const fotoInput = wrap.querySelector('.c-foto');
      const vidInput  = wrap.querySelector('.c-video');
      const audInput  = wrap.querySelector('.c-audio');
      const recBtn    = wrap.querySelector('.c-rec-btn');
      const sendBtn   = wrap.querySelector('.comment-send-btn');

      // Local items list
      const items = [];

      function addItem(file, type) {
        if (items.length >= MAX_FILES) { alert(`Massimo ${MAX_FILES} file.`); return; }
        items.push({ file, type, name: file.name || type, previewUrl: URL.createObjectURL(file) });
        renderPreview();
      }

      function removeItem(idx) {
        URL.revokeObjectURL(items[idx].previewUrl);
        items.splice(idx, 1);
        renderPreview();
      }

      function renderPreview() {
        const container = wrap.querySelector(`#${previewId}`);
        if (!container) return;
        if (!items.length) { container.innerHTML = ''; return; }
        let html = `<div class="preview-grid" style="margin-top:6px;">`;
        items.forEach((item, idx) => {
          if (item.type === 'image') {
            html += `<div class="preview-item"><img src="${item.previewUrl}"><button class="preview-remove" data-idx="${idx}">✕</button></div>`;
          } else if (item.type === 'video') {
            html += `<div class="preview-item"><video src="${item.previewUrl}" muted></video><button class="preview-remove" data-idx="${idx}">✕</button></div>`;
          } else {
            html += `<div class="preview-item audio-item"><span class="audio-icon">🎵</span><audio src="${item.previewUrl}" controls></audio><span class="audio-fname">${escHtml(item.name)}</span><button class="preview-remove" data-idx="${idx}">✕</button></div>`;
          }
        });
        html += '</div>';
        container.innerHTML = html;
        container.querySelectorAll('.preview-remove').forEach(b => {
          b.addEventListener('click', () => removeItem(parseInt(b.dataset.idx)));
        });
      }

      textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
      });

      fotoInput.addEventListener('change', e => { Array.from(e.target.files).forEach(f => addItem(f, 'image')); e.target.value = ''; });
      vidInput.addEventListener('change',  e => { Array.from(e.target.files).forEach(f => addItem(f, 'video')); e.target.value = ''; });
      audInput.addEventListener('change',  e => { Array.from(e.target.files).forEach(f => addItem(f, 'audio')); e.target.value = ''; });

      recBtn.addEventListener('click', async () => {
        if (cRecording) {
          cRecorder.stop(); cRecording = false;
          recBtn.textContent = '🎙️'; recBtn.classList.remove('recording');
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          cAudioChunks = [];
          cRecorder = new MediaRecorder(stream);
          cRecorder.ondataavailable = e => cAudioChunks.push(e.data);
          cRecorder.onstop = () => {
            const blob = new Blob(cAudioChunks, { type: 'audio/webm' });
            const file = new File([blob], `rec_${Date.now()}.webm`, { type: 'audio/webm' });
            addItem(file, 'audio');
            stream.getTracks().forEach(t => t.stop());
          };
          cRecorder.start(); cRecording = true;
          recBtn.textContent = '⏹️'; recBtn.classList.add('recording');
        } catch(err) { alert('Microfono non disponibile'); }
      });

      sendBtn.addEventListener('click', async () => {
        if (!currentUser) { alert('Fai il login!'); return; }
        const text = textarea.value.trim();
        if (!text && !items.length) return;

        sendBtn.disabled = true; sendBtn.textContent = '…';
        try {
          const media = items.length
            ? await Promise.all(items.map(item =>
                uploadOne(item.file, item.type).then(url => ({ url, type: item.type, name: item.name }))
              ))
            : [];

          const nome = currentUserData?.nome || currentUser.displayName || 'Anonimo';
          const foto = currentUserData?.fotoProfilo || null;
          await addDoc(collection(db, 'piazzetta_posts', postId, 'comments'), {
            authorId:    currentUser.uid,
            authorName:  nome,
            authorPhoto: foto,
            text:        text,
            media:       media,
            timestamp:   serverTimestamp(),
            reactions:   {},
          });
          await updateDoc(doc(db, 'piazzetta_posts', postId), { commentsCount: increment(1) });

          textarea.value = ''; textarea.style.height = 'auto';
          items.forEach(i => URL.revokeObjectURL(i.previewUrl));
          items.length = 0; renderPreview();

          const footerBtn = wrap.closest('.post-card')?.querySelector('.btn-comments');
          if (footerBtn) {
            const cur = parseInt(footerBtn.textContent.match(/\d+/)?.[0] || '0');
            footerBtn.textContent = `💬 ${cur + 1} commenti`;
          }
        } catch(err) { alert('Errore: ' + err.message); }
        finally { sendBtn.disabled = false; sendBtn.textContent = 'Invia'; }
      });

      return wrap;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
