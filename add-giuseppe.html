<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aggiungi Giuseppe Alfano – Admin</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 16px; background: #f5f5f5; }
    .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h1 { font-size: 1.2rem; margin-bottom: 16px; }
    img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-bottom: 20px; }
    td { padding: 6px 8px; border-bottom: 1px solid #eee; }
    td:first-child { font-weight: 700; color: #666; width: 40%; }
    button { background: #5a8a4a; color: #fff; border: none; border-radius: 8px; padding: 12px 28px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 16px; padding: 12px; border-radius: 8px; font-weight: 700; display: none; }
    .ok  { background: #d4edda; color: #155724; }
    .err { background: #f8d7da; color: #721c24; }
    #auth-warn { background: #fff3cd; color: #856404; padding: 10px 12px; border-radius: 8px; margin-bottom: 16px; font-size: 0.88rem; display: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>➕ Aggiungi membro Staff</h1>
  <div id="auth-warn">⚠️ Devi essere loggato come admin per eseguire questa operazione.</div>
  <img src="https://res.cloudinary.com/dxqyprtzh/image/upload/v1781014435/pepy_uwatre.png" alt="Giuseppe Alfano">
  <table>
    <tr><td>Nome</td><td>Giuseppe Alfano</td></tr>
    <tr><td>UID</td><td style="word-break:break-all;font-size:0.78rem">w45I4ZCEz7VokkPResq15GD4mwv2</td></tr>
    <tr><td>Email</td><td>peppe.alfano67@hotmail.it</td></tr>
    <tr><td>Collezione</td><td>staff</td></tr>
    <tr><td>ID documento</td><td style="word-break:break-all;font-size:0.78rem">w45I4ZCEz7VokkPResq15GD4mwv2</td></tr>
  </table>
  <button id="btn" onclick="aggiungi()">Aggiungi a Firestore</button>
  <div id="status"></div>
</div>

<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC18lzwqhYcW29TsEO6Oy4Bqvb2PMBUmAg",
    authDomain: "campo-dei-fiori.firebaseapp.com",
    projectId: "campo-dei-fiori",
    storageBucket: "campo-dei-fiori.firebasestorage.app",
    messagingSenderId: "928976798756",
    appId: "1:928976798756:web:1b90027ec9f03b203e44b1"
  };

  const ADMIN_UID = 'mCSgNMVEphVIIf4HX0bkcKq2ZKv2';
  const GIUSEPPE_UID = 'w45I4ZCEz7VokkPResq15GD4mwv2';

  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  const btn     = document.getElementById('btn');
  const status  = document.getElementById('status');
  const authWarn = document.getElementById('auth-warn');

  let currentUser = null;

  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (!user || user.uid !== ADMIN_UID) {
      authWarn.style.display = 'block';
      btn.disabled = true;
    } else {
      authWarn.style.display = 'none';
      btn.disabled = false;
    }
  });

  window.aggiungi = async function() {
    if (!currentUser || currentUser.uid !== ADMIN_UID) {
      showStatus('Non sei loggato come admin.', false);
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Aggiunta in corso…';
    try {
      await setDoc(doc(db, 'staff', GIUSEPPE_UID), {
        uid:         GIUSEPPE_UID,
        nome:        'Giuseppe Alfano',
        email:       'peppe.alfano67@hotmail.it',
        fotoProfilo: 'https://res.cloudinary.com/dxqyprtzh/image/upload/v1781014435/pepy_uwatre.png',
        ruolo:       'Educatore',
        comunita:    '',
        admin:       false,
        numeroAccessi: 0,
        interazioni: {
          diarioScritti:    0,
          bottigliaInviati: 0,
          bottigliaRicevuti: 0,
          commentiScritti:  0,
          commentiRicevuti: 0,
          reazioniDate:     0,
          reazioniRicevute: 0,
          audioRegistrati:  0,
          fotoCaricate:     0,
        },
        createdAt: serverTimestamp(),
      });
      showStatus('✅ Giuseppe Alfano aggiunto con successo nella collezione staff!', true);
      btn.textContent = '✅ Fatto!';
    } catch (e) {
      showStatus('❌ Errore: ' + e.message, false);
      btn.disabled = false;
      btn.textContent = 'Riprova';
    }
  };

  function showStatus(msg, ok) {
    status.textContent = msg;
    status.className = ok ? 'ok' : 'err';
    status.style.display = 'block';
  }
</script>
</body>
</html>
