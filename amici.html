<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gli Amici – Campo dei Fiori</title>
  <meta name="theme-color" content="#e07b39">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f5f5f5; padding-bottom: 70px; min-height: 100vh; }

    .top-header {
      background: #e07b39; color: #fff;
      display: flex; align-items: center;
      padding: 0 1rem; height: 56px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .top-header h1 { font-size: 1.15rem; font-weight: 800; flex: 1; text-align: center; }

    /* WRAPPER CENTRATO SU DESKTOP */
    .page-content {
      max-width: 960px;
      margin: 0 auto;
    }

    /* GRIGLIA 2 COLONNE */
    .grid-amici {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 2px;
    }

    .card-amico {
      background: #fff;
      text-decoration: none;
      color: #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: opacity 0.15s;
    }
    .card-amico:hover { opacity: 0.88; }

    .card-foto {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #fdebd0;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }
    .card-foto img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .card-info {
      padding: 8px 10px 10px;
      background: #fff;
    }
    .card-info .nome {
      font-size: 0.88rem;
      font-weight: 800;
      color: #222;
    }
    .card-info .ruolo {
      font-size: 0.72rem;
      color: #e07b39;
      font-weight: 600;
      margin-top: 2px;
    }

    /* Desktop: 3 colonne */
    @media (min-width: 600px) {
      .grid-amici { grid-template-columns: 1fr 1fr 1fr; gap: 3px; padding: 3px; }
    }
    /* Schermi larghi: 4 colonne */
    @media (min-width: 900px) {
      .grid-amici { grid-template-columns: repeat(4, 1fr); }
    }

    .spinner {
      width: 34px; height: 34px;
      border: 3px solid #eee; border-top-color: #e07b39;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin: 2rem auto; grid-column: 1/-1;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-msg { color: #aaa; text-align: center; padding: 2rem; grid-column: 1/-1; }

    /* ---- BOTTOM NAV ---- */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 62px; background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex; align-items: stretch; z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.07);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-decoration: none; color: #999;
      font-size: 0.58rem; font-weight: 600; gap: 2px;
    }
    .nav-item.active { color: #e07b39; }
    .nav-item .nav-icon { font-size: 1.2rem; line-height: 1; }
  </style>
</head>
<body>

  <header class="top-header">
    <h1>🤝 Gli Amici di Campo dei Fiori</h1>
    <div id="nav-auth-slot"></div>
  </header>

  <div class="page-content">
    <div id="grid-amici" class="grid-amici">
      <div class="spinner"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><img src="https://res.cloudinary.com/dxqyprtzh/image/upload/v1780171524/viso_campo_brd2ic.webp" alt="" style="width:28px;height:28px;border-radius:50%;object-fit:cover;display:block;">Home</a>
    <a href="comunita.html" class="nav-item"><span class="nav-icon">🌻</span>Comunità</a>
    <a href="staff.html" class="nav-item"><span class="nav-icon">🤡</span>Staff</a>
    <a href="minori.html?comunita=after-us" class="nav-item"><span class="nav-icon">🌟</span>After Us</a>
    <a href="#" class="nav-item"><span class="nav-icon">📋</span>Progetti</a>
    <a href="giornale.html" class="nav-item"><span class="nav-icon">📰</span>Giornale</a>
  </nav>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { setupNavAuth } from './js/nav-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyC18lzwqhYcW29TsEO6Oy4Bqvb2PMBUmAg",
      authDomain: "campo-dei-fiori.firebaseapp.com",
      projectId: "campo-dei-fiori",
      storageBucket: "campo-dei-fiori.firebasestorage.app",
      messagingSenderId: "928976798756",
      appId: "1:928976798756:web:1b90027ec9f03b203e44b1"
    };
    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    setupNavAuth();

    const grid = document.getElementById('grid-amici');

    async function loadAmici() {
      try {
        const snap = await getDocs(collection(db, 'amici'));
        grid.innerHTML = '';
        if (snap.empty) { grid.innerHTML = '<p class="empty-msg">Nessun amico ancora.</p>'; return; }

        const amici = [];
        snap.forEach(d => amici.push({ id: d.id, ...d.data() }));
        amici.sort((a, b) => (a.nome || '').localeCompare(b.nome || '', 'it'));

        amici.forEach(data => {
          const fotoHtml = data.fotoProfilo
            ? `<img src="${data.fotoProfilo}" alt="${data.nome || ''}" loading="lazy">`
            : '🤝';
          const ruoloHtml = (data.ruolo || data.descrizione)
            ? `<div class="ruolo">${data.ruolo || data.descrizione}</div>`
            : '';
          grid.innerHTML += `
            <div class="card-amico">
              <div class="card-foto">${fotoHtml}</div>
              <div class="card-info">
                <div class="nome">${data.nome || '—'}</div>
                ${ruoloHtml}
              </div>
            </div>`;
        });
      } catch (e) {
        grid.innerHTML = `<p class="empty-msg">Errore: ${e.message}</p>`;
      }
    }

    loadAmici();
  </script>
</body>
</html>
