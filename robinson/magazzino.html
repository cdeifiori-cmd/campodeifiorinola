<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magazzino – Robinson</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
  <meta name="theme-color" content="#1a3a5c">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    body { padding-bottom: 90px; }
    #nav-auth-slot-wrap { position: fixed; top: 10px; right: 10px; z-index: 300; }

    .mag-header { background: linear-gradient(135deg, var(--navy) 0%, #0d1b2a 100%); color: #fff; padding: 20px 18px 16px; text-align: center; }
    .mag-header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--oro-light); }
    .mag-header .breadcrumb { font-size: 0.75rem; margin-top: 4px; }
    .mag-header .breadcrumb a { color: var(--oro); text-decoration: none; }
    .sotto-soglia-count { display: inline-block; margin-top: 8px; background: rgba(192,57,43,0.25); border: 1px solid var(--rosso); color: #fff; border-radius: 20px; padding: 3px 12px; font-size: 0.78rem; }

    .mag-toolbar { display: flex; gap: 8px; justify-content: center; padding: 12px; flex-wrap: wrap; }

    /* Griglia: colonne = categorie, righe = prodotti (richiama il foglio cartaceo) */
    .mag-grid { display: flex; gap: 12px; align-items: flex-start; padding: 4px 12px 20px; overflow-x: auto; }
    .mag-col { flex: 0 0 230px; background: var(--post-bg); border: 2px solid var(--carta-scura); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .mag-col-header { background: var(--navy); color: #fff; display: flex; align-items: center; gap: 4px; padding: 8px 8px 8px 10px; }
    .mag-col-nome { flex: 1; min-width: 0; background: none; border: none; color: var(--oro-light); font-family: 'Playfair Display', serif; font-weight: 700; font-size: 0.88rem; padding: 4px 2px; }
    .mag-col-nome:focus { outline: 1px solid var(--oro); border-radius: 4px; }
    .col-mini-btn { background: rgba(255,255,255,0.12); border: none; color: #fff; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; flex-shrink: 0; }
    .col-mini-btn:hover { background: rgba(255,255,255,0.28); }
    .col-mini-btn:disabled { opacity: 0.3; cursor: default; }
    .mag-col-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .mag-col-add { padding: 0 8px 8px; }
    .mag-col-add button { width: 100%; background: none; border: 1px dashed var(--oro); color: var(--oro); border-radius: 8px; padding: 6px; cursor: pointer; font-size: 0.78rem; font-family: 'Lora', serif; }
    .mag-col-add button:hover { background: var(--oro-light); }
    .mag-col.collassata .mag-col-body, .mag-col.collassata .mag-col-add { display: none; }
    .mag-col-empty { font-size: 0.75rem; color: var(--muted); font-style: italic; padding: 6px 2px; }

    .mag-col-new { flex: 0 0 190px; background: none; border: 2px dashed var(--carta-scura); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 8px; align-self: stretch; justify-content: center; }
    .mag-col-new input { padding: 8px 10px; border: 1.5px solid #c8b89a; border-radius: 8px; font-family: 'Lora', serif; font-size: 0.85rem; }
    .mag-col-new button { background: var(--oro); color: #fff; border: none; border-radius: 8px; padding: 7px; cursor: pointer; font-family: 'Lora', serif; font-size: 0.8rem; font-weight: 600; }

    .prod-cell { background: #fff; border-left: 4px solid var(--navy); border-radius: 4px 8px 8px 4px; padding: 8px 10px; cursor: pointer; box-shadow: 1px 1px 6px rgba(26,58,92,0.08); }
    .prod-cell.sotto { border-left-color: var(--rosso); background: #fdf1ef; }
    .prod-cell-nome { font-weight: 600; color: var(--navy); font-size: 0.84rem; line-height: 1.3; }
    .prod-cell-nome .sotto-badge { display: inline-block; background: var(--rosso); color: #fff; font-size: 0.6rem; border-radius: 10px; padding: 1px 6px; margin-left: 4px; vertical-align: middle; }
    .prod-cell-meta { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
    .modalita-badge { display: inline-block; background: var(--carta-scura); color: var(--navy); font-size: 0.62rem; font-weight: 600; border-radius: 10px; padding: 1px 8px; }
    .serve-toggle { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; color: var(--navy); margin-top: 6px; cursor: pointer; }
    .prod-cell-qty { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .qty-btn { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--navy); background: #fff; color: var(--navy); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .qty-btn:hover { background: var(--navy); color: #fff; }
    .qty-val { flex: 1; text-align: center; font-size: 0.82rem; font-weight: 600; }

    .modal-box.wide { max-width: 460px; }

    .radio-scelta { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
    .radio-scelta label { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; }
    .radio-scelta select { margin-left: 24px; width: calc(100% - 24px); padding: 7px 10px; border: 1.5px solid #c8b89a; border-radius: 8px; font-family: 'Lora', serif; font-size: 0.85rem; }

    @media (max-width: 720px) {
      .mag-grid { flex-direction: column; overflow-x: visible; }
      .mag-col, .mag-col-new { flex: 1 1 auto; width: 100%; }
    }
  </style>
</head>
<body>

<div id="nav-auth-slot-wrap"><div id="nav-auth-slot"></div></div>

<div class="mag-header">
  <div class="breadcrumb"><a href="gestione.html">📦 Gestione</a> · Magazzino</div>
  <h1>📦 Magazzino</h1>
  <div id="sotto-soglia-wrap"></div>
</div>

<div class="mag-toolbar">
  <button class="btn btn-primary btn-sm" id="btn-nuovo-prodotto">➕ Nuovo prodotto</button>
</div>

<div class="mag-grid" id="mag-grid"><div class="spinner"></div></div>

<!-- Modal prodotto -->
<div class="modal-overlay" id="modal-prodotto">
  <div class="modal-box wide">
    <div class="modal-title" id="pm-title">➕ Nuovo prodotto</div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="pm-nome" placeholder="Es. Pasta corta">
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <select id="pm-categoria"></select>
    </div>
    <div style="display:flex;gap:10px;">
      <div class="form-group" style="flex:1;">
        <label>Unità</label>
        <input type="text" id="pm-unita" placeholder="pz, kg, l...">
      </div>
      <div class="form-group" style="flex:1;">
        <label>Quantità attuale</label>
        <input type="number" id="pm-quantita" step="any" value="0">
      </div>
    </div>
    <div class="form-group">
      <label>Modalità di riordino</label>
      <select id="pm-modalita">
        <option value="soglia">Soglia — si riordina sotto un minimo (stabili)</option>
        <option value="ricorrente">Ricorrente — sempre in lista (freschi/giornalieri)</option>
        <option value="manuale">Manuale — solo su richiesta</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;">
      <div class="form-group" style="flex:1;" id="pm-soglia-wrap">
        <label>Soglia minima</label>
        <input type="number" id="pm-soglia" step="any" value="0">
      </div>
      <div class="form-group" style="flex:1;" id="pm-ricorrente-wrap">
        <label>Quantità ricorrente</label>
        <input type="number" id="pm-quantita-ricorrente" step="any" placeholder="–">
      </div>
      <div class="form-group" style="flex:1;" id="pm-scorta-wrap">
        <label>Scorta obiettivo (opz.)</label>
        <input type="number" id="pm-scorta-obiettivo" step="any" placeholder="–">
      </div>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="pm-serve"> Serve — inseriscilo nella prossima lista spesa</label>
    </div>
    <div class="form-group">
      <label>Prezzo di riferimento (opz.)</label>
      <input type="number" id="pm-prezzo" step="0.01" placeholder="€">
    </div>
    <div class="msg-esito" id="pm-error" style="color:var(--rosso);font-size:0.8rem;min-height:18px;"></div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-primary" id="pm-salva" style="flex:1;">💾 Salva</button>
      <button class="btn" id="pm-elimina" style="display:none;background:none;border:1.5px solid var(--rosso);color:var(--rosso);">🗑️ Elimina</button>
      <button class="btn" id="pm-annulla" style="background:none;border:1.5px solid var(--navy);color:var(--navy);">Annulla</button>
    </div>
  </div>
</div>

<!-- Modal eliminazione categoria con prodotti -->
<div class="modal-overlay" id="modal-elimina-cat">
  <div class="modal-box wide">
    <div class="modal-title">🗑️ Eliminare categoria</div>
    <p id="ec-messaggio" style="font-size:0.85rem;color:var(--inchiostro);"></p>
    <div class="radio-scelta">
      <label><input type="radio" name="ec-scelta" value="sposta" checked> Sposta i prodotti in un'altra categoria</label>
      <select id="ec-select-dest"></select>
      <label><input type="radio" name="ec-scelta" value="elimina"> Elimina anche i prodotti</label>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn" style="background:none;border:1.5px solid var(--rosso);color:var(--rosso);flex:1;" id="ec-conferma">Conferma</button>
      <button class="btn" style="background:none;border:1.5px solid var(--navy);color:var(--navy);flex:1;" id="ec-annulla">Annulla</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="gestione.html" class="nav-item"><span class="nav-icon">📦</span><span>Gestione</span></a>
  <a href="magazzino.html" class="nav-item active"><span class="nav-icon">📦</span><span>Magazzino</span></a>
  <a href="liste-spesa.html" class="nav-item"><span class="nav-icon">🛒</span><span>Spesa</span></a>
  <a href="gestione-storico.html" class="nav-item"><span class="nav-icon">📊</span><span>Storico</span></a>
</nav>

<script type="module">
import { db, ADMIN_UID } from './js/robinson-firebase.js';
import { requireAuth } from './js/robinson-auth.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { esc } from './js/robinson-utils.js';
import { puoAccedereGestione, seedCategorieIniziali, sottoSoglia, daComprare, modalitaProdotto, ETICHETTA_MODALITA, spostaCategoriaOrdine, fmtEuro } from './js/robinson-magazzino.js';
import {
  collection, getDocs, doc, setDoc, updateDoc, deleteDoc, addDoc, writeBatch, query, orderBy, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

setupNavAuth('nav-auth-slot');

let currentUser = null;
let categorie = [];   // { id, nome, ordine, attiva }
let prodotti = [];    // { id, nome, categoria, unita, quantita_attuale, soglia_minima, scorta_obiettivo, prezzo_riferimento, attivo }
const collassate = new Set(); // id categoria collassate (solo UI, non persistito)

requireAuth(async user => {
  currentUser = user;
  const ok = await puoAccedereGestione(user);
  if (!ok) { window.location.replace('index.html'); return; }
  await seedCategorieIniziali();
  await caricaTutto();
});

async function caricaTutto() {
  const [catSnap, prodSnap] = await Promise.all([
    getDocs(query(collection(db, 'magazzino_categorie'), orderBy('ordine'))),
    getDocs(collection(db, 'magazzino_prodotti'))
  ]);
  categorie = catSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(c => c.attiva !== false);
  prodotti = prodSnap.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .filter(p => p.attivo !== false)
    .sort((a, b) => a.nome.localeCompare(b.nome, 'it'));
  render();
}

// ── Griglia: colonne = categorie, righe = prodotti ──────────────────────────
function render() {
  const contatore = prodotti.filter(daComprare).length;
  document.getElementById('sotto-soglia-wrap').innerHTML = contatore
    ? `<span class="sotto-soglia-count">⚠️ ${contatore} prodott${contatore === 1 ? 'o' : 'i'} da comprare</span>`
    : '';

  const grid = document.getElementById('mag-grid');
  grid.innerHTML = '';

  const catIds = new Set(categorie.map(c => c.id));
  const senzaCategoria = prodotti.filter(p => !catIds.has(p.categoria));

  categorie.forEach((c, i) => grid.appendChild(renderColonna(c, prodotti.filter(p => p.categoria === c.id), i)));
  if (senzaCategoria.length) grid.appendChild(renderColonna({ id: null, nome: 'Senza categoria' }, senzaCategoria, -1, true));

  grid.appendChild(renderColonnaNuova());
}

function renderColonna(c, prodottiCat, indice, sola = false) {
  const col = document.createElement('div');
  col.className = 'mag-col' + (collassate.has(c.id) ? ' collassata' : '');

  const header = document.createElement('div');
  header.className = 'mag-col-header';
  header.innerHTML = sola
    ? `<span class="mag-col-nome" style="padding:4px 2px;">${esc(c.nome)}</span>`
    : `
      <button class="col-mini-btn" data-act="collassa" title="Comprimi/espandi">${collassate.has(c.id) ? '▸' : '▾'}</button>
      <input class="mag-col-nome" value="${esc(c.nome)}">
      <button class="col-mini-btn" data-act="left" title="Sposta a sinistra" ${indice === 0 ? 'disabled' : ''}>◀</button>
      <button class="col-mini-btn" data-act="right" title="Sposta a destra" ${indice === categorie.length - 1 ? 'disabled' : ''}>▶</button>
      <button class="col-mini-btn" data-act="del" title="Elimina categoria">🗑️</button>`;
  col.appendChild(header);

  const body = document.createElement('div');
  body.className = 'mag-col-body';
  if (!prodottiCat.length) {
    body.innerHTML = `<div class="mag-col-empty">Nessun prodotto.</div>`;
  } else {
    prodottiCat.forEach(p => body.appendChild(renderProdCell(p)));
  }
  col.appendChild(body);

  if (!sola) {
    const addWrap = document.createElement('div');
    addWrap.className = 'mag-col-add';
    addWrap.innerHTML = `<button>➕ Prodotto</button>`;
    addWrap.querySelector('button').addEventListener('click', () => apriModalProdotto(null, c.id));
    col.appendChild(addWrap);

    header.querySelector('[data-act=collassa]').addEventListener('click', () => {
      if (collassate.has(c.id)) collassate.delete(c.id); else collassate.add(c.id);
      render();
    });
    header.querySelector('.mag-col-nome').addEventListener('change', async e => {
      const nuovoNome = e.target.value.trim();
      if (!nuovoNome) { e.target.value = c.nome; return; }
      c.nome = nuovoNome;
      await updateDoc(doc(db, 'magazzino_categorie', c.id), { nome: nuovoNome });
    });
    const btnLeft = header.querySelector('[data-act=left]');
    const btnRight = header.querySelector('[data-act=right]');
    if (btnLeft) btnLeft.addEventListener('click', () => spostaCategoria(indice, -1));
    if (btnRight) btnRight.addEventListener('click', () => spostaCategoria(indice, 1));
    header.querySelector('[data-act=del]').addEventListener('click', () => eliminaCategoria(c));
  }

  return col;
}

function renderColonnaNuova() {
  const col = document.createElement('div');
  col.className = 'mag-col-new';
  col.innerHTML = `
    <input type="text" id="nuova-cat-nome" placeholder="Nome nuova categoria...">
    <button id="btn-nuova-cat">➕ Categoria</button>`;
  col.querySelector('#btn-nuova-cat').addEventListener('click', async () => {
    const input = col.querySelector('#nuova-cat-nome');
    const nome = input.value.trim();
    if (!nome) return;
    const ordine = categorie.length ? Math.max(...categorie.map(c => c.ordine)) + 1 : 0;
    await addDoc(collection(db, 'magazzino_categorie'), { nome, ordine, attiva: true });
    await caricaTutto();
  });
  return col;
}

function renderProdCell(p) {
  const cell = document.createElement('div');
  const sotto = sottoSoglia(p);
  const modalita = modalitaProdotto(p);
  cell.className = 'prod-cell' + (sotto ? ' sotto' : '');

  const meta = modalita === 'soglia'
    ? `soglia ${esc(p.soglia_minima ?? 0)}`
    : `<span class="modalita-badge">${esc(ETICHETTA_MODALITA[modalita])}</span>`;

  cell.innerHTML = `
    <div class="prod-cell-nome">${esc(p.nome)}${sotto ? '<span class="sotto-badge">sotto soglia</span>' : ''}</div>
    <div class="prod-cell-meta">${meta}${p.prezzo_riferimento != null ? ' · ' + fmtEuro(p.prezzo_riferimento) : ''}</div>
    <div class="prod-cell-qty">
      <button class="qty-btn btn-meno">−</button>
      <span class="qty-val">${p.quantita_attuale ?? 0} ${esc(p.unita || '')}</span>
      <button class="qty-btn btn-piu">+</button>
    </div>
    ${modalita === 'manuale' ? `<label class="serve-toggle"><input type="checkbox" class="chk-serve" ${p.serve ? 'checked' : ''}> serve alla prossima spesa</label>` : ''}`;

  const salvaQty = async n => {
    if (isNaN(n)) return;
    p.quantita_attuale = n;
    await updateDoc(doc(db, 'magazzino_prodotti', p.id), { quantita_attuale: n, aggiornato_il: serverTimestamp() });
    render();
  };
  cell.querySelector('.btn-meno').addEventListener('click', e => { e.stopPropagation(); salvaQty((p.quantita_attuale ?? 0) - 1); });
  cell.querySelector('.btn-piu').addEventListener('click', e => { e.stopPropagation(); salvaQty((p.quantita_attuale ?? 0) + 1); });
  const chkServe = cell.querySelector('.chk-serve');
  if (chkServe) chkServe.addEventListener('click', async e => {
    e.stopPropagation();
    p.serve = e.target.checked;
    await updateDoc(doc(db, 'magazzino_prodotti', p.id), { serve: p.serve, aggiornato_il: serverTimestamp() });
  });
  cell.addEventListener('click', () => apriModalProdotto(p));
  return cell;
}

// ── Riordino colonne (helper condiviso con la Lista spesa) ───────────────
async function spostaCategoria(i, delta) {
  if (await spostaCategoriaOrdine(categorie, i, delta)) await caricaTutto();
}

// ── Eliminazione categoria (con gestione prodotti orfani) ───────────────────
let catDaEliminare = null;

function eliminaCategoria(c) {
  const inCategoria = prodotti.filter(p => p.categoria === c.id);
  if (!inCategoria.length) {
    if (confirm(`Eliminare la categoria "${c.nome}"?`)) eseguiEliminaCategoria(c, []);
    return;
  }
  catDaEliminare = c;
  document.getElementById('ec-messaggio').textContent =
    `La categoria "${c.nome}" contiene ${inCategoria.length} prodott${inCategoria.length === 1 ? 'o' : 'i'}. Cosa vuoi fare?`;
  const selDest = document.getElementById('ec-select-dest');
  selDest.innerHTML = categorie.filter(x => x.id !== c.id).map(x => `<option value="${esc(x.id)}">${esc(x.nome)}</option>`).join('');
  document.querySelector('input[name=ec-scelta][value=sposta]').checked = true;
  document.getElementById('modal-elimina-cat').classList.add('open');
}

document.getElementById('ec-annulla').addEventListener('click', () => document.getElementById('modal-elimina-cat').classList.remove('open'));
document.getElementById('ec-conferma').addEventListener('click', async () => {
  const c = catDaEliminare;
  const inCategoria = prodotti.filter(p => p.categoria === c.id);
  const scelta = document.querySelector('input[name=ec-scelta]:checked').value;
  document.getElementById('modal-elimina-cat').classList.remove('open');

  if (scelta === 'sposta') {
    const dest = document.getElementById('ec-select-dest').value;
    if (!dest) { alert('Nessuna categoria di destinazione disponibile.'); return; }
    await eseguiEliminaCategoria(c, inCategoria, dest);
  } else {
    await eseguiEliminaCategoria(c, inCategoria, null);
  }
});

async function eseguiEliminaCategoria(c, prodottiCoinvolti, destCategoriaId) {
  const batch = writeBatch(db);
  prodottiCoinvolti.forEach(p => {
    const ref = doc(db, 'magazzino_prodotti', p.id);
    if (destCategoriaId) batch.update(ref, { categoria: destCategoriaId });
    else batch.delete(ref);
  });
  batch.delete(doc(db, 'magazzino_categorie', c.id));
  await batch.commit();
  await caricaTutto();
}

// ── Modal prodotto ────────────────────────────────────────────────────────
let editUid = null;

function popolaSelectCategorie() {
  const sel = document.getElementById('pm-categoria');
  sel.innerHTML = categorie.map(c => `<option value="${esc(c.id)}">${esc(c.nome)}</option>`).join('');
}

function aggiornaVisibilitaCampiModalita() {
  const m = document.getElementById('pm-modalita').value;
  document.getElementById('pm-soglia-wrap').style.display = m === 'soglia' ? '' : 'none';
  document.getElementById('pm-ricorrente-wrap').style.display = m === 'ricorrente' ? '' : 'none';
  document.getElementById('pm-scorta-wrap').style.display = m === 'soglia' ? '' : 'none';
}
document.getElementById('pm-modalita').addEventListener('change', aggiornaVisibilitaCampiModalita);

function apriModalProdotto(p, categoriaDefault) {
  popolaSelectCategorie();
  editUid = p?.id || null;
  document.getElementById('pm-title').textContent = p ? '✏️ Modifica prodotto' : '➕ Nuovo prodotto';
  document.getElementById('pm-nome').value = p?.nome || '';
  document.getElementById('pm-categoria').value = p?.categoria || categoriaDefault || (categorie[0]?.id || '');
  document.getElementById('pm-unita').value = p?.unita || '';
  document.getElementById('pm-quantita').value = p?.quantita_attuale ?? 0;
  document.getElementById('pm-modalita').value = p?.modalita_riordino || 'soglia';
  document.getElementById('pm-soglia').value = p?.soglia_minima ?? 0;
  document.getElementById('pm-quantita-ricorrente').value = p?.quantita_ricorrente ?? '';
  document.getElementById('pm-scorta-obiettivo').value = p?.scorta_obiettivo ?? '';
  document.getElementById('pm-serve').checked = !!p?.serve;
  document.getElementById('pm-prezzo').value = p?.prezzo_riferimento ?? '';
  document.getElementById('pm-error').textContent = '';
  document.getElementById('pm-elimina').style.display = p ? 'block' : 'none';
  aggiornaVisibilitaCampiModalita();
  document.getElementById('modal-prodotto').classList.add('open');
}

document.getElementById('btn-nuovo-prodotto').addEventListener('click', () => apriModalProdotto(null));
document.getElementById('pm-annulla').addEventListener('click', () => document.getElementById('modal-prodotto').classList.remove('open'));

document.getElementById('pm-salva').addEventListener('click', async () => {
  const nome = document.getElementById('pm-nome').value.trim();
  const errEl = document.getElementById('pm-error');
  if (!nome) { errEl.textContent = 'Inserisci il nome del prodotto.'; return; }
  const categoria = document.getElementById('pm-categoria').value;
  const unita = document.getElementById('pm-unita').value.trim();
  const quantita_attuale = parseFloat(document.getElementById('pm-quantita').value) || 0;
  const modalita_riordino = document.getElementById('pm-modalita').value;
  const soglia_minima = parseFloat(document.getElementById('pm-soglia').value) || 0;
  const ricorrenteRaw = document.getElementById('pm-quantita-ricorrente').value;
  const quantita_ricorrente = ricorrenteRaw === '' ? null : parseFloat(ricorrenteRaw);
  const scorteRaw = document.getElementById('pm-scorta-obiettivo').value;
  const scorta_obiettivo = scorteRaw === '' ? null : parseFloat(scorteRaw);
  const serve = document.getElementById('pm-serve').checked;
  const prezzoRaw = document.getElementById('pm-prezzo').value;
  const prezzo_riferimento = prezzoRaw === '' ? null : parseFloat(prezzoRaw);

  const dati = { nome, categoria, unita, quantita_attuale, modalita_riordino, soglia_minima, quantita_ricorrente, scorta_obiettivo, serve, prezzo_riferimento, attivo: true, aggiornato_il: serverTimestamp() };

  try {
    if (editUid) {
      await updateDoc(doc(db, 'magazzino_prodotti', editUid), dati);
    } else {
      await setDoc(doc(collection(db, 'magazzino_prodotti')), { ...dati, creato_da: currentUser.uid, creato_il: serverTimestamp() });
    }
    document.getElementById('modal-prodotto').classList.remove('open');
    await caricaTutto();
  } catch (e) {
    errEl.textContent = 'Errore: ' + e.message;
  }
});

document.getElementById('pm-elimina').addEventListener('click', async () => {
  if (!editUid) return;
  if (!confirm('Eliminare questo prodotto dal magazzino?')) return;
  await deleteDoc(doc(db, 'magazzino_prodotti', editUid));
  document.getElementById('modal-prodotto').classList.remove('open');
  await caricaTutto();
});
</script>
</body>
</html>
