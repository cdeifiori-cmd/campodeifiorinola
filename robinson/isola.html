<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏝️ L'Isola Stanotte – Robinson</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#1a3a5c; --oro:#c8860a; --carta:#f5f0e8; --muted:#6b5c45; }

    body {
      background: #1a3a5c;
      font-family: 'Lora', serif;
      color: var(--navy);
      padding-bottom: 90px;
      min-height: 100vh;
    }

    #nav-auth-slot-wrap { position: fixed; top: 8px; right: 10px; z-index: 400; }

    .isola-title {
      text-align: center;
      padding: 14px 16px 4px;
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--carta);
      letter-spacing: 0.05em;
    }
    .isola-subtitle {
      text-align: center;
      font-size: 0.78rem;
      color: #c8b89a;
      font-style: italic;
      margin-bottom: 10px;
    }
    .msg-orario {
      text-align: center;
      background: rgba(200,134,10,0.18);
      border: 1px solid #c8860a55;
      border-radius: 10px;
      color: #c8b89a;
      font-size: 0.82rem;
      font-style: italic;
      padding: 8px 16px;
      margin: 0 12px 10px;
      display: none;
    }

    /* ── Mappa ── */
    #mappa-container {
      width: 100%; overflow: hidden; position: relative;
      background: #0d2240; touch-action: none;
      cursor: grab; user-select: none;
    }
    #mappa-container:active { cursor: grabbing; }
    #mappa-inner { position: relative; display: inline-block; transform-origin: 0 0; overflow: visible; }
    #mappa-inner img { display: block; width: 100%; max-width: 100%; pointer-events: none; }

    .zoom-controls {
      position: absolute; bottom: 8px; right: 8px; z-index: 50;
      display: flex; flex-direction: column; gap: 4px;
    }
    .zoom-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(26,58,92,0.75); color: #c8860a;
      font-size: 18px; font-weight: bold; border: 1px solid #c8860a60;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .zoom-btn:hover { background: rgba(26,58,92,0.95); }

    /* ── Hotspot ── */
    .hotspot {
      position: absolute; transform: translate(-50%, -50%);
      width: 48px; height: 48px;
      background: transparent !important; border: none !important;
      padding: 0; cursor: pointer;
      font-size: 0 !important; color: transparent !important;
      -webkit-tap-highlight-color: transparent; z-index: 10; outline: none;
    }
    .hotspot:hover { background: rgba(200,134,10,0.15) !important; border-radius: 50%; }

    /* ── Badge presenze ── */
    @keyframes lampeggia {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ── Popup leggero ── */
    .popup-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 500; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .popup-overlay.open { opacity: 1; pointer-events: all; }
    .popup-card {
      background: var(--carta); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 560px; padding: 20px 20px 32px;
      transform: translateY(100%); transition: transform 0.25s ease;
    }
    .popup-overlay.open .popup-card { transform: translateY(0); }
    .popup-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .popup-emoji { font-size: 2.2rem; margin-right: 10px; }
    .popup-nome { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--navy); flex: 1; }
    .popup-close {
      background: #e0d8cc; border: none; border-radius: 50%;
      width: 32px; height: 32px; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .popup-count {
      background: linear-gradient(135deg, rgba(200,134,10,0.15), rgba(200,134,10,0.3));
      border: 1.5px solid var(--oro); border-radius: 12px;
      padding: 12px 16px; font-size: 0.92rem; color: var(--navy);
      font-weight: 600; text-align: center;
    }
    .popup-hint {
      text-align: center; font-size: 0.78rem; color: var(--muted);
      font-style: italic; margin-top: 8px;
    }
  </style>
</head>
<body>

<div id="nav-auth-slot-wrap"><div id="nav-auth-slot"></div></div>

<div class="isola-title">🏝️ L'Isola Stanotte</div>
<div class="isola-subtitle">Dove sono i naufraghi questa notte?</div>
<div class="msg-orario" id="msg-orario">🌅 I naufraghi scelgono il loro luogo dalle 23:00</div>

<div id="mappa-container">
  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomIn">+</button>
    <button class="zoom-btn" id="zoomOut">−</button>
  </div>
  <div id="mappa-inner">
    <img src="isola.png" alt="Mappa dell'isola" id="mappaImg" draggable="false">
  </div>
</div>

<!-- Popup leggero (solo info, no form) -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-card">
    <div class="popup-header">
      <span class="popup-emoji" id="popupEmoji"></span>
      <span class="popup-nome" id="popupNome"></span>
      <button class="popup-close" id="popupClose">✕</button>
    </div>
    <div class="popup-count" id="popupCount"></div>
    <div class="popup-hint">Vai sul tuo diario per scegliere il tuo luogo stanotte</div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="villaggio.html" class="nav-item"><span class="nav-icon">🏡</span><span>Villaggio</span></a>
  <a href="spiaggia.html" class="nav-item"><span class="nav-icon">🏖️</span><span>Spiaggia</span></a>
  <a href="diari.html" class="nav-item"><span class="nav-icon">📖</span><span>Diari</span></a>
  <a href="isola.html" class="nav-item active"><span class="nav-icon">🏝️</span><span>Isola</span></a>
  <a href="notte.html" class="nav-item"><span class="nav-icon">🌙</span><span>Notte</span></a>
  <a href="naufraghi.html" class="nav-item"><span class="nav-icon">🧍</span><span>Naufraghi</span></a>
</nav>

<script type="module">
import { db, auth } from './js/robinson-firebase.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, setDoc, getDocs, collection, query, where,
  onSnapshot, arrayUnion, increment, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

setupNavAuth('nav-auth-slot');

const luoghiIsola = [
  { id:"spiaggia-fiducia",     nome:"Spiaggia della Fiducia",     emoji:"🌴", x:31, y:29 },
  { id:"faro-sogni",           nome:"Faro dei Sogni",             emoji:"🗼", x:49, y:21 },
  { id:"promontorio-coraggio", nome:"Promontorio del Coraggio",   emoji:"🧭", x:66, y:23 },
  { id:"baia-calma",           nome:"Baia della Calma",           emoji:"🌊", x:84, y:31 },
  { id:"villaggio-amicizia",   nome:"Villaggio dell'Amicizia",    emoji:"🤝", x:18, y:43 },
  { id:"vulcano-rabbia",       nome:"Vulcano della Rabbia",       emoji:"🌋", x:46, y:49 },
  { id:"laguna-pazienza",      nome:"Laguna della Pazienza",      emoji:"🐢", x:12, y:65 },
  { id:"caverna-tristezza",    nome:"Caverna della Tristezza",    emoji:"🌧️", x:69, y:50 },
  { id:"tempesta-caos",        nome:"Tempesta del Caos",          emoji:"⛈️", x:84, y:57 },
  { id:"deserto-solitudine",   nome:"Deserto della Solitudine",   emoji:"🌪️", x:36, y:70 },
  { id:"scoglio-dolore",       nome:"Scoglio del Dolore",         emoji:"💔", x:56, y:70 },
  { id:"nebbia-dubbi",         nome:"Nebbia dei Dubbi",           emoji:"🌫️", x:76, y:74 },
  { id:"isola-paure",          nome:"Isola delle Paure",          emoji:"🔒", x:24, y:86 },
  { id:"bivio-scelte",         nome:"Bivio delle Scelte",         emoji:"🚧", x:49, y:89 },
  { id:"tramonto-gratitudine", nome:"Tramonto della Gratitudine", emoji:"🌅", x:72, y:88 }
];

// TODO: ripristinare controllo orario prima del lancio
function isOraCompilazione() { return true; } // temporaneamente sempre accessibile per test
document.getElementById('msg-orario').style.display = 'none';

function getDataNotte() {
  const now = new Date();
  if (now.getHours() < 5) {
    const ieri = new Date(now); ieri.setDate(ieri.getDate() - 1);
    return ieri.getFullYear() + '-' + String(ieri.getMonth()+1).padStart(2,'0') + '-' + String(ieri.getDate()).padStart(2,'0');
  }
  return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
}

const presenzeMap = {};
let luogoPopup = null;

onAuthStateChanged(auth, user => {
  buildHotspot();
  if (user) {
    const _apertura = new Date('2026-07-01T22:00:00');
    if (user.uid !== 'mCSgNMVEphVIIf4HX0bkcKq2ZKv2' && new Date() < _apertura) { window.location.href = 'attesa.html'; return; }
    startPresenzeListener();
  }
});

function buildHotspot() {
  const inner = document.getElementById('mappa-inner');
  inner.querySelectorAll('.hotspot').forEach(el => el.remove());
  luoghiIsola.forEach(luogo => {
    const btn = document.createElement('button');
    btn.className = 'hotspot';
    btn.dataset.id = luogo.id;
    btn.style.left = luogo.x + '%';
    btn.style.top = luogo.y + '%';
    btn.title = luogo.nome;
    btn.setAttribute('aria-label', luogo.nome);
    btn.textContent = luogo.emoji;
    btn.addEventListener('click', () => apriPopup(luogo));
    inner.appendChild(btn);
  });
}

function aggiornaBadge(luogoId, count) {
  document.querySelectorAll(`.presenza-badge[data-luogo="${luogoId}"]`).forEach(el => el.remove());
  if (!count || count === 0) return;
  const inner = document.getElementById('mappa-inner');
  const img = inner.querySelector('img');
  const coords = luoghiIsola.find(l => l.id === luogoId);
  if (!coords) return;
  const x = (coords.x / 100) * img.offsetWidth;
  const y = (coords.y / 100) * img.offsetHeight;
  const badge = document.createElement('div');
  badge.className = 'presenza-badge';
  badge.dataset.luogo = luogoId;
  badge.textContent = count;
  badge.style.cssText = `position:absolute;left:${x}px;top:${y}px;transform:translate(-50%,-100%);background:#fff;color:#1a3a5c;border:3px solid #c8860a;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;font-family:'Playfair Display',serif;box-shadow:0 3px 8px rgba(0,0,0,0.8);z-index:100;pointer-events:none;animation:lampeggia 1.5s ease-in-out infinite;`;
  inner.appendChild(badge);
}

function ricalcolaBadge() {
  const inner = document.getElementById('mappa-inner');
  const img = inner.querySelector('img');
  inner.querySelectorAll('.presenza-badge').forEach(badge => {
    const coords = luoghiIsola.find(l => l.id === badge.dataset.luogo);
    if (coords) {
      badge.style.left = (coords.x / 100) * img.offsetWidth + 'px';
      badge.style.top = (coords.y / 100) * img.offsetHeight + 'px';
    }
  });
}

function startPresenzeListener() {
  const dataNotte = getDataNotte();
  const q = query(collection(db, 'robinson_isola_presenze'), where('data', '==', dataNotte));
  onSnapshot(q, (snap) => {
    document.querySelectorAll('.presenza-badge').forEach(el => el.remove());
    Object.keys(presenzeMap).forEach(k => delete presenzeMap[k]);
    for (const docSnap of snap.docs) {
      const d = docSnap.data();
      presenzeMap[d.luogoId] = d.count || 0;
      aggiornaBadge(d.luogoId, d.count || 0);
      if (luogoPopup && luogoPopup.id === d.luogoId) aggiornaPopupCount(d.count || 0);
    }
  });
  scheduleReset();
}

async function salvaArchivioNotte() {
  const dataNotte = getDataNotte();
  try {
    const snap = await getDocs(query(
      collection(db, 'robinson_isola_presenze'),
      where('data', '==', dataNotte)
    ));
    const archivio = {};
    snap.forEach(d => {
      const dati = d.data();
      archivio[dati.luogoId] = { count: dati.count || 0, presenze: dati.presenze || [] };
    });
    await setDoc(
      doc(db, 'robinson_isola_archivio', dataNotte),
      { data: dataNotte, luoghi: archivio, salvatoAt: serverTimestamp() }
    );
  } catch(e) { console.error('Archivio notte:', e); }
}

function scheduleReset() {
  const ora = new Date();
  const reset = new Date();
  reset.setHours(3, 0, 0, 0);
  if (ora >= reset) reset.setDate(reset.getDate() + 1);
  const msToReset = reset - ora;
  setTimeout(async () => {
    await salvaArchivioNotte();
    document.querySelectorAll('.presenza-badge').forEach(el => el.remove());
  }, msToReset);
}

function apriPopup(luogo) {
  luogoPopup = luogo;
  document.getElementById('popupEmoji').textContent = luogo.emoji;
  document.getElementById('popupNome').textContent = luogo.nome;
  aggiornaPopupCount(presenzeMap[luogo.id] || 0);
  document.getElementById('popupOverlay').classList.add('open');
}
function aggiornaPopupCount(count) {
  document.getElementById('popupCount').textContent =
    count === 0 ? 'Nessuno ancora questa notte' :
    '🏕️ ' + count + (count === 1 ? ' naufrago stanotte' : ' naufraghi stanotte');
}
function chiudiPopup() { document.getElementById('popupOverlay').classList.remove('open'); luogoPopup = null; }
document.getElementById('popupClose').addEventListener('click', chiudiPopup);
document.getElementById('popupOverlay').addEventListener('click', e => { if (e.target === document.getElementById('popupOverlay')) chiudiPopup(); });

// ── Zoom + Pan ─────────────────────────────────────────────────────────────────
let scale = 1, translateX = 0, translateY = 0;
let isPinching = false, isDragging = false;
let pinchStartDist = 0, pinchStartScale = 1, lastX = 0, lastY = 0;
let dragStartX = 0, dragStartY = 0;
const MIN_SCALE = 1, MAX_SCALE = 4;
const container = document.getElementById('mappa-container');
const inner = document.getElementById('mappa-inner');
const mappaImg = document.getElementById('mappaImg');

function clampT(x, y, s) {
  const cw = container.clientWidth, ch = container.clientHeight;
  const iw = inner.clientWidth * s, ih = inner.clientHeight * s;
  return [Math.min(0, Math.max(x, cw - iw)), Math.min(0, Math.max(y, ch - ih))];
}
function applyT() {
  [translateX, translateY] = clampT(translateX, translateY, scale);
  inner.style.transform = `translate(${translateX}px,${translateY}px) scale(${scale})`;
  inner.style.transformOrigin = '0 0';
  ricalcolaBadge();
}
function setH() { if (mappaImg.naturalWidth) container.style.height = container.offsetWidth * (mappaImg.naturalHeight / mappaImg.naturalWidth) + 'px'; }
mappaImg.addEventListener('load', setH); if (mappaImg.complete) setH();
window.addEventListener('resize', () => { setH(); applyT(); });

function getDist(t) { return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY); }
function getMid(t, r) { return { x:((t[0].clientX+t[1].clientX)/2)-r.left, y:((t[0].clientY+t[1].clientY)/2)-r.top }; }

container.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    e.preventDefault(); isPinching=true; isDragging=false;
    pinchStartDist=getDist(e.touches); pinchStartScale=scale; lastX=translateX; lastY=translateY;
  } else if (e.touches.length === 1) {
    isDragging=true; isPinching=false;
    dragStartX=e.touches[0].clientX-translateX; dragStartY=e.touches[0].clientY-translateY;
  }
}, {passive:false});
container.addEventListener('touchmove', e => {
  e.preventDefault();
  if (isPinching && e.touches.length===2) {
    const ns = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchStartScale*(getDist(e.touches)/pinchStartDist)));
    const r=container.getBoundingClientRect(), m=getMid(e.touches,r);
    translateX=m.x-(m.x-lastX)*(ns/pinchStartScale);
    translateY=m.y-(m.y-lastY)*(ns/pinchStartScale);
    scale=ns; applyT();
  } else if (isDragging && e.touches.length===1) {
    translateX=e.touches[0].clientX-dragStartX; translateY=e.touches[0].clientY-dragStartY; applyT();
  }
}, {passive:false});
container.addEventListener('touchend', e => { if(e.touches.length<2) isPinching=false; if(e.touches.length===0) isDragging=false; });
container.addEventListener('mousedown', e => { isDragging=true; dragStartX=e.clientX-translateX; dragStartY=e.clientY-translateY; container.style.cursor='grabbing'; });
container.addEventListener('mousemove', e => { if(!isDragging) return; translateX=e.clientX-dragStartX; translateY=e.clientY-dragStartY; applyT(); });
container.addEventListener('mouseup', () => { isDragging=false; container.style.cursor='grab'; });
container.addEventListener('mouseleave', () => { isDragging=false; container.style.cursor='grab'; });
container.addEventListener('wheel', e => {
  e.preventDefault();
  const ns=Math.min(MAX_SCALE,Math.max(MIN_SCALE,scale*(e.deltaY>0?0.9:1.1)));
  const r=container.getBoundingClientRect();
  translateX=e.clientX-r.left-(e.clientX-r.left-translateX)*(ns/scale);
  translateY=e.clientY-r.top-(e.clientY-r.top-translateY)*(ns/scale);
  scale=ns; applyT();
}, {passive:false});
document.getElementById('zoomIn').addEventListener('click', () => {
  const ns=Math.min(MAX_SCALE,scale*1.3), cx=container.clientWidth/2, cy=container.clientHeight/2;
  translateX=cx-(cx-translateX)*(ns/scale); translateY=cy-(cy-translateY)*(ns/scale); scale=ns; applyT();
});
document.getElementById('zoomOut').addEventListener('click', () => {
  const ns=Math.max(MIN_SCALE,scale/1.3);
  if(ns===MIN_SCALE){translateX=0;translateY=0;} else {
    const cx=container.clientWidth/2, cy=container.clientHeight/2;
    translateX=cx-(cx-translateX)*(ns/scale); translateY=cy-(cy-translateY)*(ns/scale);
  }
  scale=ns; applyT();
});
</script>
</body>
</html>
