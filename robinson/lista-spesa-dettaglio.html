<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spesa – Robinson</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
  <meta name="theme-color" content="#1a3a5c">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    body { padding-bottom: 100px; }
    #nav-auth-slot-wrap { position: fixed; top: 10px; right: 10px; z-index: 300; }

    .sd-header { background: linear-gradient(135deg, var(--navy) 0%, #0d1b2a 100%); color: #fff; padding: 20px 18px 16px; text-align: center; }
    .sd-header .breadcrumb { font-size: 0.75rem; margin-bottom: 4px; }
    .sd-header .breadcrumb a { color: var(--oro); text-decoration: none; }
    .sd-header h1 { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--oro-light); }
    .sd-totale { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--oro); margin-top: 6px; }
    .sd-badge { display: inline-block; margin-top: 6px; font-size: 0.7rem; font-weight: 700; padding: 3px 12px; border-radius: 20px; }
    .sd-badge.aperta { background:#fef9e7; color:#b7770d; border:1px solid #f39c12; }
    .sd-badge.chiusa { background:#d5f5e3; color:#1e8449; border:1px solid #2ecc71; }

    .sd-toolbar { display: flex; gap: 8px; justify-content: center; padding: 12px; flex-wrap: wrap; }
    /* Nessun max-width: la griglia deve occupare tutta la larghezza del
       desktop come nel Magazzino, con scroll orizzontale se le colonne non
       entrano (vedi §5 del brief). */
    .sd-content { padding: 0 12px 20px; }

    .riepilogo-chiusura { background: var(--oro-light); border: 1.5px solid var(--oro); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: 0.85rem; }

    /* Griglia: colonne = categorie (stessa struttura/CSS del Magazzino) */
    .mag-grid { display: flex; gap: 12px; align-items: flex-start; padding: 4px 0 20px; overflow-x: auto; }
    .mag-col { flex: 0 0 250px; background: var(--post-bg); border: 2px solid var(--carta-scura); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .mag-col-header { background: var(--navy); color: #fff; display: flex; align-items: center; gap: 4px; padding: 8px 10px; }
    .mag-col-nome { flex: 1; min-width: 0; color: var(--oro-light); font-family: 'Playfair Display', serif; font-weight: 700; font-size: 0.88rem; }
    .col-mini-btn { background: rgba(255,255,255,0.12); border: none; color: #fff; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; flex-shrink: 0; }
    .col-mini-btn:hover { background: rgba(255,255,255,0.28); }
    .mag-col-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .mag-col-add { padding: 0 8px 8px; }
    .mag-col-add button { width: 100%; background: none; border: 1px dashed var(--oro); color: var(--oro); border-radius: 8px; padding: 6px; cursor: pointer; font-size: 0.78rem; font-family: 'Lora', serif; }
    .mag-col-add button:hover { background: var(--oro-light); }
    .mag-col.collassata .mag-col-body, .mag-col.collassata .mag-col-add { display: none; }
    .mag-col-empty { font-size: 0.75rem; color: var(--muted); font-style: italic; padding: 6px 2px; }

    @media (max-width: 720px) {
      .mag-grid { flex-direction: column; overflow-x: visible; }
      .mag-col { flex: 1 1 auto; width: 100%; }
    }

    /* Cella voce */
    .voce-cell { background: #fff; border-left: 4px solid var(--navy); border-radius: 4px 8px 8px 4px; padding: 8px 10px; box-shadow: 1px 1px 6px rgba(26,58,92,0.08); }
    .voce-cell.presa { opacity: 0.7; }
    .voce-top { display: flex; align-items: center; gap: 6px; }
    .voce-nome { flex: 1; min-width: 0; font-weight: 600; color: var(--navy); font-size: 0.84rem; }
    .voce-nome .origine-tag { font-size: 0.62rem; color: var(--muted); font-weight: 400; margin-left: 4px; }
    .voce-del { background: none; border: none; color: var(--rosso); cursor: pointer; font-size: 0.85rem; padding: 2px 4px; flex-shrink: 0; }
    .voce-fields { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
    .voce-fields input[type=number] { width: 64px; padding: 5px 6px; border: 1.5px solid #c8b89a; border-radius: 6px; font-family: 'Lora', serif; font-size: 0.8rem; }
    .voce-fields .voce-unita { font-size: 0.72rem; color: var(--muted); }
    .voce-importo { font-weight: 700; color: var(--oro); margin-left: auto; font-size: 0.84rem; }
    .voce-checks { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
    .voce-checks label { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; cursor: pointer; }
    .voce-crea-prod { font-size: 0.68rem; margin-top: 6px; background: none; border: 1px dashed var(--oro); color: var(--oro); border-radius: 6px; padding: 3px 8px; cursor: pointer; width: 100%; }

    .modal-box.wide { max-width: 420px; }
  </style>
</head>
<body>

<div id="nav-auth-slot-wrap"><div id="nav-auth-slot"></div></div>

<div class="sd-header">
  <div class="breadcrumb"><a href="gestione.html">📦 Gestione</a> · <a href="liste-spesa.html">Lista spesa</a></div>
  <h1 id="sd-titolo">Spesa del …</h1>
  <div class="sd-totale" id="sd-totale">€0,00</div>
  <div id="sd-badge-wrap"></div>
</div>

<div class="sd-toolbar" id="sd-toolbar"></div>

<div class="sd-content">
  <div id="sd-riepilogo"></div>
  <div class="mag-grid" id="sd-grid"><div class="spinner"></div></div>
</div>

<!-- Modal nuova voce -->
<div class="modal-overlay" id="modal-voce">
  <div class="modal-box wide">
    <div class="modal-title">➕ Nuova voce</div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="vm-nome" placeholder="Es. Pane">
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <select id="vm-categoria"></select>
    </div>
    <div style="display:flex;gap:10px;">
      <div class="form-group" style="flex:1;">
        <label>Quantità</label>
        <input type="number" id="vm-quantita" step="any" placeholder="–">
      </div>
      <div class="form-group" style="flex:1;">
        <label>Unità</label>
        <input type="text" id="vm-unita" placeholder="pz, kg...">
      </div>
    </div>
    <div class="form-group">
      <label>Prezzo unitario (€)</label>
      <input type="number" id="vm-prezzo" step="0.01" placeholder="–">
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-primary" id="vm-salva" style="flex:1;">💾 Aggiungi</button>
      <button class="btn" id="vm-annulla" style="background:none;border:1.5px solid var(--navy);color:var(--navy);">Annulla</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="gestione.html" class="nav-item"><span class="nav-icon">📦</span><span>Gestione</span></a>
  <a href="magazzino.html" class="nav-item"><span class="nav-icon">📦</span><span>Magazzino</span></a>
  <a href="liste-spesa.html" class="nav-item active"><span class="nav-icon">🛒</span><span>Spesa</span></a>
  <a href="gestione-storico.html" class="nav-item"><span class="nav-icon">📊</span><span>Storico</span></a>
</nav>

<script type="module">
import { db } from './js/robinson-firebase.js';
import { requireAuth } from './js/robinson-auth.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { esc } from './js/robinson-utils.js';
import { puoAccedereGestione, prodottiDaComprare, spostaCategoriaOrdine, fmtEuro, fmtDataBreve, quantitaSuggerita } from './js/robinson-magazzino.js';
import {
  doc, getDoc, updateDoc, deleteDoc, addDoc, collection, getDocs, query, orderBy,
  serverTimestamp, writeBatch, increment
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

setupNavAuth('nav-auth-slot');

const params = new URLSearchParams(window.location.search);
const listaId = params.get('id');
let currentUser = null;
let lista = null;
let voci = [];
let categorie = [];
const collassate = new Set(); // id categoria collassate (solo UI, non persistito)

if (!listaId) {
  document.getElementById('sd-grid').innerHTML = `<p class="empty-msg">Lista non trovata.</p>`;
} else {
  requireAuth(async user => {
    currentUser = user;
    const ok = await puoAccedereGestione(user);
    if (!ok) { window.location.replace('index.html'); return; }
    await caricaCategorie();
    await caricaTutto();
  });
}

async function caricaCategorie() {
  const snap = await getDocs(query(collection(db, 'magazzino_categorie'), orderBy('ordine')));
  categorie = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(c => c.attiva !== false);
}

// Riordino colonne (helper condiviso col Magazzino, agisce sul campo `ordine`)
async function spostaCategoria(i, delta) {
  if (await spostaCategoriaOrdine(categorie, i, delta)) { await caricaCategorie(); render(); }
}

async function caricaTutto() {
  const listaSnap = await getDoc(doc(db, 'liste_spesa', listaId));
  if (!listaSnap.exists()) {
    document.getElementById('sd-grid').innerHTML = `<p class="empty-msg">Lista non trovata.</p>`;
    return;
  }
  lista = listaSnap.data();
  const vociSnap = await getDocs(collection(db, 'liste_spesa', listaId, 'voci'));
  voci = vociSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
}

// ── Griglia: colonne = categorie, come nel Magazzino ────────────────────────
function render() {
  document.getElementById('sd-titolo').textContent = `Robinson 2026 — spesa del ${fmtDataBreve(lista.data)}`;
  document.getElementById('sd-totale').textContent = fmtEuro(lista.totale || 0);
  document.getElementById('sd-badge-wrap').innerHTML = `<span class="sd-badge ${lista.stato}">${lista.stato === 'chiusa' ? '✅ Chiusa' : '⏳ Aperta'}</span>`;

  const readonly = lista.stato === 'chiusa';

  const toolbar = document.getElementById('sd-toolbar');
  toolbar.innerHTML = '';
  if (!readonly) {
    toolbar.innerHTML = `
      <button class="btn" id="btn-aggiorna-magazzino" style="background:var(--carta-scura);color:var(--navy);">🔄 Aggiorna da magazzino</button>
      <button class="btn btn-primary" id="btn-chiudi-lista">✅ Chiudi lista</button>`;
    document.getElementById('btn-aggiorna-magazzino').addEventListener('click', aggiornaDaMagazzino);
    document.getElementById('btn-chiudi-lista').addEventListener('click', chiudiLista);
  } else {
    toolbar.innerHTML = `<button class="btn" id="btn-riapri-lista" style="background:none;border:1.5px solid var(--navy);color:var(--navy);">🔓 Riapri lista</button>`;
    document.getElementById('btn-riapri-lista').addEventListener('click', riapriLista);
  }

  const grid = document.getElementById('sd-grid');
  grid.innerHTML = '';

  const catIds = new Set(categorie.map(c => c.id));
  const senzaCategoria = voci.filter(v => !catIds.has(v.categoria));

  categorie.forEach((c, i) => grid.appendChild(renderColonna(c, voci.filter(v => v.categoria === c.id), readonly, false, i)));
  if (senzaCategoria.length) grid.appendChild(renderColonna({ id: null, nome: 'Senza categoria' }, senzaCategoria, readonly, true));
}

// Controlli di colonna identici al Magazzino (collassa/espandi, riordina con
// frecce sul campo `ordine` condiviso). Rinomina/elimina categoria restano
// invece solo nel Magazzino: è lì che si gestisce la tassonomia condivisa.
function renderColonna(c, vociCat, readonly, sola = false, indice = -1) {
  const col = document.createElement('div');
  col.className = 'mag-col' + (collassate.has(c.id) ? ' collassata' : '');

  const header = document.createElement('div');
  header.className = 'mag-col-header';
  header.innerHTML = sola
    ? `<span class="mag-col-nome">${esc(c.nome)}</span>`
    : `
      <button class="col-mini-btn" data-act="collassa" title="Comprimi/espandi">${collassate.has(c.id) ? '▸' : '▾'}</button>
      <span class="mag-col-nome">${esc(c.nome)}</span>
      <button class="col-mini-btn" data-act="left" title="Sposta a sinistra" ${indice === 0 ? 'disabled' : ''}>◀</button>
      <button class="col-mini-btn" data-act="right" title="Sposta a destra" ${indice === categorie.length - 1 ? 'disabled' : ''}>▶</button>`;
  if (!sola) {
    header.querySelector('[data-act=collassa]').addEventListener('click', () => {
      if (collassate.has(c.id)) collassate.delete(c.id); else collassate.add(c.id);
      render();
    });
    header.querySelector('[data-act=left]').addEventListener('click', () => spostaCategoria(indice, -1));
    header.querySelector('[data-act=right]').addEventListener('click', () => spostaCategoria(indice, 1));
  }
  col.appendChild(header);

  const body = document.createElement('div');
  body.className = 'mag-col-body';
  if (!vociCat.length) {
    body.innerHTML = `<div class="mag-col-empty">Nessuna voce.</div>`;
  } else {
    vociCat.forEach(v => body.appendChild(renderVoceCell(v, readonly)));
  }
  col.appendChild(body);

  if (!readonly && !sola) {
    const addWrap = document.createElement('div');
    addWrap.className = 'mag-col-add';
    addWrap.innerHTML = `<button>➕ Voce</button>`;
    addWrap.querySelector('button').addEventListener('click', () => apriModalVoce(c.id));
    col.appendChild(addWrap);
  }

  return col;
}

function calcolaImporto(v) {
  if (v.prezzo_unitario == null || v.quantita == null) return null;
  return Math.round(v.prezzo_unitario * v.quantita * 100) / 100;
}

function renderVoceCell(v, readonly) {
  const cell = document.createElement('div');
  cell.className = 'voce-cell' + (v.acquistato ? ' presa' : '');
  cell.innerHTML = `
    <div class="voce-top">
      <div class="voce-nome">${esc(v.nome)}${v.origine === 'manuale' ? '<span class="origine-tag">· manuale</span>' : ''}</div>
      ${!readonly ? `<button class="voce-del" title="Elimina voce">🗑️</button>` : ''}
    </div>
    <div class="voce-fields">
      <input type="number" class="v-quantita" step="any" placeholder="Qtà" value="${v.quantita ?? ''}" ${readonly ? 'disabled' : ''}>
      <span class="voce-unita">${esc(v.unita || '')}</span>
      <input type="number" class="v-prezzo" step="0.01" placeholder="€ unit." value="${v.prezzo_unitario ?? ''}" ${readonly ? 'disabled' : ''}>
      <span class="voce-importo">${fmtEuro(v.prezzo)}</span>
    </div>
    <div class="voce-checks">
      <label><input type="checkbox" class="v-acquistato" ${v.acquistato ? 'checked' : ''} ${readonly ? 'disabled' : ''}> Preso</label>
      <label><input type="checkbox" class="v-consumo" ${v.consumo_diretto ? 'checked' : ''} ${readonly ? 'disabled' : ''}> Consumo diretto</label>
    </div>
    ${(!v.prodotto_id) ? `<button class="voce-crea-prod">📦 Crea prodotto</button>` : ''}`;

  const salva = async campi => {
    Object.assign(v, campi);
    await updateDoc(doc(db, 'liste_spesa', listaId, 'voci', v.id), campi);
  };

  if (!readonly) {
    cell.querySelector('.voce-del').addEventListener('click', async () => {
      if (!confirm(`Eliminare "${v.nome}" dalla lista?`)) return;
      await deleteDoc(doc(db, 'liste_spesa', listaId, 'voci', v.id));
      voci = voci.filter(x => x.id !== v.id);
      await ricalcolaTotale();
      render();
    });
    cell.querySelector('.v-quantita').addEventListener('change', async e => {
      const q = e.target.value === '' ? null : parseFloat(e.target.value);
      const prezzo = calcolaImporto({ ...v, quantita: q });
      await salva({ quantita: q, prezzo });
      await ricalcolaTotale();
      render();
    });
    cell.querySelector('.v-prezzo').addEventListener('change', async e => {
      const pu = e.target.value === '' ? null : parseFloat(e.target.value);
      const prezzo = calcolaImporto({ ...v, prezzo_unitario: pu });
      await salva({ prezzo_unitario: pu, prezzo });
      await ricalcolaTotale();
      render();
    });
    cell.querySelector('.v-acquistato').addEventListener('change', e => salva({ acquistato: e.target.checked }));
    cell.querySelector('.v-consumo').addEventListener('change', e => salva({ consumo_diretto: e.target.checked }));
  }
  const btnCreaProd = cell.querySelector('.voce-crea-prod');
  if (btnCreaProd) btnCreaProd.addEventListener('click', () => creaProdottoDaVoce(v));

  return cell;
}

async function ricalcolaTotale() {
  const totale = Math.round(voci.reduce((s, v) => s + (v.prezzo || 0), 0) * 100) / 100;
  lista.totale = totale;
  await updateDoc(doc(db, 'liste_spesa', listaId), { totale });
}

// ── Aggiorna da magazzino (dedup su prodotto_id) ────────────────────────────
async function aggiornaDaMagazzino() {
  const prodSnap = await getDocs(collection(db, 'magazzino_prodotti'));
  const giaPresenti = new Set(voci.filter(v => v.prodotto_id).map(v => v.prodotto_id));
  const prodotti = prodSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const nuovi = prodottiDaComprare(prodotti).filter(p => !giaPresenti.has(p.id));

  if (!nuovi.length) { alert('Nessun nuovo prodotto da comprare da aggiungere.'); return; }

  await Promise.all(nuovi.map(p => addDoc(collection(db, 'liste_spesa', listaId, 'voci'), {
    nome: p.nome, categoria: p.categoria || null, origine: 'magazzino', prodotto_id: p.id,
    quantita: quantitaSuggerita(p), unita: p.unita || null, prezzo_unitario: p.prezzo_riferimento ?? null,
    prezzo: null, acquistato: false, consumo_diretto: false, caricato_a_magazzino: false, data_lista: lista.data
  })));

  // Il flag "serve" si azzera all'inserimento in lista (§4 del brief)
  const daAzzerare = nuovi.filter(p => p.serve);
  if (daAzzerare.length) {
    const batch = writeBatch(db);
    daAzzerare.forEach(p => batch.update(doc(db, 'magazzino_prodotti', p.id), { serve: false }));
    await batch.commit();
  }

  await caricaTutto();
  alert(`Aggiunti ${nuovi.length} nuovi prodotti da comprare.`);
}

// ── Chiudi lista: congela + reintegra il magazzino ──────────────────────────
async function chiudiLista() {
  if (!confirm('Chiudere la lista? Le quantità acquistate reintegreranno il magazzino.')) return;
  const daCaricare = voci.filter(v => v.acquistato && !v.consumo_diretto && v.prodotto_id && !v.caricato_a_magazzino && v.quantita);

  const batch = writeBatch(db);
  batch.update(doc(db, 'liste_spesa', listaId), { stato: 'chiusa', chiusa_il: serverTimestamp() });
  daCaricare.forEach(v => {
    batch.update(doc(db, 'magazzino_prodotti', v.prodotto_id), { quantita_attuale: increment(v.quantita), aggiornato_il: serverTimestamp() });
    batch.update(doc(db, 'liste_spesa', listaId, 'voci', v.id), { caricato_a_magazzino: true });
  });
  await batch.commit();

  document.getElementById('sd-riepilogo').innerHTML =
    `<div class="riepilogo-chiusura">✅ Lista chiusa. Aggiornati ${daCaricare.length} prodott${daCaricare.length === 1 ? 'o' : 'i'} a magazzino.</div>`;

  await caricaTutto();
}

async function riapriLista() {
  if (!confirm('Riaprire la lista per modificarla?')) return;
  await updateDoc(doc(db, 'liste_spesa', listaId), { stato: 'aperta', chiusa_il: null });
  document.getElementById('sd-riepilogo').innerHTML = '';
  await caricaTutto();
}

// ── Crea prodotto a magazzino da una voce manuale ───────────────────────────
async function creaProdottoDaVoce(v) {
  const dati = {
    nome: v.nome, categoria: v.categoria || (categorie[0]?.id || null), unita: v.unita || '',
    quantita_attuale: 0, soglia_minima: 0, scorta_obiettivo: null,
    prezzo_riferimento: v.prezzo_unitario ?? null, attivo: true,
    creato_da: currentUser.uid, creato_il: serverTimestamp()
  };
  const ref = await addDoc(collection(db, 'magazzino_prodotti'), dati);
  const aggiornamenti = { prodotto_id: ref.id };

  // Se la lista è già chiusa e la voce è acquistata (non consumo diretto), reintegra subito
  if (lista.stato === 'chiusa' && v.acquistato && !v.consumo_diretto && !v.caricato_a_magazzino && v.quantita) {
    await updateDoc(doc(db, 'magazzino_prodotti', ref.id), { quantita_attuale: increment(v.quantita) });
    aggiornamenti.caricato_a_magazzino = true;
  }

  await updateDoc(doc(db, 'liste_spesa', listaId, 'voci', v.id), aggiornamenti);
  await caricaTutto();
}

// ── Modal nuova voce manuale ─────────────────────────────────────────────────
function apriModalVoce(categoriaDefault) {
  document.getElementById('vm-categoria').innerHTML = categorie.map(c => `<option value="${esc(c.id)}">${esc(c.nome)}</option>`).join('');
  document.getElementById('vm-categoria').value = categoriaDefault || (categorie[0]?.id || '');
  document.getElementById('vm-nome').value = '';
  document.getElementById('vm-quantita').value = '';
  document.getElementById('vm-unita').value = '';
  document.getElementById('vm-prezzo').value = '';
  document.getElementById('modal-voce').classList.add('open');
  setTimeout(() => document.getElementById('vm-nome').focus(), 50);
}
document.getElementById('vm-annulla').addEventListener('click', () => document.getElementById('modal-voce').classList.remove('open'));

document.getElementById('vm-salva').addEventListener('click', async () => {
  const nome = document.getElementById('vm-nome').value.trim();
  if (!nome) { alert('Inserisci il nome del prodotto.'); return; }
  const categoria = document.getElementById('vm-categoria').value || null;
  const quantitaRaw = document.getElementById('vm-quantita').value;
  const quantita = quantitaRaw === '' ? null : parseFloat(quantitaRaw);
  const unita = document.getElementById('vm-unita').value.trim() || null;
  const prezzoRaw = document.getElementById('vm-prezzo').value;
  const prezzo_unitario = prezzoRaw === '' ? null : parseFloat(prezzoRaw);
  const prezzo = calcolaImporto({ prezzo_unitario, quantita });

  await addDoc(collection(db, 'liste_spesa', listaId, 'voci'), {
    nome, categoria, origine: 'manuale', prodotto_id: null, quantita, unita, prezzo_unitario, prezzo,
    acquistato: false, consumo_diretto: false, caricato_a_magazzino: false, data_lista: lista.data
  });

  document.getElementById('modal-voce').classList.remove('open');
  await caricaTutto();
  await ricalcolaTotale();
  render();
});
</script>
</body>
</html>
