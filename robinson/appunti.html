<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appunti di Viaggio – Robinson</title>
  <meta name="theme-color" content="#1a3a5c">
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    body { padding-bottom: 70px; }

    .card-appunto {
      background: var(--post-bg);
      border-left: 5px solid var(--navy);
      border-radius: 4px 12px 12px 4px;
      padding: 12px 14px;
      text-decoration: none;
      color: var(--inchiostro);
      display: block;
      box-shadow: 2px 2px 10px rgba(26,58,92,0.08);
      transition: transform 0.12s;
    }
    .card-appunto:hover { transform: translateY(-2px); }

    .appunto-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .appunto-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      background: var(--oro-light); border: 2px solid var(--oro);
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    .appunto-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .appunto-meta { flex: 1; min-width: 0; }
    .appunto-autore { font-size: 0.88rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .appunto-data   { font-size: 0.7rem; color: var(--muted); margin-top: 1px; font-style: italic; }
    .appunto-testo  { font-size: 0.9rem; color: #555; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>

  <header class="top-header">
    <div class="header-titles">
      <div class="header-title-main">Appunti di Viaggio</div>
      <div class="header-title-sub">tutto quello che succede sull'isola</div>
    </div>
    <div id="nav-auth-slot"></div>
  </header>

  <div id="feed" class="feed"><div class="spinner"></div></div>

  <nav class="bottom-nav">
    <a href="index.html"      class="nav-item"><span class="nav-icon">🏝️</span>Robinson</a>
    <a href="spiaggia.html"   class="nav-item"><span class="nav-icon">🏖️</span>Spiaggia</a>
    <a href="naufraghi.html"  class="nav-item"><span class="nav-icon">👥</span>Naufraghi</a>
    <a href="ciurma.html"     class="nav-item"><span class="nav-icon">⚓</span>Ciurma</a>
    <a href="appunti.html"    class="nav-item active"><span class="nav-icon">📓</span>Appunti</a>
  </nav>

  <script type="module">
    import { db } from './js/robinson-firebase.js';
    import { setupNavAuth } from './js/robinson-nav.js';
    import { esc, fmtDate, risolviNome } from './js/robinson-utils.js';
    import {
      collection, getDocs, query, orderBy, limit, collectionGroup
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    setupNavAuth('nav-auth-slot');

    const feed = document.getElementById('feed');

    function msOf(ts) { return ts?.toMillis ? ts.toMillis() : 0; }

    function trunca(s, n=120) {
      if (!s) return '';
      return s.length > n ? s.slice(0, n) + '…' : s;
    }

    async function loadFeed() {
      const eventi = [];

      // 1. Post spiaggia
      try {
        const snap = await getDocs(query(collection(db, 'robinson_spiaggia'), orderBy('timestamp', 'desc'), limit(50)));
        snap.forEach(d => {
          const data = d.data();
          const hasMedia = Array.isArray(data.media) && data.media.length > 0;
          eventi.push({
            tipo: 'spiaggia',
            uid: data.authorId,
            nome: data.authorName,
            foto: data.authorPhoto,
            testo: data.text || (hasMedia ? (data.media[0].type === 'image' ? '📷 Foto' : data.media[0].type === 'video' ? '🎥 Video' : '🎵 Audio') : ''),
            ts: data.timestamp,
            link: 'spiaggia.html',
          });
        });
      } catch(_) {}

      // 2. Post diari naufraghi (collectionGroup)
      try {
        const snap = await getDocs(query(collectionGroup(db, 'posts'), orderBy('timestamp', 'desc'), limit(50)));
        snap.forEach(d => {
          // filtra solo i documenti dentro robinson_diari/*/posts
          const pathParts = d.ref.path.split('/');
          if (pathParts[0] !== 'robinson_diari') return;
          const uid = pathParts[1];
          const data = d.data();
          const hasMedia = Array.isArray(data.media) && data.media.length > 0;
          eventi.push({
            tipo: 'diario',
            uid: data.authorId || uid,
            nome: data.authorName,
            foto: data.authorPhoto,
            testo: data.text || (hasMedia ? '📷 Contenuto multimediale' : ''),
            ts: data.timestamp,
            link: `naufrago.html?uid=${uid}`,
            diariUid: uid,
          });
        });
      } catch(_) {}

      // Ordina per data decrescente
      eventi.sort((a, b) => msOf(b.ts) - msOf(a.ts));

      feed.innerHTML = '';
      if (!eventi.length) {
        feed.innerHTML = '<p class="empty-msg">Nessun appunto ancora. L\'isola è silenziosa… 🏝️</p>';
        return;
      }

      for (const e of eventi.slice(0, 80)) {
        // Risolvi nome se mancante
        let nome = (e.nome && e.nome !== 'Anonimo') ? e.nome : '';
        if (!nome && e.uid) nome = await risolviNome(e.uid);
        if (!nome) nome = 'Naufrago';

        const avatar = e.foto
          ? `<div class="appunto-avatar"><img src="${esc(e.foto)}" alt="${esc(nome)}"></div>`
          : `<div class="appunto-avatar">${e.tipo === 'spiaggia' ? '🏖️' : '📔'}</div>`;

        const badge = e.tipo === 'spiaggia'
          ? `<span class="badge-sezione badge-spiaggia">🏖️ Spiaggia</span>`
          : `<span class="badge-sezione badge-diario">📔 Diario</span>`;

        const card = document.createElement('a');
        card.className = 'card-appunto';
        card.href = e.link;
        card.innerHTML = `
          <div class="appunto-header">
            ${avatar}
            <div class="appunto-meta">
              <div class="appunto-autore">${esc(nome)}</div>
              <div class="appunto-data">${fmtDate(e.ts)}</div>
            </div>
            ${badge}
          </div>
          <div class="appunto-testo">${esc(trunca(e.testo))}</div>`;
        feed.appendChild(card);
      }
    }

    loadFeed();
  </script>
</body>
</html>
