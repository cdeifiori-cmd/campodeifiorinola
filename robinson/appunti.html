<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appunti – Robinson</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
</head>
<body>

<header class="top-header">
  <div>
    <div class="header-title-main">📔 Gli Appunti</div>
    <div class="header-title-sub">tutto quello che è stato scritto</div>
  </div>
  <div id="nav-auth-slot"></div>
</header>

<div id="lista" style="max-width:640px;margin:0 auto;padding:12px 8px 80px;">
  <div class="spinner"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏝️</span><span>Home</span></a>
  <a href="spiaggia.html" class="nav-item"><span class="nav-icon">🏖️</span><span>Spiaggia</span></a>
  <a href="naufraghi.html" class="nav-item"><span class="nav-icon">👤</span><span>Naufraghi</span></a>
  <a href="ciurma.html" class="nav-item"><span class="nav-icon">⚓</span><span>Ciurma</span></a>
  <a href="appunti.html" class="nav-item active"><span class="nav-icon">📔</span><span>Appunti</span></a>
</nav>

<script type="module">
import { db, auth } from './js/robinson-firebase.js';
import { requireAuth } from './js/robinson-auth.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { esc, fmtDate, risolviNome, renderMediaGrid, normalizeMedia } from './js/robinson-utils.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, collectionGroup, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

setupNavAuth('nav-auth-slot');

requireAuth(async async user => {
  await loadAppunti();
});

async function loadAppunti() {
  const lista = document.getElementById('lista');
  try {
    // 1) Post spiaggia
    const spSnap = await getDocs(query(collection(db, 'robinson_spiaggia'), orderBy('timestamp', 'desc'), limit(40)));
    const spiaggiaPosts = spSnap.docs.map(d => ({
      id: d.id, fonte: 'spiaggia', badge: '🏖️', badgeClass: 'badge-navy', ...d.data()
    }));

    // 2) Diari (collectionGroup 'posts' sotto robinson_diari)
    const diariSnap = await getDocs(query(collectionGroup(db, 'posts'), orderBy('timestamp', 'desc'), limit(40)));
    const diariPosts = diariSnap.docs
      .filter(d => d.ref.path.startsWith('robinson_diari/'))
      .map(d => ({
        id: d.id, fonte: 'diario', badge: '📔', badgeClass: 'badge-oro', ...d.data()
      }));

    // Merge e sort per timestamp
    const tutti = [...spiaggiaPosts, ...diariPosts].sort((a, b) => {
      const ta = a.timestamp?.toMillis?.() || 0;
      const tb = b.timestamp?.toMillis?.() || 0;
      return tb - ta;
    }).slice(0, 80);

    if (!tutti.length) {
      lista.innerHTML = '<div class="empty-msg">📔 Nessun appunto ancora.</div>';
      return;
    }

    lista.innerHTML = '';
    for (const p of tutti) {
      const nome = p.authorName || await risolviNome(p.authorId) || 'Anonimo';
      const media = normalizeMedia(p);
      const testo = p.text || p.titolo || p.approdo || '';
      const div = document.createElement('div');
      div.className = 'appunto-card';
      div.innerHTML = `
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
          <span class="badge ${esc(p.badgeClass)}">${p.badge} ${p.fonte === 'spiaggia' ? 'Spiaggia' : 'Diario'}</span>
          <span style="font-size:0.75rem;font-weight:600;color:var(--navy);">${esc(nome)}</span>
          <span style="font-size:0.68rem;color:var(--muted);margin-left:auto;">${fmtDate(p.timestamp)}</span>
        </div>
        ${testo ? `<div style="font-size:0.88rem;line-height:1.55;color:var(--inchiostro);">${esc(testo.slice(0, 200))}${testo.length > 200 ? '…' : ''}</div>` : ''}
        ${renderMediaGrid(media)}`;
      lista.appendChild(div);
    }
  } catch(e) {
    lista.innerHTML = `<div style="text-align:center;padding:20px;color:var(--rosso);">Errore: ${esc(e.message)}</div>`;
  }
}
</script>
</body>
</html>
