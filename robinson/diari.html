<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📖 Diari – Robinson</title>
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    body { background: var(--sfondo); color: var(--inchiostro); font-family: 'Lora', serif; margin: 0; padding: 0; }
    .page-header {
      background: var(--navy);
      color: var(--oro);
      text-align: center;
      padding: 18px 16px 14px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      position: sticky; top: 0; z-index: 100;
    }
    .page-header span { display: block; font-size: 0.78rem; font-weight: 400; color: #a0b4c8; margin-top: 2px; }
    .content { padding: 12px 12px 80px; max-width: 560px; margin: 0 auto; }
    .loading-msg { text-align: center; color: #8a9ab0; font-style: italic; padding: 40px 0; font-size: 0.9rem; }

    /* Gruppi per giorno */
    .giorno-section { margin-bottom: 24px; }
    .giorno-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; font-weight: 700; color: var(--oro);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1.5px solid rgba(200,134,10,0.3);
    }
    .giorno-header .giorno-dot {
      width: 8px; height: 8px; background: var(--oro); border-radius: 50%; flex-shrink: 0;
    }

    /* Card diario */
    .diario-card {
      background: var(--post-bg);
      border: 1.5px solid var(--bordo);
      border-radius: 12px;
      padding: 14px 14px 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: box-shadow 0.18s, border-color 0.18s;
    }
    .diario-card:hover { box-shadow: 0 3px 14px rgba(200,134,10,0.18); border-color: var(--oro); }

    /* Header card */
    .diario-card-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .diario-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--oro); flex-shrink: 0;
      background: var(--navy);
    }
    .diario-avatar-placeholder {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--navy); border: 2px solid var(--oro);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .diario-nome { font-weight: 700; font-size: 0.92rem; color: var(--inchiostro); }
    .diario-data { font-size: 0.75rem; color: #8a9ab0; margin-top: 2px; }
    .diario-arrow { margin-left: auto; font-size: 1.4rem; color: var(--oro); font-weight: 300; flex-shrink: 0; }

    /* Titolo giornata */
    .diario-titolo {
      font-size: 0.95rem; color: var(--inchiostro);
      font-style: italic; font-weight: 600;
      margin-bottom: 10px; line-height: 1.4;
      padding: 0 2px;
    }
    .diario-titolo.vuoto { color: #a0b4c8; font-weight: 400; }

    /* Sezioni contenuto */
    .diario-sezione {
      margin: 8px 0;
      padding: 8px 10px;
      background: rgba(250,247,240,0.9);
      border-radius: 6px;
      border-left: 3px solid rgba(200,134,10,0.25);
    }
    .diario-label {
      font-size: 10px;
      color: #8a6a3a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 3px;
      font-family: 'Lora', serif;
    }
    .diario-testo {
      font-size: 13px;
      color: #2c1e0f;
      font-style: italic;
      font-family: 'Lora', serif;
      line-height: 1.5;
    }
    .diario-meteo-display {
      font-size: 14px;
      color: #2c1e0f;
      font-family: 'Lora', serif;
    }
    .campo-privato {
      font-size: 11px;
      color: #8a6a3a;
      font-style: italic;
    }

    /* Empty state */
    .empty-state { text-align: center; padding: 40px 20px; color: #8a9ab0; font-style: italic; }
    .empty-state .big-icon { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="page-header">
  📖 Diari
  <span>Le schede salvate dai naufraghi</span>
</div>

<div class="content">
  <div id="loading-msg" class="loading-msg">Caricamento diari...</div>
  <div id="diari-container"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏝️</span><span>Home</span></a>
  <a href="spiaggia.html" class="nav-item"><span class="nav-icon">🏖️</span><span>Spiaggia</span></a>
  <a href="naufraghi.html" class="nav-item"><span class="nav-icon">👤</span><span>Naufraghi</span></a>
  <a href="isola.html" class="nav-item"><span class="nav-icon">🗺️</span><span>Isola</span></a>
  <a href="ciurma.html" class="nav-item"><span class="nav-icon">⚓</span><span>Ciurma</span></a>
  <a href="diari.html" class="nav-item active"><span class="nav-icon">📖</span><span>Diari</span></a>
</nav>

<script type="module">
import { db, auth } from './js/robinson-firebase.js';
import { requireAuth } from './js/robinson-auth.js';
import { esc, risolviNome } from './js/robinson-utils.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { setupNavAuth } from './js/robinson-nav.js';

setupNavAuth(null);

const meteoInterpretazioni = {
  '🌞': 'Giornata piena di luce',
  '🌤️': 'Abbastanza bene',
  '⛅': 'Così così',
  '🌧️': 'Momenti difficili',
  '⛈️': 'Giornata pesante',
  '🌪️': 'Tutto sottosopra',
  '🌈': "Ce l'ha fatta nonostante tutto",
  '⭐': 'Momento speciale'
};

onAuthStateChanged(auth, async user => {
  if (!user) { requireAuth(); return; }
  await caricaDiari();
});

function fmtGiornoIt(key) {
  const [y, m, d] = key.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const mesi = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                 'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  return `${giorni[date.getDay()]} ${d} ${mesi[m-1]} ${y}`;
}

function sezione(label, campo) {
  // campo può essere stringa o { testo, privato }
  if (!campo) return '';
  const privato = typeof campo === 'object' ? campo.privato : false;
  const testo = typeof campo === 'object' ? campo.testo : campo;
  if (privato) {
    return `<div class="diario-sezione">
      <span class="diario-label">${label}</span>
      <div class="campo-privato">🔒 Contenuto privato</div>
    </div>`;
  }
  if (!testo || !testo.trim()) return '';
  return `<div class="diario-sezione">
    <span class="diario-label">${label}</span>
    <div class="diario-testo">${esc(testo)}</div>
  </div>`;
}

function sezioneMeteo(meteoUmore) {
  if (!meteoUmore) return '';
  const interp = meteoInterpretazioni[meteoUmore] || '';
  return `<div class="diario-sezione">
    <span class="diario-label">☀️ Meteo dell'umore</span>
    <div class="diario-meteo-display">${esc(meteoUmore)}${interp ? ' — ' + esc(interp) : ''}</div>
  </div>`;
}

function sezioneFalo(falo) {
  if (!falo) return '';
  const privato = falo.privato;
  if (privato) {
    return `<div class="diario-sezione">
      <span class="diario-label">🔥 Falò della sera</span>
      <div class="campo-privato">🔒 Contenuto privato</div>
    </div>`;
  }
  // struttura vecchia: array; nuova: { voci, altro, privato }
  const voci = Array.isArray(falo) ? falo : (falo.voci || []);
  const altro = falo.altro || '';
  const elenco = [...voci, ...(altro ? [altro] : [])].join(', ');
  if (!elenco) return '';
  return `<div class="diario-sezione">
    <span class="diario-label">🔥 Falò della sera</span>
    <div class="diario-testo">${esc(elenco)}</div>
  </div>`;
}

async function caricaDiari() {
  const container = document.getElementById('diari-container');
  const loading = document.getElementById('loading-msg');

  const profiloSnap = await getDocs(collection(db, 'robinson_naufraghi'));
  const profili = {};
  profiloSnap.forEach(d => { profili[d.id] = d.data(); });

  const allPosts = [];
  const tasks = Object.keys(profili).map(async uid => {
    try {
      const snap = await getDocs(
        query(collection(db, 'robinson_diari', uid, 'posts'), orderBy('timestamp', 'desc'))
      );
      snap.forEach(d => {
        const p = d.data();
        if (p.salvato === true) {
          allPosts.push({ uid, dataKey: d.id, post: p });
        }
      });
    } catch(e) { /* ignora uid senza diari */ }
  });
  await Promise.all(tasks);

  loading.style.display = 'none';

  if (allPosts.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="big-icon">📖</div>Nessun diario salvato ancora.</div>`;
    return;
  }

  const gruppi = {};
  allPosts.forEach(item => {
    if (!gruppi[item.dataKey]) gruppi[item.dataKey] = [];
    gruppi[item.dataKey].push(item);
  });

  const giorni = Object.keys(gruppi).sort((a, b) => b.localeCompare(a));

  giorni.forEach(giorno => {
    const section = document.createElement('div');
    section.className = 'giorno-section';
    section.innerHTML = `<div class="giorno-header"><span class="giorno-dot"></span>${esc(fmtGiornoIt(giorno))}</div>`;

    gruppi[giorno].sort((a, b) => {
      const na = profili[a.uid]?.nome || a.uid;
      const nb = profili[b.uid]?.nome || b.uid;
      return na.localeCompare(nb);
    });

    gruppi[giorno].forEach(({ uid, dataKey, post }) => {
      const profilo = profili[uid] || {};
      const nome = profilo.nome || risolviNome(uid) || '?';
      const avatarUrl = profilo.fotoRobinson || profilo.avatarUrl || profilo.fotoProfilo || '';
      const titolo = post.titolo || '';
      const r = post.riflessioni || {};

      const avatarHtml = avatarUrl
        ? `<img class="diario-avatar" src="${esc(avatarUrl)}" alt="${esc(nome)}" onerror="this.style.display='none'">`
        : `<div class="diario-avatar-placeholder">🧍</div>`;

      // riflessioni: compatibilità chiavi vecchie (scoperto/bello/scoglio/tesoro) e nuove (scoperta/momentoBello)
      const scoperta = r.scoperta || r.scoperto;
      const momentoBello = r.momentoBello || r.bello;
      const scoglio = r.scoglio;
      const tesoro = r.tesoro;
      const falo = r.falo;

      const card = document.createElement('div');
      card.className = 'diario-card';
      card.onclick = () => { location.href = `naufrago.html?uid=${encodeURIComponent(uid)}#tab-diario`; };

      card.innerHTML = `
        <div class="diario-card-header">
          ${avatarHtml}
          <div>
            <div class="diario-nome">${esc(nome)}</div>
            <div class="diario-data">${esc(fmtGiornoIt(dataKey))}</div>
          </div>
          <span class="diario-arrow">›</span>
        </div>
        ${titolo ? `<div class="diario-titolo">"${esc(titolo)}"</div>` : ''}
        ${sezione('⚓ Allora? com\'è andata oggi?', post.approdo)}
        ${sezioneMeteo(post.meteoUmore || post.meteo)}
        ${sezione('💬 Sensazione', post.sensazione)}
        ${sezione('🌴 Ho scoperto che...', scoperta)}
        ${sezione('⭐ Il momento più bello', momentoBello)}
        ${sezione('🦈 Lo scoglio incontrato', scoglio)}
        ${sezione('🐚 Il tesoro che mi porto', tesoro)}
        ${sezioneFalo(falo)}
      `;

      section.appendChild(card);
    });

    container.appendChild(section);
  });
}
</script>
</body>
</html>
