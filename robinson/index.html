<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robinson – L'isola dei naufraghi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', serif;
      background: #0f2540;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Copertina fullscreen */
    #copertina {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }

    /* Overlay leggero per leggibilità UI */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* Avatar / login in alto a destra */
    #nav-auth-slot {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
    }

    /* Bottone login centrale (solo se non loggato) */
    #btn-login-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    #btn-login {
      background: rgba(26,58,92,0.88);
      color: #c8860a;
      border: 2px solid #c8860a;
      border-radius: 12px;
      padding: 14px 32px;
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: background 0.2s;
    }
    #btn-login:hover { background: rgba(26,58,92,0.98); }

    /* Bottom nav */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(26,58,92,0.92);
      border-top: 2px solid #c8860a;
      display: flex;
      justify-content: space-around;
      align-items: stretch;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    #bottom-nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 4px;
      color: #d4bc8e;
      text-decoration: none;
      font-size: 0.65rem;
      gap: 3px;
      transition: color 0.15s;
    }
    #bottom-nav a:hover, #bottom-nav a.active { color: #c8860a; }
    #bottom-nav .nav-icon { font-size: 1.35rem; line-height: 1; }

    /* Dropdown stile coherente con robinson-nav.js */
    :root { --oro: #c8860a; --inchiostro: #1a3a5c; --muted: #6b5c45; --rosso: #c0392b; }
  </style>
</head>
<body>

<img id="copertina" src="copertina-robinson-cell.png" alt="Robinson">
<div id="overlay"></div>

<div id="nav-auth-slot"></div>
<div id="btn-login-wrap" style="display:none;">
  <a id="btn-login" href="login.html">⚓ Approda sull'isola</a>
</div>

<nav id="bottom-nav">
  <a href="spiaggia.html"><span class="nav-icon">🏖️</span><span>Spiaggia</span></a>
  <a href="naufraghi.html"><span class="nav-icon">🧍</span><span>Naufraghi</span></a>
  <a href="isola.html"><span class="nav-icon">🗺️</span><span>Isola</span></a>
  <a href="ciurma.html"><span class="nav-icon">⚓</span><span>Ciurma</span></a>
  <a href="appunti.html"><span class="nav-icon">📓</span><span>Appunti</span></a>
  <a id="nav-diario" href="naufrago.html"><span class="nav-icon">📔</span><span>Diario</span></a>
  <a href="villaggio.html"><span class="nav-icon">🏡</span><span>Villaggio</span></a>
</nav>

<script type="module">
import { setupNavAuth, getAuthUser } from './js/robinson-nav.js';
import { ADMIN_UID } from './js/robinson-firebase.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { db } from './js/robinson-firebase.js';

// Copertina responsive
const img = document.getElementById('copertina');
function aggiornaCopertina() {
  img.src = window.innerWidth >= 769 ? 'copertina-robinson-pc.png' : 'copertina-robinson-cell.png';
}
aggiornaCopertina();
window.addEventListener('resize', aggiornaCopertina);

// Auth
setupNavAuth('nav-auth-slot');
const user = await getAuthUser();

if (!user) {
  document.getElementById('btn-login-wrap').style.display = 'flex';
} else {
  const diarioLink = document.getElementById('nav-diario');
  if (diarioLink) diarioLink.href = `naufrago.html?uid=${user.uid}`;

  // Mostra link admin se è admin
  const profilo = await getDoc(doc(db, 'utenti', user.uid));
  const ruolo = profilo.data()?.ruolo;
  if (user.uid === ADMIN_UID || ruolo === 'admin') {
    const adminWrap = document.createElement('div');
    adminWrap.style.cssText = 'position:fixed;top:60px;right:12px;z-index:100;display:flex;flex-direction:column;gap:6px;';
    adminWrap.innerHTML = `
      <a href="admin-classifica.html" style="background:rgba(26,58,92,0.88);color:#c8860a;border:1px solid #c8860a66;border-radius:20px;padding:5px 12px;font-size:0.75rem;text-decoration:none;font-family:Lora,serif;white-space:nowrap;">📊 Classifica admin</a>
      <a href="admin-isola.html" style="background:rgba(26,58,92,0.88);color:#c8860a;border:1px solid #c8860a66;border-radius:20px;padding:5px 12px;font-size:0.75rem;text-decoration:none;font-family:Lora,serif;white-space:nowrap;">🏝️ Admin Isola</a>
      <a href="admin-pin.html" style="background:rgba(26,58,92,0.88);color:#c8860a;border:1px solid #c8860a66;border-radius:20px;padding:5px 12px;font-size:0.75rem;text-decoration:none;font-family:Lora,serif;white-space:nowrap;">🔑 Gestione PIN</a>
    `;
    document.body.appendChild(adminWrap);
  }
}
</script>
</body>
</html>
