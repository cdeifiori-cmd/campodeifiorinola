<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Ciurma – Robinson</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
</head>
<body>

<header class="top-header">
  <div>
    <div class="header-title-main">⚓ La Ciurma</div>
    <div class="header-title-sub">gli operatori e la guida</div>
  </div>
  <div id="nav-auth-slot"></div>
</header>

<div class="search-bar">
  <span>🔍</span>
  <input type="text" id="search-inp" placeholder="Cerca per nome...">
</div>

<div id="grid" class="grid-naufraghi">
  <div class="spinner" style="grid-column:span 2;"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏝️</span><span>Home</span></a>
  <a href="spiaggia.html" class="nav-item"><span class="nav-icon">🏖️</span><span>Spiaggia</span></a>
  <a href="naufraghi.html" class="nav-item"><span class="nav-icon">👤</span><span>Naufraghi</span></a>
  <a href="ciurma.html" class="nav-item active"><span class="nav-icon">⚓</span><span>Ciurma</span></a>
  <a href="appunti.html" class="nav-item"><span class="nav-icon">📔</span><span>Appunti</span></a>
</nav>

<script type="module">
import { db, auth } from './js/robinson-firebase.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { esc } from './js/robinson-utils.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

setupNavAuth('nav-auth-slot');
let allCiurma = [];

onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'https://campodeifiori.org/login.html'; return; }
  await loadCiurma();
});

async function loadCiurma() {
  const grid = document.getElementById('grid');
  try {
    let snap = await getDocs(query(collection(db, 'robinson_ciurma'), orderBy('nome')));
    if (!snap.empty) {
      allCiurma = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    } else {
      // fallback: staff con ruolo ciurma o admin
      snap = await getDocs(collection(db, 'staff'));
      allCiurma = snap.docs
        .map(d => ({ uid: d.id, ...d.data() }))
        .filter(d => d.ruolo === 'ciurma' || d.ruolo === 'admin')
        .sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));
    }
    renderGrid(allCiurma);
  } catch(e) {
    grid.innerHTML = `<div style="grid-column:span 2;text-align:center;padding:20px;color:var(--rosso);">Errore: ${esc(e.message)}</div>`;
  }
}

function renderGrid(lista) {
  const grid = document.getElementById('grid');
  if (!lista.length) { grid.innerHTML = '<div class="empty-msg" style="grid-column:span 2;">Nessun membro della ciurma trovato.</div>'; return; }
  grid.innerHTML = lista.map(n => {
    const foto = n.fotoProfilo || n.photoURL || '';
    const nome = n.nome || n.displayName || 'Membro';
    const ruolo = n.ruolo || n.soprannome || '';
    return `<a class="card-naufrago" href="naufrago.html?uid=${esc(n.uid)}">
      <div class="card-foto">${foto ? `<img src="${esc(foto)}" alt="${esc(nome)}" loading="lazy">` : '⚓'}</div>
      <div class="card-info">
        <div class="card-nome">${esc(nome)}</div>
        ${ruolo ? `<div class="card-ruolo">${esc(ruolo)}</div>` : ''}
      </div>
    </a>`;
  }).join('');
}

document.getElementById('search-inp').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderGrid(allCiurma.filter(n => (n.nome || '').toLowerCase().includes(q)));
});
</script>
</body>
</html>
