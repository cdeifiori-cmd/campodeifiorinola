<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Ciurma – Robinson</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#1a3a5c; --oro:#c8860a; --carta:#f5f0e8; --muted:#6b5c45; }

    body {
      background-image: url('la_ciurma_cell_ok.png');
      background-size: cover;
      background-position: top center;
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Lora', serif;
      color: var(--navy);
      padding-bottom: 90px;
    }

    .ciurma-header-fixed {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 32vw;
      max-height: 200px;
      background-image: url('la_ciurma_cell_ok.png');
      background-size: cover;
      background-position: top center;
      z-index: 100;
    }

    .ciurma-content {
      padding-top: calc(min(32vw, 200px) + 8px);
    }

    #nav-auth-slot-wrap {
      position: fixed;
      top: 6px; right: 8px;
      z-index: 300;
    }
    @media (max-width: 768px) {
      #nav-auth-slot-wrap { top: auto; bottom: 80px; right: 76px; }
      #nav-auth-slot .nav-user-name { display: none; }
      #nav-auth-slot img { width: 28px !important; height: 28px !important; }
    }

    .search-bar { margin: 12px 16px 6px; }
    @media (min-width: 769px) {
      .search-bar { display: flex; justify-content: flex-start; padding: 8px 20px; margin: 0;
        width: 260px !important; max-width: 260px !important;
        margin-left: 20px !important; margin-right: auto !important; }
      .search-bar input, #search-inp { width: 100% !important; font-size: 13px !important; padding: 6px 12px !important; }
    }

    .card-naufrago {
      background: rgba(255,255,255,0.9) !important;
      box-shadow: 2px 4px 16px rgba(0,0,0,0.18) !important;
      backdrop-filter: blur(2px);
    }
    .card-naufrago:hover {
      background: rgba(255,255,255,0.97) !important;
      box-shadow: 3px 6px 22px rgba(0,0,0,0.26) !important;
    }
  </style>
</head>
<body>

<div id="nav-auth-slot-wrap">
  <div id="nav-auth-slot"></div>
</div>

<div class="ciurma-header-fixed"></div>

<div class="ciurma-content">
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="search-inp" placeholder="Cerca per nome...">
  </div>

  <div id="grid" class="grid-naufraghi">
    <div class="spinner" style="grid-column:span 2;"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="villaggio.html" class="nav-item"><span class="nav-icon">🏡</span><span>Villaggio</span></a>
  <a href="spiaggia.html" class="nav-item"><span class="nav-icon">🏖️</span><span>Spiaggia</span></a>
  <a href="diari.html" class="nav-item"><span class="nav-icon">📖</span><span>Diari</span></a>
  <a href="diario-ciurma.html" class="nav-item"><span class="nav-icon">📔</span><span>Diario ciurma</span></a>
  <a href="isola.html" class="nav-item"><span class="nav-icon">🏝️</span><span>Isola</span></a>
  <a href="naufraghi.html" class="nav-item"><span class="nav-icon">🧍</span><span>Naufraghi</span></a>
  <a href="ciurma.html" class="nav-item active"><span class="nav-icon">⚓</span><span>Ciurma</span></a>
</nav>

<script type="module">
import { db } from './js/robinson-firebase.js';
import { requireAuth } from './js/robinson-auth.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { esc } from './js/robinson-utils.js';
import { collection, getDocs, query, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { init as modalInit, apriModal } from './js/robinson-modal-profilo.js';

setupNavAuth('nav-auth-slot');

let allCiurma = [];

requireAuth(async user => {
  const _apertura = new Date('2026-07-02T10:00:00');
  if (user.uid !== 'mCSgNMVEphVIIf4HX0bkcKq2ZKv2' && new Date() < _apertura) { window.location.href = 'attesa.html'; return; }
  modalInit(user);
  await loadCiurma();
});

async function loadCiurma() {
  const grid = document.getElementById('grid');
  try {
    let snap = await getDocs(query(collection(db, 'robinson_ciurma'), orderBy('nome')));
    if (!snap.empty) {
      const base = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
      allCiurma = await Promise.all(base.map(async m => {
        try {
          const [snapU, snapS, snapR] = await Promise.all([
            getDoc(doc(db, 'utenti', m.uid)),
            getDoc(doc(db, 'staff', m.uid)),
            getDoc(doc(db, 'robinson_naufraghi', m.uid))
          ]);
          const du = snapU.exists() ? snapU.data() : null;
          const ds = snapS.exists() ? snapS.data() : null;
          const rData = snapR.exists() ? snapR.data() : null;
          const foto = rData?.fotoRobinson || du?.fotoProfilo || du?.photoURL || ds?.fotoProfilo || m.fotoProfilo || '';
          const nome = du?.nome || du?.displayName || ds?.nome || m.nome || '';
          return { ...m, fotoProfilo: foto, nome };
        } catch (_) {}
        return m;
      }));
    } else {
      snap = await getDocs(collection(db, 'staff'));
      allCiurma = snap.docs
        .map(d => ({ uid: d.id, ...d.data() }))
        .filter(d => d.ruolo === 'ciurma' || d.ruolo === 'admin')
        .sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));
    }
    renderGrid(allCiurma);
  } catch(e) {
    grid.innerHTML = `<div style="grid-column:span 2;text-align:center;padding:20px;color:var(--rosso);">Errore: ${esc(e.message)}</div>`;
  }
}

function renderGrid(lista) {
  const grid = document.getElementById('grid');
  if (!lista.length) { grid.innerHTML = '<div class="empty-msg" style="grid-column:span 2;">Nessun membro della ciurma trovato.</div>'; return; }
  grid.innerHTML = lista.map(n => {
    const foto = n.fotoProfilo || n.photoURL || '';
    const nome = n.nome || n.displayName || 'Membro';
    const ruolo = n.ruolo || n.soprannome || '';
    return `<div class="card-naufrago" data-uid="${esc(n.uid)}" data-nome="${esc(nome)}" data-ruolo="${esc(ruolo)}" style="cursor:pointer;">
      <div class="card-foto">${foto ? `<img src="${esc(foto)}" alt="${esc(nome)}" loading="lazy">` : '⚓'}</div>
      <div class="card-info">
        <div class="card-nome">${esc(nome)}</div>
        ${ruolo ? `<div class="card-ruolo">${esc(ruolo)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.card-naufrago').forEach(card => {
    card.addEventListener('click', () => apriModal(card.dataset.uid, {
      nome: card.dataset.nome,
      ruolo: card.dataset.ruolo
    }));
  });
}

document.getElementById('search-inp').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderGrid(allCiurma.filter(n => (n.nome || '').toLowerCase().includes(q)));
});
</script>
</body>
</html>
