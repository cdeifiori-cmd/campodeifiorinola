<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Naufraghi – Robinson</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
</head>
<body>

<header class="top-header">
  <div>
    <div class="header-title-main">👤 I Naufraghi</div>
    <div class="header-title-sub">compagni di isola</div>
  </div>
  <div id="nav-auth-slot"></div>
</header>

<div id="admin-banner" style="display:none;" class="admin-banner">
  <a href="admin-classifica.html">📊 Vai alla Classifica →</a>
</div>

<div class="search-bar">
  <span>🔍</span>
  <input type="text" id="search-inp" placeholder="Cerca per nome...">
</div>

<div id="grid" class="grid-naufraghi">
  <div class="spinner" style="grid-column:span 2;"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏝️</span><span>Home</span></a>
  <a href="spiaggia.html" class="nav-item"><span class="nav-icon">🏖️</span><span>Spiaggia</span></a>
  <a href="naufraghi.html" class="nav-item active"><span class="nav-icon">👤</span><span>Naufraghi</span></a>
  <a href="ciurma.html" class="nav-item"><span class="nav-icon">⚓</span><span>Ciurma</span></a>
  <a href="appunti.html" class="nav-item"><span class="nav-icon">📔</span><span>Appunti</span></a>
</nav>

<script type="module">
import { db, auth, ADMIN_UID } from './js/robinson-firebase.js';
import { requireAuth } from './js/robinson-auth.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { esc } from './js/robinson-utils.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

setupNavAuth('nav-auth-slot');

let allNaufraghi = [];

requireAuth(async async user => {
  if (user.uid === ADMIN_UID) document.getElementById('admin-banner').style.display = 'block';
  await loadNaufraghi();
});

async function loadNaufraghi() {
  const grid = document.getElementById('grid');
  try {
    let snap = await getDocs(query(collection(db, 'robinson_naufraghi'), orderBy('nome')));
    if (snap.empty) {
      snap = await getDocs(query(collection(db, 'utenti'), orderBy('nome')));
    }
    allNaufraghi = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    renderGrid(allNaufraghi);
  } catch(e) {
    grid.innerHTML = `<div style="grid-column:span 2;text-align:center;padding:20px;color:var(--rosso);">Errore caricamento: ${esc(e.message)}</div>`;
  }
}

function renderGrid(lista) {
  const grid = document.getElementById('grid');
  if (!lista.length) { grid.innerHTML = '<div class="empty-msg" style="grid-column:span 2;">Nessun naufrago trovato.</div>'; return; }
  grid.innerHTML = lista.map(n => {
    const foto = n.fotoProfilo || n.photoURL || '';
    const nome = n.nome || n.displayName || 'Naufrago';
    const soprannome = n.soprannome || '';
    return `<a class="card-naufrago" href="naufrago.html?uid=${esc(n.uid)}">
      <div class="card-foto">${foto ? `<img src="${esc(foto)}" alt="${esc(nome)}" loading="lazy">` : '⚓'}</div>
      <div class="card-info">
        <div class="card-nome">${esc(nome)}</div>
        ${soprannome ? `<div class="card-ruolo">"${esc(soprannome)}"</div>` : ''}
      </div>
    </a>`;
  }).join('');
}

document.getElementById('search-inp').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderGrid(allNaufraghi.filter(n => (n.nome || '').toLowerCase().includes(q) || (n.soprannome || '').toLowerCase().includes(q)));
});
</script>
</body>
</html>
