<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Naufraghi – Robinson</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    body {
      background-image: url('naufraghi.png');
      background-size: cover;
      background-position: top center;
      background-attachment: fixed;
      min-height: 100vh;
      margin: 0;
    }
    @media (min-width: 769px) {
      body { background-image: url('naufraghi-pc.png'); }
    }

    #nav-auth-slot-wrap { position: fixed; top: 12px; right: 12px; z-index: 200; }

    .naufraghi-header-fixed {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 38vw;
      max-height: 220px;
      background-image: url('naufraghi.png');
      background-size: cover;
      background-position: top center;
      z-index: 100;
    }
    @media (min-width: 769px) {
      .naufraghi-header-fixed { background-image: url('naufraghi-pc.png'); height: 22vw; max-height: 280px; }
    }

    .naufraghi-header { display: none; }

    .naufraghi-content {
      padding-bottom: 100px;
      padding-top: calc(min(38vw, 220px) + 8px);
    }
    @media (min-width: 769px) {
      .naufraghi-content { padding-top: calc(min(22vw, 280px) + 8px); }
    }

    .search-bar { margin: 12px 16px 6px; width: 100%; max-width: 100%; }
    @media (min-width: 769px) {
      .search-bar { display: flex; justify-content: flex-start; padding: 8px 20px; margin: 0;
        width: 260px !important; max-width: 260px !important;
        margin-left: 20px !important; margin-right: auto !important; }
      .search-bar input, #search-inp { width: 100% !important; font-size: 13px !important; padding: 6px 12px !important; }
    }

    #grid.grid-naufraghi {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding: 8px 16px 20px;
    }
    @media (max-width: 600px) {
      #grid.grid-naufraghi { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 8px 10px 20px; }
    }

    .card-naufrago {
      background: rgba(255,255,255,0.9) !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35) !important;
      border-radius: 10px;
    }
    .card-naufrago:hover { background: rgba(255,255,255,0.98) !important; }
  </style>
</head>
<body>

<div id="nav-auth-slot-wrap">
  <div id="nav-auth-slot"></div>
</div>

<div class="naufraghi-header">
  <img src="naufraghi.png" alt="I Naufraghi">
</div>

<div class="naufraghi-header-fixed"></div>

<div class="naufraghi-content">
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="search-inp" placeholder="Cerca per nome...">
  </div>

  <div id="grid" class="grid-naufraghi">
    <div class="spinner" style="grid-column:span 3;"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏝️</span><span>Home</span></a>
  <a href="spiaggia.html" class="nav-item"><span class="nav-icon">🏖️</span><span>Spiaggia</span></a>
  <a href="naufraghi.html" class="nav-item active"><span class="nav-icon">👤</span><span>Naufraghi</span></a>
  <a href="isola.html" class="nav-item"><span class="nav-icon">🗺️</span><span>Isola</span></a>
  <a href="ciurma.html" class="nav-item"><span class="nav-icon">⚓</span><span>Ciurma</span></a>
  <a href="diari.html" class="nav-item"><span class="nav-icon">📖</span><span>Diari</span></a>
  <a href="villaggio.html" class="nav-item"><span class="nav-icon">🏡</span><span>Villaggio</span></a>
</nav>

<script type="module">
import { db } from './js/robinson-firebase.js';
import { requireAuth } from './js/robinson-auth.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { esc, getFotoRobinson } from './js/robinson-utils.js';
import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { init as modalInit, apriModal } from './js/robinson-modal-profilo.js';

setupNavAuth('nav-auth-slot');

let allNaufraghi = [];

requireAuth(async user => {
  modalInit(user);
  await loadNaufraghi();
});

async function loadNaufraghi() {
  const grid = document.getElementById('grid');
  try {
    const snap = await getDocs(collection(db, 'robinson_pin'));
    const entries = await Promise.all(snap.docs.map(async d => {
      const data = d.data();
      const uid = d.id;
      const foto = await getFotoRobinson(uid);
      return { uid, nome: data.nome || uid, foto: foto || '' };
    }));
    allNaufraghi = entries
      .filter(n => !!n.nome)
      .sort((a, b) => a.nome.localeCompare(b.nome, 'it'));
    renderGrid(allNaufraghi);
  } catch(e) {
    grid.innerHTML = `<div style="grid-column:span 3;text-align:center;padding:20px;color:var(--rosso);">Errore: ${esc(e.message)}</div>`;
  }
}

function renderGrid(lista) {
  const grid = document.getElementById('grid');
  if (!lista.length) { grid.innerHTML = '<div class="empty-msg" style="grid-column:span 3;">Nessun naufrago trovato.</div>'; return; }
  grid.innerHTML = lista.map(n => {
    return `<div class="card-naufrago" data-uid="${esc(n.uid)}" style="cursor:pointer;">
      <div class="card-foto">${n.foto ? `<img src="${esc(n.foto)}" alt="${esc(n.nome)}" loading="lazy">` : '⚓'}</div>
      <div class="card-info">
        <div class="card-nome">${esc(n.nome)}</div>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.card-naufrago').forEach(card => {
    card.addEventListener('click', () => apriModal(card.dataset.uid));
  });
}

document.getElementById('search-inp').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderGrid(allNaufraghi.filter(n => n.nome.toLowerCase().includes(q)));
});
</script>
</body>
</html>
