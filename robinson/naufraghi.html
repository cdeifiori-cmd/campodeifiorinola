<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Naufraghi – Robinson</title>
  <meta name="theme-color" content="#1a3a5c">
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    body { padding-bottom: 70px; }
    .search-wrap {
      max-width: 640px; margin: 14px auto 0; padding: 0 14px;
    }
    .search-input {
      width: 100%; padding: 9px 14px;
      border: 1.5px solid #c8b89a; border-radius: 20px;
      font-family: 'Lora', serif; font-size: 0.9rem;
      background: var(--post-bg); color: var(--inchiostro);
      outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--navy); }
    .grid-naufraghi { margin-top: 14px; }
  </style>
</head>
<body>

  <header class="top-header">
    <div class="header-titles">
      <div class="header-title-main">I Naufraghi</div>
      <div class="header-title-sub">chi vive sull'isola</div>
    </div>
    <div id="nav-auth-slot"></div>
  </header>

  <div class="search-wrap">
    <input class="search-input" id="search" type="search" placeholder="🔍 Cerca un naufrago…">
  </div>

  <div id="grid" class="grid-naufraghi">
    <div class="spinner"></div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html"      class="nav-item"><span class="nav-icon">🏝️</span>Robinson</a>
    <a href="spiaggia.html"   class="nav-item"><span class="nav-icon">🏖️</span>Spiaggia</a>
    <a href="naufraghi.html"  class="nav-item active"><span class="nav-icon">👥</span>Naufraghi</a>
    <a href="ciurma.html"     class="nav-item"><span class="nav-icon">⚓</span>Ciurma</a>
    <a href="appunti.html"    class="nav-item"><span class="nav-icon">📓</span>Appunti</a>
  </nav>

  <script type="module">
    import { db } from './js/robinson-firebase.js';
    import { setupNavAuth } from './js/robinson-nav.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    setupNavAuth('nav-auth-slot');

    const grid   = document.getElementById('grid');
    const search = document.getElementById('search');
    let allNaufraghi = [];

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderGrid(list) {
      if (!list.length) {
        grid.innerHTML = '<p class="empty-msg">Nessun naufrago trovato. 🏝️</p>';
        return;
      }
      grid.innerHTML = list.map((d, i) => {
        const fotoHtml = d.fotoProfilo
          ? `<img src="${esc(d.fotoProfilo)}" alt="${esc(d.nome)}" loading="lazy">`
          : '🧍';
        return `
          <a class="card-naufrago" href="naufrago.html?uid=${esc(d.uid)}">
            <div class="card-foto">${fotoHtml}</div>
            <div class="card-info">
              <div class="card-nome">${esc(d.nome || 'Naufrago')}</div>
              <div class="card-ruolo">Naufrago N° ${i + 1}</div>
            </div>
          </a>`;
      }).join('');
    }

    search.addEventListener('input', () => {
      const q = search.value.toLowerCase().trim();
      renderGrid(q ? allNaufraghi.filter(d => (d.nome || '').toLowerCase().includes(q)) : allNaufraghi);
    });

    async function loadNaufraghi() {
      try {
        const snap = await getDocs(query(collection(db, 'robinson_naufraghi'), orderBy('nome')));
        allNaufraghi = [];
        snap.forEach(d => allNaufraghi.push({ uid: d.id, ...d.data() }));

        if (!allNaufraghi.length) {
          // fallback: legge da 'utenti' (tutti gli utenti iscritti)
          const uSnap = await getDocs(query(collection(db, 'utenti'), orderBy('nome')));
          uSnap.forEach(d => allNaufraghi.push({ uid: d.id, ...d.data() }));
        }

        grid.innerHTML = '';
        renderGrid(allNaufraghi);
      } catch(err) {
        grid.innerHTML = `<p class="empty-msg">Errore: ${err.message}</p>`;
        console.error(err);
      }
    }

    loadNaufraghi();
  </script>
</body>
</html>
