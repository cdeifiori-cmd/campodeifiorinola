<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villaggio – Robinson</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
  <meta name="theme-color" content="#1a3a5c">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { width: 100vw; height: 100vh; overflow: hidden; background: #0d2240; }

    .villaggio-bg {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }

    #nav-auth-slot-wrap {
      position: fixed; top: 10px; right: 12px; z-index: 300;
    }

    .hotspot-layer {
      position: fixed; inset: 0; z-index: 10;
    }

    .casa-hotspot {
      position: absolute;
      width: 80px; height: 100px;
      background: transparent;
      cursor: pointer;
      transform: translate(-50%, -50%);
      border-radius: 8px;
      transition: background 0.2s, border 0.2s;
      border: 2px solid transparent;
    }
    .casa-hotspot:hover {
      background: rgba(200,134,10,0.2);
      border: 2px solid #c8860a;
    }

    /* Mobile coordinates */
    .casa-hotspot[data-casa="perla_centrale"] { left:18%; top:58%; }
    .casa-hotspot[data-casa="atlantide"]       { left:45%; top:55%; }
    .casa-hotspot[data-casa="nautilus"]        { left:72%; top:58%; }

    /* Desktop coordinates — ricalibrate per villaggio_pc.png */
    @media (min-width: 769px) {
      .casa-hotspot { width: 120px; height: 150px; }
      .casa-hotspot[data-casa="perla_centrale"] { left:20%; top:60%; }
      .casa-hotspot[data-casa="atlantide"]       { left:48%; top:57%; }
      .casa-hotspot[data-casa="nautilus"]        { left:74%; top:60%; }
    }

    /* Popup overlay */
    .popup-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 199;
      display: none;
    }
    .popup-overlay.open { display: block; }

    /* Popup casa */
    .casa-popup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #f5f0e8;
      border: 2px solid #c8860a;
      border-radius: 12px;
      padding: 16px;
      width: 90%;
      max-width: 360px;
      max-height: 80vh;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      font-family: 'Lora', serif;
      display: none;
    }
    .casa-popup.open { display: block; }

    .casa-popup-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid #c8860a40;
    }
    .casa-nome {
      font-family: 'Playfair Display', serif;
      font-size: 18px; color: #1a3a5c; font-weight: 700;
    }
    .popup-close {
      background: transparent; border: none;
      font-size: 18px; cursor: pointer; color: #888;
    }
    .casa-sezione { margin-bottom: 12px; }
    .casa-sezione-title {
      font-size: 11px; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .casa-capitano {
      font-size: 15px; color: #1a3a5c; font-weight: 500;
      padding: 6px 10px; background: #ede8dc;
      border-radius: 6px; border-left: 3px solid #c8860a;
    }
    .casa-abitanti {
      font-size: 14px; color: #2c1e0f; line-height: 1.8;
    }
    .stanzette-grid {
      display: grid; gap: 8px; margin-top: 4px;
    }
    .stanzette-grid.col2 { grid-template-columns: 1fr 1fr; }
    .stanzette-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
    .stanzetta {
      background: #ede8dc; border-radius: 8px;
      padding: 8px 10px; border-top: 2px solid #c8860a;
    }
    .stanzetta-title {
      font-size: 10px; color: #888; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 5px;
    }
    .stanzetta-abitanti { font-size: 13px; color: #2c1e0f; line-height: 1.7; }
    .turno-row {
      display: flex; justify-content: space-between;
      padding: 5px 0; border-bottom: 1px solid #c8860a20;
      font-size: 13px;
    }
    .turno-giorno { color: #888; font-style: italic; }
    .turno-nome { color: #2c1e0f; font-weight: 500; }

    /* Admin panel */
    .admin-panel {
      margin-top: 14px; padding-top: 12px;
      border-top: 1px dashed #c8860a60;
    }
    .btn-modifica-casa {
      width: 100%; padding: 8px 12px;
      background: #1a3a5c; color: #c8860a;
      border: none; border-radius: 8px;
      font-family: 'Lora', serif; font-size: 0.85rem;
      cursor: pointer;
    }
    .btn-modifica-casa:hover { background: #0f2540; }

    /* Form modifica */
    .modifica-form { margin-top: 12px; }
    .modifica-form label {
      display: block; font-size: 11px; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 3px; margin-top: 10px;
    }
    .modifica-form input, .modifica-form textarea {
      width: 100%; padding: 7px 10px;
      border: 1.5px solid #c8b89a; border-radius: 6px;
      font-family: 'Lora', serif; font-size: 0.85rem;
      background: #fff; outline: none;
    }
    .modifica-form input:focus, .modifica-form textarea:focus {
      border-color: #1a3a5c;
    }
    .modifica-form textarea { resize: vertical; min-height: 70px; }
    .turni-grid { display: grid; grid-template-columns: 90px 1fr; gap: 6px 10px; align-items: center; margin-top: 4px; }
    .turni-grid .giorno-lbl { font-size: 12px; color: #6b5c45; font-style: italic; }
    .modifica-btns { display: flex; gap: 8px; margin-top: 14px; }
    .btn-salva-casa {
      flex: 1; padding: 9px; background: #1a3a5c; color: #c8860a;
      border: none; border-radius: 8px; font-family: 'Lora', serif;
      font-size: 0.88rem; cursor: pointer;
    }
    .btn-annulla-casa {
      padding: 9px 14px; background: none; color: #888;
      border: 1px solid #ccc; border-radius: 8px;
      font-family: 'Lora', serif; font-size: 0.88rem; cursor: pointer;
    }

    .popup-loading { text-align: center; padding: 20px; color: #888; font-style: italic; }

    /* Bottom nav — compatta per 7 voci */
    .bottom-nav .nav-item span:last-child { font-size: 0.6rem; }

    /* ── Valutazione giornaliera (admin-only) ── */
    .btn-valutazione-fab {
      position: fixed; bottom: 80px; right: 16px; z-index: 150;
      display: none; align-items: center; gap: 6px;
      background: #1a3a5c; color: #c8860a; border: 2px solid #c8860a;
      border-radius: 24px; padding: 10px 16px;
      font-family: 'Lora', serif; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; box-shadow: 2px 4px 12px rgba(0,0,0,0.4);
    }
    .btn-valutazione-fab:hover { background: #0f2540; }
    .valutazione-data { font-size: 0.8rem; color: #888; font-style: italic; margin-bottom: 12px; }
    .valutazione-data-picker-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .valutazione-data-picker-row label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    #valutazione-data-input {
      font-family: 'Lora', serif; font-size: 0.85rem; color: #1a3a5c;
      border: 1px solid #c8860a80; border-radius: 6px; padding: 4px 8px; background: #fff;
    }
    .val-casa-block { margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px dashed #c8860a40; }
    .val-casa-block:last-of-type { border-bottom: none; }
    .val-casa-nome { font-family: 'Playfair Display', serif; font-size: 15px; color: #1a3a5c; font-weight: 700; margin-bottom: 6px; }
    .val-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin: 8px 0 4px; }
    .val-pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .val-pill {
      flex: 1; min-width: 44px; padding: 8px 6px; text-align: center;
      background: #fff; border: 1.5px solid #c8b89a; border-radius: 20px;
      font-family: 'Lora', serif; font-size: 0.85rem; font-weight: 600; color: #1a3a5c;
      cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .val-pill:hover { background: #f5ead5; border-color: #c8860a; }
    .val-pill.selected { background: #1a3a5c; border-color: #1a3a5c; color: #c8860a; }
    .val-pill-penalita.selected { background: #c0392b; border-color: #c0392b; color: #fff; }
    .val-casa-totale { margin-top: 8px; font-size: 0.85rem; font-weight: 700; color: #1a3a5c; text-align: right; }
    .val-casa-totale span { color: #c8860a; font-size: 1rem; }
  </style>
</head>
<body>

<img class="villaggio-bg" src="Robinson_Republic_Village.png" alt="Villaggio Robinson">

<div id="nav-auth-slot-wrap">
  <div id="nav-auth-slot"></div>
</div>

<div class="hotspot-layer">
  <div class="casa-hotspot" id="hs-perla_centrale" data-casa="perla_centrale" title="Perla Centrale"></div>
  <div class="casa-hotspot" id="hs-atlantide"      data-casa="atlantide"      title="Atlantide"></div>
  <div class="casa-hotspot" id="hs-nautilus"       data-casa="nautilus"       title="Nautilus"></div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>

  <a href="spiaggia.html" class="nav-item"><span class="nav-icon">🏖️</span><span>Spiaggia</span></a>
  <a href="diari.html" class="nav-item"><span class="nav-icon">📖</span><span>Diari</span></a>

  <a href="naufraghi.html" class="nav-item"><span class="nav-icon">🧍</span><span>Naufraghi</span></a>
</nav>

<script type="module">
import { db, ADMIN_UID } from './js/robinson-firebase.js';
import { requireAuth } from './js/robinson-auth.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { esc } from './js/robinson-utils.js';
import {
  doc, getDoc, setDoc, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

setupNavAuth('nav-auth-slot');

// Immagine responsive: mobile vs desktop
const _bg = document.querySelector('.villaggio-bg');
function _aggiornaBg() {
  _bg.src = window.innerWidth >= 769 ? 'villaggio_pc.png' : 'Robinson_Republic_Village.png';
}
_aggiornaBg();
window.addEventListener('resize', _aggiornaBg);

const GIORNI = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];

const CASE = {
  perla_centrale: { nome: 'Perla Centrale', emoji: '🏠' },
  atlantide:      { nome: 'Atlantide',       emoji: '🏠' },
  nautilus:       { nome: 'Nautilus',        emoji: '🏠' },
};

let _currentUser = null;
let _isAdmin = false;
let _currentCasaId = null;
let _modifica = false;

requireAuth(async user => {
  _currentUser = user;
  _isAdmin = user.uid === ADMIN_UID;

  const _apertura = new Date('2026-07-02T10:00:00');
  console.log('[guard villaggio] uid:', user.uid, '| isAdmin:', _isAdmin, '| ora < apertura:', new Date() < _apertura);
  if (!_isAdmin && new Date() < _apertura) { window.location.href = 'attesa.html'; return; }

  ['perla_centrale','atlantide','nautilus'].forEach(id => {
    document.getElementById('hs-' + id).addEventListener('click', () => apriCasa(id));
  });

  document.getElementById('popup-close').addEventListener('click', chiudiPopup);
  document.getElementById('popup-overlay').addEventListener('click', chiudiPopup);

  if (_isAdmin) {
    const fab = document.getElementById('btn-valutazione-fab');
    fab.style.display = 'flex';
    fab.addEventListener('click', apriValutazione);
    document.getElementById('valutazione-close').addEventListener('click', chiudiValutazione);
    document.getElementById('valutazione-overlay').addEventListener('click', chiudiValutazione);
    document.getElementById('valutazione-data-input').addEventListener('change', onCambioDataValutazione);
  }
});

async function apriCasa(casaId) {
  _currentCasaId = casaId;
  _modifica = false;
  const meta = CASE[casaId];
  document.getElementById('popup-casa-nome').textContent = meta.emoji + ' ' + meta.nome;
  document.getElementById('popup-body').innerHTML = '<div class="popup-loading">⏳ Caricamento...</div>';
  document.getElementById('popup-overlay').classList.add('open');
  document.getElementById('casa-popup').classList.add('open');

  try {
    const snap = await getDoc(doc(db, 'robinson_villaggio', casaId));
    const d = snap.exists() ? snap.data() : {};
    renderCasa(casaId, d);
  } catch(e) {
    document.getElementById('popup-body').innerHTML = `<div style="color:#c0392b;padding:12px;">${esc(e.message)}</div>`;
  }
}

function chiudiPopup() {
  document.getElementById('popup-overlay').classList.remove('open');
  document.getElementById('casa-popup').classList.remove('open');
  _currentCasaId = null;
}

// Stanzette per casa: Perla Centrale e Nautilus 2 colonne, Atlantide 3 colonne
const STANZETTE_CFG = {
  perla_centrale: ['sinistra', 'destra'],
  nautilus:       ['sinistra', 'destra'],
  atlantide:      ['sinistra', 'centrale', 'destra'],
};
const STANZETTE_LABEL = { sinistra: 'Sinistra', centrale: 'Centrale', destra: 'Destra' };

function renderCasa(casaId, d) {
  const capitano = d.capitano || '—';
  const turni = d.turni || {};
  const stanzette = d.stanzette || {};
  const cols = STANZETTE_CFG[casaId] || ['sinistra', 'destra'];

  const stanzetteHtml = `<div class="stanzette-grid ${cols.length === 3 ? 'col3' : 'col2'}">
    ${cols.map(k => {
      const lista = Array.isArray(stanzette[k]) ? stanzette[k] : [];
      return `<div class="stanzetta">
        <div class="stanzetta-title">${STANZETTE_LABEL[k]}</div>
        <div class="stanzetta-abitanti">${lista.length ? lista.map(n => esc(n)).join('<br>') : '<span style="color:#aaa;font-style:italic;">—</span>'}</div>
      </div>`;
    }).join('')}
  </div>`;

  const turniHtml = GIORNI.map(g => `
    <div class="turno-row">
      <span class="turno-giorno">${g}</span>
      <span class="turno-nome">${esc(turni[g] || '—')}</span>
    </div>`).join('');

  const adminHtml = _isAdmin ? `
    <div class="admin-panel">
      <button class="btn-modifica-casa" id="btn-mod">✏️ Modifica casa</button>
    </div>` : '';

  document.getElementById('popup-body').innerHTML = `
    <div class="casa-sezione">
      <div class="casa-sezione-title">⚓ Capitano</div>
      <div class="casa-capitano">${esc(capitano)}</div>
    </div>
    <div class="casa-sezione">
      <div class="casa-sezione-title">🧍 Stanzette</div>
      ${stanzetteHtml}
    </div>
    <div class="casa-sezione">
      <div class="casa-sezione-title">🧹 Turni di pulizia</div>
      <div class="casa-turni">${turniHtml}</div>
    </div>
    ${adminHtml}`;

  if (_isAdmin) {
    document.getElementById('btn-mod').addEventListener('click', () => apriModifica(casaId, d));
  }
}

function apriModifica(casaId, d) {
  const capitano = d.capitano || '';
  const turni = d.turni || {};
  const stanzette = d.stanzette || {};
  const cols = STANZETTE_CFG[casaId] || ['sinistra', 'destra'];

  const turniInputs = GIORNI.map(g => `
    <div class="giorno-lbl">${g}</div>
    <input type="text" id="turno-${g}" value="${esc(turni[g] || '')}" placeholder="Nome">`).join('');

  const stanzetteInputs = cols.map(k => {
    const val = Array.isArray(stanzette[k]) ? stanzette[k].join('\n') : '';
    return `<label>${STANZETTE_LABEL[k]} (uno per riga)</label>
    <textarea id="mod-stanzetta-${k}">${esc(val)}</textarea>`;
  }).join('');

  document.getElementById('popup-body').innerHTML += `
    <div class="modifica-form" id="modifica-form">
      <label>Capitano</label>
      <input type="text" id="mod-capitano" value="${esc(capitano)}">
      <label style="margin-top:10px;">🧍 Stanzette</label>
      ${stanzetteInputs}
      <label>Turni di pulizia</label>
      <div class="turni-grid">${turniInputs}</div>
      <div class="modifica-btns">
        <button class="btn-salva-casa" id="btn-salva">💾 Salva</button>
        <button class="btn-annulla-casa" id="btn-annulla">Annulla</button>
      </div>
      <div id="mod-error" style="color:#c0392b;font-size:0.78rem;margin-top:6px;"></div>
    </div>`;

  document.getElementById('popup-body').querySelector('.admin-panel').style.display = 'none';

  document.getElementById('btn-salva').addEventListener('click', () => salvaCasa(casaId));
  document.getElementById('btn-annulla').addEventListener('click', () => apriCasa(casaId));
}

async function salvaCasa(casaId) {
  const capitano = document.getElementById('mod-capitano').value.trim();
  const cols = STANZETTE_CFG[casaId] || ['sinistra', 'destra'];
  const stanzette = {};
  cols.forEach(k => {
    const raw = document.getElementById('mod-stanzetta-' + k)?.value || '';
    stanzette[k] = raw.split('\n').map(s => s.trim()).filter(Boolean);
  });
  const turni = {};
  GIORNI.forEach(g => {
    const v = document.getElementById('turno-' + g)?.value.trim();
    if (v) turni[g] = v;
  });

  const btn = document.getElementById('btn-salva');
  btn.disabled = true; btn.textContent = '⏳ Salvataggio...';

  try {
    await setDoc(doc(db, 'robinson_villaggio', casaId), {
      nome: CASE[casaId].nome,
      emoji: CASE[casaId].emoji,
      capitano,
      stanzette,
      turni,
      aggiornatoAt: serverTimestamp()
    });
    await apriCasa(casaId);
  } catch(e) {
    const errEl = document.getElementById('mod-error');
    if (errEl) errEl.textContent = 'Errore: ' + e.message;
    btn.disabled = false; btn.textContent = '💾 Salva';
  }
}

// ── 📋 Valutazione giornaliera Villaggio (admin-only) ────────────────────────
const CASE_VALUTAZIONE = [
  { id: 'nautilus',  nome: 'Nautilus' },
  { id: 'atlantide', nome: 'Atlantide' },
  { id: 'perla',     nome: 'Perla Centrale' },
];
const PULIZIA_OPZIONI = [1, 2, 3, 4, 5];
const PENALITA_OPZIONI = [0, -1, -2, -3, -4, -5];

let _valutazioneCorrente = {}; // casaId -> { pulizia, penalita }
let _dataValutazioneKey = null; // YYYY-MM-DD del giorno attualmente aperto nel popup

function oggiKeyLocale() {
  return dataKeyLocale(new Date());
}

function dataKeyLocale(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Parsing manuale (non new Date(key), che l'ISO senza ora interpreta come UTC e può sballare
// di un giorno nei fusi negativi): stessa chiave YYYY-MM-DD usata per l'id documento.
function dataMezzanotteDaKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmtDataIt(d) {
  const giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const mesi = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  return `${giorni[d.getDay()]} ${d.getDate()} ${mesi[d.getMonth()]} ${d.getFullYear()}`;
}

async function apriValutazione() {
  document.getElementById('valutazione-overlay').classList.add('open');
  document.getElementById('valutazione-popup').classList.add('open');

  const oggiKey = oggiKeyLocale();
  const input = document.getElementById('valutazione-data-input');
  input.max = oggiKey; // blocca la scelta di date future
  if (!input.value || input.value > oggiKey) input.value = oggiKey;
  await caricaValutazionePerData(input.value);
}

function onCambioDataValutazione() {
  const input = document.getElementById('valutazione-data-input');
  const oggiKey = oggiKeyLocale();
  if (!input.value || input.value > oggiKey) input.value = oggiKey; // guardia extra oltre a max=
  caricaValutazionePerData(input.value);
}

async function caricaValutazionePerData(key) {
  _dataValutazioneKey = key;
  document.getElementById('valutazione-data').textContent = fmtDataIt(dataMezzanotteDaKey(key));
  document.getElementById('valutazione-body').innerHTML = '<div class="popup-loading">⏳ Caricamento...</div>';
  document.getElementById('valutazione-msg').textContent = '';

  _valutazioneCorrente = {};
  await Promise.all(CASE_VALUTAZIONE.map(async c => {
    try {
      const snap = await getDoc(doc(db, 'robinson_villaggio_valutazioni', `${key}_${c.id}`));
      if (snap.exists()) {
        const d = snap.data();
        _valutazioneCorrente[c.id] = { pulizia: d.pulizia ?? null, penalita: d.penalitaOrganizzazione ?? 0 };
      } else {
        _valutazioneCorrente[c.id] = { pulizia: null, penalita: 0 };
      }
    } catch(_) { _valutazioneCorrente[c.id] = { pulizia: null, penalita: 0 }; }
  }));

  renderValutazioneForm();
}

function chiudiValutazione() {
  document.getElementById('valutazione-overlay').classList.remove('open');
  document.getElementById('valutazione-popup').classList.remove('open');
}

function testoBtnSalva(key) {
  if (key === oggiKeyLocale()) return '💾 Salva valutazione di oggi';
  const [, m, d] = key.split('-');
  return `💾 Salva valutazione del ${d}/${m}`;
}

function renderValutazioneForm() {
  const html = CASE_VALUTAZIONE.map(c => {
    const stato = _valutazioneCorrente[c.id] || { pulizia: null, penalita: 0 };
    const puliziaBtns = PULIZIA_OPZIONI.map(v =>
      `<button type="button" class="val-pill${stato.pulizia===v?' selected':''}" data-casa="${c.id}" data-campo="pulizia" data-val="${v}">${v}</button>`
    ).join('');
    const penalitaBtns = PENALITA_OPZIONI.map(v =>
      `<button type="button" class="val-pill val-pill-penalita${stato.penalita===v?' selected':''}" data-casa="${c.id}" data-campo="penalita" data-val="${v}">${v === 0 ? 'Nessuna' : v}</button>`
    ).join('');
    const totale = (stato.pulizia||0) + (stato.penalita||0);
    return `<div class="val-casa-block">
      <div class="val-casa-nome">🏠 ${esc(c.nome)}</div>
      <div class="val-label">Pulizia</div>
      <div class="val-pill-row">${puliziaBtns}</div>
      <div class="val-label">Penalità organizzazione</div>
      <div class="val-pill-row">${penalitaBtns}</div>
      <div class="val-casa-totale">Totale: <span id="val-tot-${c.id}">${totale}</span> pt</div>
    </div>`;
  }).join('');

  document.getElementById('valutazione-body').innerHTML = html +
    `<button class="btn-salva-casa" id="btn-salva-valutazione" style="width:100%;margin-top:6px;">${testoBtnSalva(_dataValutazioneKey)}</button>`;

  document.querySelectorAll('.val-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const casaId = btn.dataset.casa;
      const campo = btn.dataset.campo;
      const val = Number(btn.dataset.val);
      _valutazioneCorrente[casaId] = _valutazioneCorrente[casaId] || { pulizia: null, penalita: 0 };
      _valutazioneCorrente[casaId][campo] = val;
      document.querySelectorAll(`.val-pill[data-casa="${casaId}"][data-campo="${campo}"]`)
        .forEach(b => b.classList.toggle('selected', b === btn));
      const tot = (_valutazioneCorrente[casaId].pulizia||0) + (_valutazioneCorrente[casaId].penalita||0);
      const totEl = document.getElementById('val-tot-' + casaId);
      if (totEl) totEl.textContent = tot;
    });
  });

  document.getElementById('btn-salva-valutazione').addEventListener('click', salvaValutazione);
}

async function salvaValutazione() {
  const msgEl = document.getElementById('valutazione-msg');
  const mancanti = CASE_VALUTAZIONE.filter(c => !_valutazioneCorrente[c.id] || _valutazioneCorrente[c.id].pulizia == null);
  if (mancanti.length) {
    msgEl.style.color = '#c0392b';
    msgEl.textContent = 'Seleziona la pulizia per: ' + mancanti.map(c => c.nome).join(', ');
    return;
  }

  const btn = document.getElementById('btn-salva-valutazione');
  btn.disabled = true; btn.textContent = '⏳ Salvataggio...';
  const oggiKey = _dataValutazioneKey; // data selezionata nel picker, non necessariamente oggi
  const mezzanotte = dataMezzanotteDaKey(oggiKey);

  try {
    await Promise.all(CASE_VALUTAZIONE.map(c => {
      const stato = _valutazioneCorrente[c.id];
      const totale = (stato.pulizia||0) + (stato.penalita||0);
      return setDoc(doc(db, 'robinson_villaggio_valutazioni', `${oggiKey}_${c.id}`), {
        data: mezzanotte,
        dataGiorno: oggiKey,
        casa: c.id,
        pulizia: stato.pulizia,
        penalitaOrganizzazione: stato.penalita,
        totale,
        autore: _currentUser.uid,
        aggiornatoIl: serverTimestamp()
      });
    }));
    msgEl.style.color = '#1a3a5c';
    msgEl.textContent = '✅ Valutazione salvata!';
    setTimeout(() => { if (msgEl) msgEl.textContent = ''; }, 2500);
  } catch(e) {
    msgEl.style.color = '#c0392b';
    msgEl.textContent = 'Errore: ' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = testoBtnSalva(oggiKey);
  }
}
</script>
</body>
</html>
