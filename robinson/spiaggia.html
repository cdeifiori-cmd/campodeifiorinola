<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Spiaggia – Robinson</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; }
    .delete-btn:hover { color: var(--rosso); }
    .upload-area { border: 2px dashed #c8b89a; border-radius: 8px; padding: 10px; margin-top: 8px; }
    .upload-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .upload-btn { background: var(--carta-scura); border: 1.5px solid #c8b89a; border-radius: 8px; padding: 6px 12px; font-size: 0.78rem; cursor: pointer; font-family: 'Lora', serif; }
    .progress-wrap { display:none; background: var(--carta-scura); border-radius: 4px; height: 6px; margin-top: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--oro); width: 0%; transition: width 0.3s; border-radius: 4px; }
  </style>
</head>
<body>

<header class="top-header">
  <div>
    <div class="header-title-main">🏖️ La Spiaggia</div>
    <div class="header-title-sub">messaggi e voci dell'isola</div>
  </div>
  <div id="nav-auth-slot"></div>
</header>

<div id="feed" class="feed">
  <div class="spinner"></div>
</div>

<button class="fab" id="fab-new" title="Nuovo post">+</button>

<!-- Modal nuovo post -->
<div class="modal-overlay" id="modal-post">
  <div class="modal-box">
    <div class="modal-title">🏖️ Scrivi sulla Spiaggia</div>
    <div class="form-group">
      <textarea id="post-text" placeholder="Cosa vuoi condividere con l'isola?" rows="4" style="width:100%;padding:9px 12px;border:1.5px solid #c8b89a;border-radius:8px;font-family:'Lora',serif;font-size:0.9rem;background:var(--post-bg);resize:vertical;"></textarea>
    </div>
    <div class="upload-area">
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px;">📎 Allegati (facoltativo)</div>
      <div class="upload-row">
        <label class="upload-btn">📷 Foto <input type="file" id="inp-foto" accept="image/*" multiple style="display:none;"></label>
        <label class="upload-btn">🎥 Video <input type="file" id="inp-video" accept="video/*" multiple style="display:none;"></label>
        <label class="upload-btn">🎵 Audio <input type="file" id="inp-audio" accept="audio/*" multiple style="display:none;"></label>
      </div>
      <div id="preview-allegati"></div>
      <div class="progress-wrap" id="prog-wrap"><div class="progress-bar" id="prog-bar"></div></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn btn-primary" id="btn-pubblica">Pubblica 🌊</button>
      <button class="btn" style="background:var(--carta-scura);" id="btn-annulla">Annulla</button>
    </div>
    <div id="post-err" style="color:var(--rosso);font-size:0.8rem;margin-top:8px;"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏝️</span><span>Home</span></a>
  <a href="spiaggia.html" class="nav-item active"><span class="nav-icon">🏖️</span><span>Spiaggia</span></a>
  <a href="naufraghi.html" class="nav-item"><span class="nav-icon">👤</span><span>Naufraghi</span></a>
  <a href="ciurma.html" class="nav-item"><span class="nav-icon">⚓</span><span>Ciurma</span></a>
  <a href="appunti.html" class="nav-item"><span class="nav-icon">📔</span><span>Appunti</span></a>
</nav>

<script type="module">
import { db, auth, EMOJIS, ADMIN_UID } from './js/robinson-firebase.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { aggiungiPunteggio } from './js/robinson-punteggio.js';
import { esc, fmtDate, risolviNome, uploadAll, renderMediaGrid, normalizeMedia, renderPreview } from './js/robinson-utils.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  collection, addDoc, deleteDoc, doc, onSnapshot,
  query, orderBy, limit, getDoc, setDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

setupNavAuth('nav-auth-slot');

const COL = 'robinson_spiaggia';
let currentUser = null;
let allegati = []; // {file, type, previewUrl}

onAuthStateChanged(auth, user => {
  if (!user) { location.href = 'https://campodeifiori.org/login.html'; return; }
  currentUser = user;
  loadFeed();
});

// ── Feed ────────────────────────────────────────────────────────────────
function loadFeed() {
  const feed = document.getElementById('feed');
  const q = query(collection(db, COL), orderBy('timestamp', 'desc'), limit(50));
  onSnapshot(q, async snap => {
    if (snap.empty) { feed.innerHTML = '<div class="empty-msg">🌊 Nessun post ancora. Sii il primo!</div>'; return; }
    const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    feed.innerHTML = '';
    for (const p of posts) {
      const div = document.createElement('div');
      div.className = 'post-card';
      div.id = 'post-' + p.id;
      div.innerHTML = await buildPostHTML(p);
      feed.appendChild(div);
      attachPostEvents(div, p);
    }
  });
}

async function buildPostHTML(p) {
  const media = normalizeMedia(p);
  const isAuthor = currentUser && (currentUser.uid === p.authorId || currentUser.uid === ADMIN_UID);
  const avatar = p.authorPhoto ? `<img src="${esc(p.authorPhoto)}" class="post-avatar">` : `<div class="post-avatar" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem;">⚓</div>`;
  return `
    <div class="post-header">
      ${avatar}
      <div class="post-meta">
        <div class="post-author">${esc(p.authorName || 'Naufrago')}</div>
        <div class="post-time">${fmtDate(p.timestamp)}</div>
      </div>
      ${isAuthor ? `<button class="delete-btn" data-id="${esc(p.id)}">🗑️</button>` : ''}
    </div>
    ${p.text ? `<div class="post-text">${esc(p.text)}</div>` : ''}
    ${renderMediaGrid(media)}
    <div class="reaction-bar" id="reactions-${esc(p.id)}">
      ${EMOJIS.map(e => `<button class="reaction-btn" data-emoji="${esc(e)}" data-pid="${esc(p.id)}">${e} <span class="rcount">0</span></button>`).join('')}
    </div>
    <div class="post-actions">
      <button class="btn btn-sm" style="background:var(--carta-scura);" data-toggle-comments="${esc(p.id)}">💬 Commenti</button>
    </div>
    <div id="comments-${esc(p.id)}" style="display:none;">
      <div class="comments-list" id="clist-${esc(p.id)}"></div>
      <div class="comment-form">
        <input type="text" placeholder="Scrivi un commento..." id="cinp-${esc(p.id)}">
        <button class="btn btn-sm btn-primary" data-send-comment="${esc(p.id)}">Invia</button>
      </div>
    </div>`;
}

function attachPostEvents(div, p) {
  // Delete
  div.querySelector('.delete-btn')?.addEventListener('click', async () => {
    if (!confirm('Eliminare questo post?')) return;
    await deleteDoc(doc(db, COL, p.id));
  });

  // Reactions
  loadReactions(p.id);
  div.querySelectorAll('.reaction-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleReaction(p.id, btn.dataset.emoji));
  });

  // Comments toggle
  div.querySelector(`[data-toggle-comments]`)?.addEventListener('click', () => {
    const box = document.getElementById('comments-' + p.id);
    if (!box) return;
    if (box.style.display === 'none') {
      box.style.display = 'block';
      loadComments(p.id);
    } else {
      box.style.display = 'none';
    }
  });

  // Send comment
  div.querySelector(`[data-send-comment]`)?.addEventListener('click', () => sendComment(p.id));
  div.querySelector(`#cinp-${p.id}`)?.addEventListener('keydown', e => { if (e.key === 'Enter') sendComment(p.id); });
}

// ── Reactions ───────────────────────────────────────────────────────────
async function loadReactions(pid) {
  const rRef = collection(db, COL, pid, 'user_reactions');
  onSnapshot(rRef, snap => {
    const counts = {};
    EMOJIS.forEach(e => counts[e] = 0);
    let myEmojis = [];
    snap.forEach(d => {
      const data = d.data();
      (data.emojis || []).forEach(e => { if (counts[e] !== undefined) counts[e]++; });
      if (currentUser && d.id === currentUser.uid) myEmojis = data.emojis || [];
    });
    const bar = document.getElementById('reactions-' + pid);
    if (!bar) return;
    bar.querySelectorAll('.reaction-btn').forEach(btn => {
      const e = btn.dataset.emoji;
      btn.querySelector('.rcount').textContent = counts[e] || 0;
      btn.classList.toggle('mine', myEmojis.includes(e));
    });
  });
}

async function toggleReaction(pid, emoji) {
  if (!currentUser) return;
  const rDoc = doc(db, COL, pid, 'user_reactions', currentUser.uid);
  const snap = await getDoc(rDoc);
  let emojis = snap.exists() ? (snap.data().emojis || []) : [];
  const had = emojis.includes(emoji);
  emojis = had ? emojis.filter(e => e !== emoji) : [...emojis, emoji];
  await setDoc(rDoc, { emojis });
  if (!had) aggiungiPunteggio(currentUser.uid, 'reazione');
}

// ── Comments ────────────────────────────────────────────────────────────
function loadComments(pid) {
  const list = document.getElementById('clist-' + pid);
  if (!list) return;
  const q = query(collection(db, COL, pid, 'commenti'), orderBy('timestamp', 'asc'));
  onSnapshot(q, snap => {
    list.innerHTML = snap.docs.map(d => {
      const c = d.data();
      return `<div class="comment-item"><span class="comment-author">${esc(c.authorName || 'Naufrago')}</span>: ${esc(c.text)}<span style="float:right;font-size:0.68rem;color:var(--muted);">${fmtDate(c.timestamp)}</span></div>`;
    }).join('');
  });
}

async function sendComment(pid) {
  if (!currentUser) return;
  const inp = document.getElementById('cinp-' + pid);
  const text = inp?.value?.trim();
  if (!text) return;
  inp.value = '';
  await addDoc(collection(db, COL, pid, 'commenti'), {
    text,
    authorId: currentUser.uid,
    authorName: currentUser.displayName || 'Naufrago',
    authorPhoto: currentUser.photoURL || null,
    timestamp: serverTimestamp()
  });
  aggiungiPunteggio(currentUser.uid, 'commento');
}

// ── Nuovo post ──────────────────────────────────────────────────────────
document.getElementById('fab-new').addEventListener('click', () => {
  document.getElementById('modal-post').classList.add('open');
});
document.getElementById('btn-annulla').addEventListener('click', () => {
  document.getElementById('modal-post').classList.remove('open');
  allegati = [];
  renderPreview([], document.getElementById('preview-allegati'));
});

// File inputs
['foto', 'video', 'audio'].forEach(tipo => {
  document.getElementById('inp-' + tipo).addEventListener('change', e => {
    const files = Array.from(e.target.files);
    files.forEach(f => {
      allegati.push({ file: f, type: tipo === 'foto' ? 'image' : tipo, previewUrl: URL.createObjectURL(f) });
    });
    e.target.value = '';
    aggiPreview();
  });
});

function aggiPreview() {
  const container = document.getElementById('preview-allegati');
  renderPreview(allegati, container);
  container.querySelectorAll('.prev-rm').forEach(btn => {
    btn.addEventListener('click', () => {
      allegati.splice(parseInt(btn.dataset.idx), 1);
      aggiPreview();
    });
  });
}

document.getElementById('btn-pubblica').addEventListener('click', async () => {
  if (!currentUser) return;
  const text = document.getElementById('post-text').value.trim();
  const err = document.getElementById('post-err');
  if (!text && !allegati.length) { err.textContent = 'Scrivi qualcosa o aggiungi un allegato.'; return; }
  err.textContent = '';

  const btn = document.getElementById('btn-pubblica');
  btn.disabled = true;
  btn.textContent = 'Pubblicazione...';

  try {
    let media = [];
    if (allegati.length) {
      const prog = document.getElementById('prog-wrap');
      const bar = document.getElementById('prog-bar');
      prog.style.display = 'block';
      let done = 0;
      media = await Promise.all(allegati.map(a =>
        uploadAll([a]).then(r => {
          done++;
          bar.style.width = Math.round(done / allegati.length * 100) + '%';
          return r[0];
        })
      ));
      setTimeout(() => { prog.style.display = 'none'; bar.style.width = '0%'; }, 500);
    }

    await addDoc(collection(db, COL), {
      text,
      authorId: currentUser.uid,
      authorName: currentUser.displayName || 'Naufrago',
      authorPhoto: currentUser.photoURL || null,
      media,
      timestamp: serverTimestamp()
    });

    aggiungiPunteggio(currentUser.uid, 'post');
    media.forEach(m => {
      if (m.type === 'image') aggiungiPunteggio(currentUser.uid, 'foto');
      else if (m.type === 'video') aggiungiPunteggio(currentUser.uid, 'video');
      else if (m.type === 'audio') aggiungiPunteggio(currentUser.uid, 'audio');
    });

    document.getElementById('post-text').value = '';
    allegati = [];
    renderPreview([], document.getElementById('preview-allegati'));
    document.getElementById('modal-post').classList.remove('open');
  } catch (e) {
    err.textContent = 'Errore: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Pubblica 🌊';
  }
});
</script>
</body>
</html>
