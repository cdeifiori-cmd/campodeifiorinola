<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Spiaggia – Robinson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/robinson.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#1a3a5c; --oro:#c8860a; --carta:#f5f0e8; --muted:#6b5c45; --rosso:#c0392b; }

    body {
      background-image: url('spiaggia_cell2.png');
      background-size: cover;
      background-position: top center;
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Lora', serif;
      color: var(--navy);
      padding-bottom: 90px;
    }
    @media (min-width: 769px) {
      body { background-image: url('spiaggia_pc.png'); }
    }

    /* ── Auth slot ── */
    #nav-auth-slot-wrap { position: fixed; top: 6px; right: 8px; z-index: 300; }
    @media (max-width: 768px) {
      #nav-auth-slot-wrap { top: auto; bottom: 80px; right: 76px; }
      #nav-auth-slot .nav-user-name { display: none; }
      #nav-auth-slot img { width: 28px !important; height: 28px !important; }
    }

    /* Nasconde l'header img inline — usiamo solo il CSS background */
    .spiaggia-header { display: none; }

    /* ── Header fisso ── */
    .spiaggia-header-fixed {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 32vw;
      max-height: 200px;
      background-image: url('spiaggia_cell2.png');
      background-size: cover;
      background-position: top center;
      z-index: 100;
    }
    @media (min-width: 769px) {
      .spiaggia-header-fixed {
        background-image: url('spiaggia_pc.png');
        height: 18vw;
        max-height: 220px;
      }
    }

    /* ── Contenuto sotto header ── */
    .spiaggia-content {
      padding-top: calc(min(32vw, 200px) + 8px);
    }
    @media (min-width: 769px) {
      .spiaggia-content { padding-top: 225px; }
    }


    /* ── FAB nuovo post ── */
    .btn-nuovo-post {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #c8860a;
      color: #fff;
      font-size: 32px;
      border: none;
      cursor: pointer;
      box-shadow: 2px 4px 12px #0000004a;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* ── Feed ── (compose area rimossa) */

    /* ── Feed ── */
    .feed { padding: 8px 16px 20px; display: flex; flex-direction: column; align-items: center; gap: 28px; }

    /* ── Polaroid ── */
    .post-polaroid {
      background: #fff;
      padding: 12px 12px 44px 12px;
      box-shadow: 3px 6px 20px rgba(0,0,0,0.5);
      border-radius: 2px;
      transform: rotate(var(--rot, -1deg));
      width: 100%; max-width: 340px;
      position: relative;
      font-family: 'Lora', serif;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .post-polaroid:hover { box-shadow: 4px 8px 28px rgba(0,0,0,0.32); }

    .polaroid-img-wrap { width: 100%; margin-bottom: 10px; background: #f0f0f0; }
    .polaroid-img-wrap img { width: 100%; display: block; object-fit: cover; cursor: pointer; border-radius: 1px; }
    .polaroid-img-wrap video { width: 100%; display: block; }

    .polaroid-text { font-style: italic; font-size: 0.95rem; line-height: 1.6; color: #333; white-space: pre-wrap; word-break: break-word; margin-bottom: 8px; }

    .audio-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .audio-row { display: flex; align-items: center; gap: 8px; background: #f8f3e8; border-radius: 10px; padding: 6px 10px; }
    .audio-row audio { flex: 1; height: 30px; min-width: 0; }

    .polaroid-footer { position: absolute; bottom: 10px; left: 12px; right: 12px; display: flex; align-items: center; justify-content: space-between; }
    .polaroid-autore { font-size: 0.72rem; color: #888; font-style: normal; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .polaroid-data { font-size: 0.68rem; color: #bbb; }

    /* Reactions sotto la polaroid */
    .post-reactions-wrap { max-width: 340px; width: 100%; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; padding: 6px 0 0; }
    .reaction-btn {
      display: inline-flex; align-items: center; gap: 3px;
      background: rgba(255,255,255,0.85); border: 1.5px solid #ddd; border-radius: 20px; padding: 3px 9px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: background 0.15s, border-color 0.15s; color: var(--navy);
    }
    .reaction-btn.active { background: #f5ead5; border-color: var(--oro); color: var(--oro); }
    .reaction-btn:hover { background: #f5ead5; }

    /* Commenta */
    .btn-comments {
      background: #1a3a5c; border: none; border-radius: 20px;
      font-size: 0.75rem; font-weight: 500;
      color: #c8860a; cursor: pointer; padding: 5px 14px; transition: background 0.15s; font-family: 'Lora', serif;
    }
    .btn-comments:hover { background: #0f2540; }
    .comments-section { display: none; max-width: 340px; width: 100%; }
    .comments-section.open { display: block; }
    .comment-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .comment-item { display: flex; gap: 8px; align-items: flex-start; }
    .comment-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; background: #e8e0d0; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; overflow: hidden; }
    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-bubble { background: #faf7f0; border-radius: 10px; padding: 7px 10px; flex: 1; min-width: 0; font-size: 0.83rem; border: 1px solid #e8e0d0; }
    .comment-autore { font-weight: 700; font-size: 0.76rem; margin-bottom: 2px; color: var(--navy); }
    .comment-text { color: #444; white-space: pre-wrap; word-break: break-word; }
    .comment-data { font-size: 0.66rem; color: #bbb; margin-top: 3px; }
    .cmedia-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 6px; }
    .cmedia-grid.single { grid-template-columns: 1fr; }
    .cmedia-grid img { width: 100%; border-radius: 6px; display: block; }
    .cmedia-grid video { width: 100%; border-radius: 6px; display: block; }
    .caudio-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .caudio-row { display: flex; align-items: center; gap: 6px; background: #f8f3e8; border-radius: 8px; padding: 5px 8px; }
    .caudio-row audio { flex: 1; height: 26px; min-width: 0; }
    .comment-reactions { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
    .comment-reaction-btn { background: #eee; border: 1px solid #ddd; border-radius: 12px; padding: 2px 7px; font-size: 0.76rem; font-weight: 700; cursor: pointer; color: var(--navy); transition: background 0.12s; }
    .comment-reaction-btn.active { background: #f5ead5; border-color: var(--oro); }

    /* Comment input */
    .comment-input-wrap { display: flex; gap: 8px; align-items: flex-end; margin-top: 8px; }
    .comment-input-inner { flex: 1; }
    .comment-textarea { width: 100%; border: 1.5px solid #c8b89a; border-radius: 10px; padding: 7px 10px; font-family: 'Lora', serif; font-size: 0.85rem; resize: none; outline: none; background: #fff; transition: border-color 0.15s; min-height: 34px; max-height: 100px; }
    .comment-textarea:focus { border-color: var(--oro); }
    .comment-media-btns { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .comment-media-btn { background: none; border: 1.5px solid #c8b89a; border-radius: 18px; padding: 3px 8px; font-size: 0.75rem; cursor: pointer; font-family: 'Lora', serif; transition: background 0.12s; }
    .comment-media-btn:hover { background: #f5ead5; border-color: var(--oro); }
    .comment-media-btn.recording { background: #ffe5e5; border-color: var(--rosso); color: var(--rosso); animation: pulse 1s infinite; }
    .comment-send-btn { background: var(--navy); color: var(--oro); border: none; border-radius: 10px; padding: 8px 14px; font-size: 0.82rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background 0.15s; flex-shrink: 0; font-family: 'Lora', serif; }
    .comment-send-btn:hover { background: #0f2540; }
    .btn-camera { display: none; }
    @media (pointer: coarse) { .btn-camera { display: inline-flex; } }

    /* Preview */
    .preview-wrap { margin: 8px 0; }
    .preview-count { font-size: 0.76rem; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
    .preview-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .prev-item { position: relative; border-radius: 8px; overflow: visible; }
    .prev-item img, .prev-item video { display: block; width: 80px; height: auto; object-fit: contain; border-radius: 8px; background: #f0f0f0; }
    .prev-item.audio { display: flex; align-items: center; gap: 6px; background: #f8f3e8; border-radius: 8px; padding: 6px 10px; width: 100%; }
    .prev-item.audio audio { flex: 1; height: 28px; }
    .prev-item.audio .aname { font-size: 0.7rem; color: var(--muted); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prev-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--rosso); color: #fff; border: none; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; }
    .prev-item.audio .prev-remove { position: static; flex-shrink: 0; }

    /* Tono picker */
    .tono-picker { display: flex; gap: 2px; flex-wrap: wrap; margin-bottom: 5px; }
    .tono-btn { background: none; border: 2px solid transparent; border-radius: 6px; font-size: 1.15rem; padding: 2px 3px; cursor: pointer; line-height: 1; transition: border-color 0.12s; }
    .tono-btn.selected { border-color: var(--oro); background: #f5ead5; }

    /* Modal nuovo post */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal-sheet { background: var(--carta); border-radius: 20px 20px 0 0; width: 100%; max-width: 560px; padding: 20px 18px 28px; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.25s ease; }
    .modal-backdrop.open .modal-sheet { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .modal-title { font-size: 1rem; font-weight: 700; color: var(--navy); font-family: 'Playfair Display', serif; }
    .modal-close { background: #e0d8cc; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .form-textarea { width: 100%; border: 1.5px solid #c8b89a; border-radius: 12px; padding: 10px 12px; font-family: 'Lora', serif; font-size: 0.95rem; resize: none; outline: none; min-height: 90px; background: #fff; transition: border-color 0.15s; }
    .form-textarea:focus { border-color: var(--oro); }
    .media-btns { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 6px; }
    .media-btn { display: flex; align-items: center; gap: 5px; background: #fff; border: 1.5px solid #c8b89a; border-radius: 20px; padding: 6px 14px; font-family: 'Lora', serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .media-btn:hover { background: #f5ead5; border-color: var(--oro); }
    .media-btn.recording { background: #ffe5e5; border-color: var(--rosso); color: var(--rosso); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }
    .upload-progress { height: 4px; background: #e0d8cc; border-radius: 2px; margin: 8px 0; display: none; }
    .upload-progress-bar { height: 100%; background: var(--oro); border-radius: 2px; transition: width 0.3s; }
    .btn-pubblica { width: 100%; background: var(--navy); color: var(--oro); border: 2px solid var(--oro); border-radius: 14px; padding: 12px; font-family: 'Lora', serif; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px; transition: background 0.15s; }
    .btn-pubblica:hover:not(:disabled) { background: #0f2540; }
    .btn-pubblica:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Options post menu */
    .post-options-wrap { position: absolute; top: 10px; right: 10px; }
    .post-options-btn { background: none; border: none; color: #bbb; font-size: 1.1rem; cursor: pointer; padding: 2px 6px; border-radius: 6px; }
    .post-options-btn:hover { background: #f0f0f0; color: #555; }
    .post-options-menu { position: absolute; right: 0; top: calc(100% + 4px); background: #fff; border-radius: 10px; box-shadow: 0 4px 18px rgba(0,0,0,0.15); min-width: 160px; z-index: 200; display: none; overflow: hidden; }
    .post-options-menu.open { display: block; }
    .post-options-menu button { display: block; width: 100%; padding: 10px 14px; background: none; border: none; text-align: left; font-family: 'Lora', serif; font-size: 0.85rem; cursor: pointer; }
    .post-options-menu button:hover { background: #f5f5f5; }
    .post-options-menu .opt-delete { color: var(--rosso); }

    /* Lightbox */
    #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000; display: none; align-items: center; justify-content: center; animation: lbfade 0.2s ease; }
    #lightbox.open { display: flex; }
    @keyframes lbfade { from{opacity:0} to{opacity:1} }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 4px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
    #lightbox-close { position: fixed; top: 18px; right: 22px; background: rgba(255,255,255,0.18); border: none; color: #fff; font-size: 1.6rem; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .spinner { width: 34px; height: 34px; border: 3px solid #e8e0d0; border-top-color: var(--oro); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 2.5rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-msg { color: var(--muted); text-align: center; padding: 2rem; font-style: italic; }
  </style>
</head>

<script type="module">
import { db, auth, ADMIN_UID, CLOUD_NAME, CLOUD_PRESET, EMOJIS } from './js/robinson-firebase.js';
import { setupNavAuth } from './js/robinson-nav.js';
import { esc } from './js/robinson-utils.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  collection, addDoc, getDoc, getDocs, doc, updateDoc, query, orderBy,
  limit, serverTimestamp, onSnapshot, deleteDoc, increment, setDoc, arrayUnion, arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

setupNavAuth('nav-auth-slot');

// Lightbox
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
document.getElementById('lightbox-close').addEventListener('click', () => lightbox.classList.remove('open'));
lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
function openLightbox(src) { lbImg.src = src; lightbox.classList.add('open'); }

const COLL = 'robinson_spiaggia';
const MAX_FILES = 10;
const myPostReactions = new Map();
const myCommentReactions = new Map();
const _nomiCache = {};

let currentUser = null, currentUserData = null, isAdmin = false;

onAuthStateChanged(auth, async user => {
  currentUser = user;
  if (user) {
    isAdmin = user.uid === ADMIN_UID;
    try {
      let snap = await getDoc(doc(db, 'utenti', user.uid));
      if (!snap.exists()) snap = await getDoc(doc(db, 'staff', user.uid));
      if (snap.exists()) currentUserData = snap.data();
    } catch(_) {}
    document.getElementById('fab-new-post').style.display = 'flex';
  }
  loadFeed();
});

async function getDatiAutore() {
  let nome = currentUserData?.nome || currentUser?.displayName || '';
  let foto = currentUserData?.fotoProfilo || '';
  if (!nome && currentUser) {
    try {
      let snap = await getDoc(doc(db, 'utenti', currentUser.uid));
      if (!snap.exists()) snap = await getDoc(doc(db, 'staff', currentUser.uid));
      if (snap.exists()) { const d = snap.data(); currentUserData = d; nome = d.nome || ''; foto = d.fotoProfilo || ''; }
    } catch(_) {}
  }
  return { nome: nome || 'Naufrago', foto: foto || '' };
}

async function risolviNome(uid) {
  if (_nomiCache[uid] !== undefined) return _nomiCache[uid];
  try {
    const [su, ss] = await Promise.all([getDoc(doc(db, 'utenti', uid)), getDoc(doc(db, 'staff', uid))]);
    const n = su.data()?.nome || ss.data()?.nome || '';
    _nomiCache[uid] = n; return n;
  } catch(_) { _nomiCache[uid] = ''; return ''; }
}

// ── Cloudinary ──────────────────────────────────────────────────────────────
async function uploadOne(file, type) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUD_PRESET);
  const resType = type === 'image' ? 'image' : 'video';
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resType}/upload`, { method:'POST', body:fd });
  const data = await res.json();
  if (!data.secure_url) throw new Error('Upload fallito: ' + (data.error?.message || file.name));
  return data.secure_url;
}

async function uploadAll(items, barEl, progEl) {
  if (progEl) progEl.style.display = 'block';
  let done = 0;
  const results = await Promise.all(items.map(item => uploadOne(item.file, item.type).then(url => {
    done++;
    if (barEl) barEl.style.width = Math.round(done / items.length * 100) + '%';
    return { url, type: item.type, name: item.name };
  })));
  setTimeout(() => { if (progEl) progEl.style.display = 'none'; if (barEl) barEl.style.width = '0%'; }, 500);
  return results;
}

function normalizeMedia(data) {
  if (Array.isArray(data.media) && data.media.length) return data.media;
  if (data.mediaUrl) return [{ url: data.mediaUrl, type: data.mediaType || 'image', name: '' }];
  return [];
}

function renderPreview(items, containerId, onRemove) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  if (!items.length) { wrap.innerHTML = ''; return; }
  let html = `<div class="preview-wrap"><div class="preview-count">${items.length} allegat${items.length === 1 ? 'o' : 'i'}</div><div class="preview-grid">`;
  items.forEach((item, idx) => {
    if (item.type === 'image') html += `<div class="prev-item"><img src="${esc(item.previewUrl)}" alt=""><button class="prev-remove" data-idx="${idx}">✕</button></div>`;
    else if (item.type === 'video') html += `<div class="prev-item"><video src="${esc(item.previewUrl)}" muted playsinline></video><button class="prev-remove" data-idx="${idx}">✕</button></div>`;
    else html += `<div class="prev-item audio"><span>🎵</span><audio src="${esc(item.previewUrl)}" controls></audio><span class="aname">${esc(item.name)}</span><button class="prev-remove" data-idx="${idx}">✕</button></div>`;
  });
  html += '</div></div>';
  wrap.innerHTML = html;
  wrap.querySelectorAll('.prev-remove').forEach(btn => btn.addEventListener('click', () => onRemove(parseInt(btn.dataset.idx))));
}

// ── Modal nuovo post ────────────────────────────────────────────────────────
const postItems = [];
function refreshPostPreview() {
  renderPreview(postItems, 'post-preview', i => {
    URL.revokeObjectURL(postItems[i].previewUrl);
    postItems.splice(i, 1);
    refreshPostPreview();
  });
}
function postAddFile(f, type) {
  if (postItems.length >= MAX_FILES) { alert(`Max ${MAX_FILES} allegati.`); return; }
  postItems.push({ file: f, type, name: f.name || type, previewUrl: URL.createObjectURL(f) });
  refreshPostPreview();
}

const backdrop = document.getElementById('modal-backdrop');
document.getElementById('fab-new-post').addEventListener('click', () => backdrop.classList.add('open'));
document.getElementById('modal-close').addEventListener('click', closeModal);
backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });

function closeModal() {
  backdrop.classList.remove('open');
  document.getElementById('post-text').value = '';
  postItems.forEach(i => URL.revokeObjectURL(i.previewUrl)); postItems.length = 0;
  renderPreview([], 'post-preview', ()=>{});
  if (postRecording) stopPostRec();
}

['input-foto','input-foto-cam'].forEach(id => document.getElementById(id).addEventListener('change', e => { Array.from(e.target.files).forEach(f => postAddFile(f,'image')); e.target.value=''; }));
['input-video','input-video-cam'].forEach(id => document.getElementById(id).addEventListener('change', e => { Array.from(e.target.files).forEach(f => postAddFile(f,'video')); e.target.value=''; }));
document.getElementById('input-audio-file').addEventListener('change', e => { Array.from(e.target.files).forEach(f => postAddFile(f,'audio')); e.target.value=''; });

let postRecorder=null, postAudioChunks=[], postRecording=false;
const btnAudio = document.getElementById('btn-audio');
btnAudio.addEventListener('click', async () => {
  if (postRecording) { stopPostRec(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    postAudioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
    postRecorder = new MediaRecorder(stream, { mimeType });
    postRecorder.ondataavailable = e => postAudioChunks.push(e.data);
    postRecorder.onstop = () => {
      const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
      const blob = new Blob(postAudioChunks, { type: mimeType });
      postAddFile(new File([blob], `rec_${Date.now()}.${ext}`, { type: mimeType }), 'audio');
      stream.getTracks().forEach(t => t.stop());
    };
    postRecorder.start(); postRecording = true;
    btnAudio.textContent = '⏹️ Stop'; btnAudio.classList.add('recording');
  } catch(err) { alert('Microfono non disponibile: ' + err.message); }
});
function stopPostRec() {
  if (postRecorder && postRecording) {
    postRecorder.stop(); postRecording = false;
    btnAudio.textContent = '🎙️ Audio'; btnAudio.classList.remove('recording');
  }
}

document.getElementById('btn-pubblica').addEventListener('click', async () => {
  if (!currentUser) return;
  const text = document.getElementById('post-text').value.trim();
  if (!text && postItems.length === 0) { alert('Scrivi qualcosa o aggiungi un allegato!'); return; }
  const btn = document.getElementById('btn-pubblica');
  btn.disabled = true; btn.textContent = 'Pubblicazione…';
  try {
    const itemsToUpload = [...postItems];
    const media = itemsToUpload.length ? await uploadAll(itemsToUpload, document.getElementById('upload-bar'), document.getElementById('upload-progress')) : [];
    const { nome, foto } = await getDatiAutore();
    await addDoc(collection(db, COLL), { authorId: currentUser.uid, authorName: nome, authorPhoto: foto, text, media, timestamp: serverTimestamp(), reactions: {}, commentsCount: 0 });
    await aggiungiPunteggio(currentUser.uid, 'post');
    closeModal();
  } catch(err) { alert('Errore: ' + err.message); }
  finally { btn.disabled = false; btn.textContent = '🌊 Pubblica'; }
});

// ── Punteggio ───────────────────────────────────────────────────────────────
async function aggiungiPunteggio(uid, tipo) {
  try {
    const punti = { post: 3, commento: 1, reazione: 0 };
    if (!punti[tipo]) return;
    await updateDoc(doc(db, 'robinson_naufraghi', uid), { punteggio: increment(punti[tipo]) });
  } catch(_) {}
}

// ── Feed ────────────────────────────────────────────────────────────────────
function loadFeed() {
  const feedEl = document.getElementById('feed');
  feedEl.innerHTML = '<div class="spinner"></div>';
  const q = query(collection(db, COLL), orderBy('timestamp', 'desc'), limit(40));
  onSnapshot(q, snap => {
    feedEl.innerHTML = '';
    if (snap.empty) { feedEl.innerHTML = '<p class="empty-msg">La spiaggia è silenziosa… sii il primo a scrivere! 🌊</p>'; return; }
    snap.forEach(d => {
      const wrapper = buildPostWrapper(d.id, d.data());
      feedEl.appendChild(wrapper);
    });
  }, err => { feedEl.innerHTML = '<p class="empty-msg">Errore caricamento.</p>'; console.error(err); });
}

function fmtDate(ts) {
  if (!ts?.toDate) return '';
  const d = ts.toDate();
  return d.toLocaleDateString('it-IT', { day:'numeric', month:'short' }) + ' · ' + d.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
}

function buildPostWrapper(postId, data) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;width:100%;max-width:360px;';
  wrap.dataset.postId = postId;

  // Polaroid
  const card = document.createElement('div');
  card.className = 'post-polaroid';
  const rot = (Math.random() * 4 - 2).toFixed(2);
  card.style.setProperty('--rot', rot + 'deg');
  card._postData = data;

  const media = normalizeMedia(data);
  const imgs = media.filter(m => m.type === 'image');
  const vids = media.filter(m => m.type === 'video');
  const audios = media.filter(m => m.type === 'audio');
  const visual = [...imgs, ...vids];

  let mediaHtml = '';
  if (visual.length) {
    mediaHtml += `<div class="polaroid-img-wrap">`;
    visual.forEach(m => {
      if (m.type === 'image') mediaHtml += `<img src="${esc(m.url)}" loading="lazy" alt="foto" data-lightbox="${esc(m.url)}">`;
      else mediaHtml += `<video src="${esc(m.url)}" controls playsinline></video>`;
    });
    mediaHtml += `</div>`;
  }
  if (audios.length) {
    mediaHtml += `<div class="audio-list">`;
    audios.forEach(m => { mediaHtml += `<div class="audio-row"><span>🎵</span><audio src="${esc(m.url)}" controls></audio></div>`; });
    mediaHtml += `</div>`;
  }

  const canDel = isAdmin || (currentUser && currentUser.uid === data.authorId);
  card.innerHTML = `
    ${canDel ? `<div class="post-options-wrap"><button class="post-options-btn" onclick="togglePostMenu(event,'${postId}')">⋮</button><div class="post-options-menu" id="pmenu-${postId}"><button class="opt-delete" onclick="closePostMenu('${postId}');deletePost('${postId}',this)">🗑️ Elimina</button></div></div>` : ''}
    ${mediaHtml}
    ${data.text ? `<div class="polaroid-text">${esc(data.text)}</div>` : ''}
    <div class="polaroid-footer">
      <span class="polaroid-autore" data-uid="${esc(data.authorId||'')}">${esc(data.authorName||'')}</span>
      <span class="polaroid-data">${fmtDate(data.timestamp)}</span>
    </div>`;

  // Lightbox su click immagini
  card.querySelectorAll('[data-lightbox]').forEach(img => img.addEventListener('click', () => openLightbox(img.dataset.lightbox)));

  // Fallback nome asincrono
  const nomeEl = card.querySelector('.polaroid-autore');
  if (nomeEl && !nomeEl.textContent.trim() && data.authorId) {
    risolviNome(data.authorId).then(n => { if (n) nomeEl.textContent = n; });
  }

  // Reactions
  const reactWrap = document.createElement('div');
  reactWrap.className = 'post-reactions-wrap';
  reactWrap.innerHTML = EMOJIS.map(emoji => {
    const cnt = (data.reactions || {})[emoji] || 0;
    return `<button class="reaction-btn" data-emoji="${emoji}" onclick="toggleReaction('${postId}','${emoji}',this)">${emoji}${cnt > 0 ? ' <span>' + cnt + '</span>' : ''}</button>`;
  }).join('');

  // Commenta link
  const commLink = document.createElement('div');
  const commCnt = data.commentsCount || 0;
  commLink.innerHTML = `<button class="btn-comments" onclick="toggleComments('${postId}')">💬 ${commCnt > 0 ? commCnt + ' commenti' : 'Commenta'}</button>`;

  // Commenti section
  const commSec = document.createElement('div');
  commSec.className = 'comments-section';
  commSec.id = `cs-${postId}`;
  commSec.style.cssText = 'width:100%;max-width:340px;';

  wrap.appendChild(card);
  wrap.appendChild(reactWrap);
  wrap.appendChild(commLink);
  wrap.appendChild(commSec);

  if (currentUser) applyMyPostReactions(postId, reactWrap);

  return wrap;
}

async function applyMyPostReactions(postId, reactWrap) {
  if (!myPostReactions.has(postId)) {
    myPostReactions.set(postId, new Set());
    try {
      const uSnap = await getDoc(doc(db, COLL, postId, 'user_reactions', currentUser.uid));
      myPostReactions.set(postId, new Set(uSnap.exists() ? (uSnap.data().emojis || []) : []));
    } catch(_) {}
  }
  const mine = myPostReactions.get(postId);
  reactWrap.querySelectorAll('.reaction-btn').forEach(btn => {
    btn.classList.toggle('active', mine.has(btn.dataset.emoji));
  });
}

// ── Reactions ────────────────────────────────────────────────────────────────
window.toggleReaction = async (postId, emoji, btn) => {
  if (!currentUser) { alert('Accedi per reagire!'); return; }
  const pRef = doc(db, COLL, postId);
  const uRef = doc(db, COLL, postId, 'user_reactions', currentUser.uid);
  const wasActive = btn.classList.contains('active');
  btn.classList.toggle('active');
  adjCount(btn, wasActive ? -1 : 1);
  if (!myPostReactions.has(postId)) myPostReactions.set(postId, new Set());
  const mine = myPostReactions.get(postId);
  wasActive ? mine.delete(emoji) : mine.add(emoji);
  try {
    if (wasActive) {
      await updateDoc(pRef, { [`reactions.${emoji}`]: increment(-1) });
      await updateDoc(uRef, { emojis: arrayRemove(emoji) });
    } else {
      await updateDoc(pRef, { [`reactions.${emoji}`]: increment(1) });
      const uSnap = await getDoc(uRef);
      const { nome } = await getDatiAutore();
      uSnap.exists() ? await updateDoc(uRef, { emojis: arrayUnion(emoji), nome }) : await setDoc(uRef, { emojis: [emoji], nome });
      await aggiungiPunteggio(data?.authorId || '', 'reazione');
    }
  } catch(err) {
    btn.classList.toggle('active');
    adjCount(btn, wasActive ? 1 : -1);
    wasActive ? mine.add(emoji) : mine.delete(emoji);
  }
};

function adjCount(btn, delta) {
  let span = btn.querySelector('span');
  if (!span) { span = document.createElement('span'); btn.append(' ', span); span.textContent = '0'; }
  const next = parseInt(span.textContent || '0') + delta;
  if (next <= 0) { const prev = span.previousSibling; if (prev?.nodeType === 3) btn.removeChild(prev); btn.removeChild(span); }
  else span.textContent = next;
}

// ── Delete ───────────────────────────────────────────────────────────────────
window.deletePost = async (postId, btn) => {
  if (!confirm('Eliminare questo post?')) return;
  try {
    await deleteDoc(doc(db, COLL, postId));
    btn.closest('[data-post-id]')?.remove();
  } catch(err) { alert(err.message); }
};

window.togglePostMenu = (e, postId) => {
  e.stopPropagation();
  const menu = document.getElementById(`pmenu-${postId}`);
  if (!menu) return;
  const wasOpen = menu.classList.contains('open');
  document.querySelectorAll('.post-options-menu.open').forEach(m => m.classList.remove('open'));
  if (!wasOpen) menu.classList.add('open');
};
window.closePostMenu = postId => { document.getElementById(`pmenu-${postId}`)?.classList.remove('open'); };
document.addEventListener('click', () => document.querySelectorAll('.post-options-menu.open').forEach(m => m.classList.remove('open')));

// ── Comments ─────────────────────────────────────────────────────────────────
const loadedCs = new Set();
window.toggleComments = async postId => {
  const sec = document.getElementById(`cs-${postId}`);
  if (!sec) return;
  const open = sec.classList.toggle('open');
  if (open && !loadedCs.has(postId)) { loadedCs.add(postId); loadComments(postId, sec); }
};

function loadComments(postId, sec) {
  sec.innerHTML = '<div style="color:#aaa;font-size:0.8rem;padding:4px 0">Caricamento…</div>';
  const q = query(collection(db, COLL, postId, 'comments'), orderBy('timestamp', 'asc'));
  onSnapshot(q, snap => {
    const list = document.createElement('div');
    list.className = 'comment-list';
    snap.forEach(d => list.appendChild(buildCommentEl(postId, d.id, d.data())));
    const existing = sec.querySelector('.comment-input-wrap');
    sec.innerHTML = '';
    sec.appendChild(list);
    sec.appendChild(existing || buildCommentInput(postId));
  }, err => { sec.innerHTML = `<p style="color:red;font-size:0.8rem">${err.message}</p>`; });
}

function buildCommentEl(postId, commentId, data) {
  const el = document.createElement('div');
  el.className = 'comment-item';
  const avatar = data.authorPhoto ? `<div class="comment-avatar"><img src="${esc(data.authorPhoto)}" alt=""></div>` : `<div class="comment-avatar">⚓</div>`;
  const crKey = `${postId}:${commentId}`;
  const myCR = myCommentReactions.get(crKey) || new Set();
  const reactHtml = EMOJIS.map(emoji => {
    const cnt = (data.reactions || {})[emoji] || 0;
    const active = myCR.has(emoji) ? ' active' : '';
    return `<button class="comment-reaction-btn${active}" data-emoji="${emoji}" data-cnt="${cnt}" onclick="toggleCR('${postId}','${commentId}','${emoji}',this)">${emoji}${cnt > 0 ? ' '+cnt : ''}</button>`;
  }).join('');
  const canDel = isAdmin || (currentUser && currentUser.uid === data.authorId);
  el.innerHTML = `${avatar}<div class="comment-bubble"><div class="comment-autore">${esc(data.authorName||'Naufrago')}</div>${data.text?`<div class="comment-text">${data.tono?`<span style="margin-right:3px">${data.tono}</span>`:''}${esc(data.text)}</div>`:''}<div class="comment-reactions">${reactHtml}</div><div class="comment-data">${fmtDate(data.timestamp)}${canDel?` <button onclick="deleteComment('${postId}','${commentId}',this)" style="margin-left:8px;background:none;border:none;cursor:pointer;font-size:0.72rem;color:#ccc;">✕</button>`:''}</div></div>`;
  return el;
}

window.toggleCR = async (postId, commentId, emoji, btn) => {
  if (!currentUser) { alert('Accedi per reagire!'); return; }
  const ref = doc(db, COLL, postId, 'comments', commentId);
  const crKey = `${postId}:${commentId}`;
  if (!myCommentReactions.has(crKey)) myCommentReactions.set(crKey, new Set());
  const myCR = myCommentReactions.get(crKey);
  const wasActive = btn.classList.contains('active');
  const cur = parseInt(btn.dataset.cnt || '0');
  const next = Math.max(0, cur + (wasActive ? -1 : 1));
  btn.classList.toggle('active'); btn.dataset.cnt = next;
  btn.textContent = emoji + (next > 0 ? ' ' + next : '');
  wasActive ? myCR.delete(emoji) : myCR.add(emoji);
  try { await updateDoc(ref, { [`reactions.${emoji}`]: increment(wasActive ? -1 : 1) }); }
  catch(err) {
    btn.classList.toggle('active'); btn.dataset.cnt = cur;
    btn.textContent = emoji + (cur > 0 ? ' ' + cur : '');
    wasActive ? myCR.add(emoji) : myCR.delete(emoji);
  }
};

window.deleteComment = async (postId, commentId, btn) => {
  if (!confirm('Eliminare commento?')) return;
  try {
    await deleteDoc(doc(db, COLL, postId, 'comments', commentId));
    await updateDoc(doc(db, COLL, postId), { commentsCount: increment(-1) });
    btn.closest('.comment-item')?.remove();
  } catch(err) { alert(err.message); }
};

function buildCommentInput(postId) {
  const cItems = [];
  const previewId = `cprev-${postId}-${Date.now()}`;
  let cRec = null, cAudioChunks = [], cRecording = false;

  const wrap = document.createElement('div');
  wrap.className = 'comment-input-wrap';
  wrap.innerHTML = `
    <div class="comment-input-inner">
      <textarea class="comment-textarea" placeholder="Scrivi un commento…" rows="1"></textarea>
      <div class="comment-media-btns">
        <label class="comment-media-btn">📷<input type="file" accept="image/*" multiple style="display:none" class="ci-foto"></label>
        <label class="comment-media-btn btn-camera">📸<input type="file" accept="image/*" capture="environment" style="display:none" class="ci-foto-cam"></label>
        <label class="comment-media-btn">🎬<input type="file" accept="video/*" style="display:none" class="ci-vid"></label>
        <button class="comment-media-btn ci-rec">🎙️</button>
        <label class="comment-media-btn">🎵<input type="file" accept="audio/*,.mp3,.m4a,.wav,.ogg" multiple style="display:none" class="ci-aud"></label>
      </div>
      <div id="${previewId}"></div>
    </div>
    <button class="comment-send-btn">Invia</button>`;

  const textarea = wrap.querySelector('.comment-textarea');
  const recBtn = wrap.querySelector('.ci-rec');
  const sendBtn = wrap.querySelector('.comment-send-btn');
  const inner = wrap.querySelector('.comment-input-inner');

  const TONI = ['😊','😂','😢','😡','😍','🤔','😎','🥺','🙏','❤️'];
  let selectedTono = '';
  const picker = document.createElement('div');
  picker.className = 'tono-picker';
  TONI.forEach(t => {
    const b = document.createElement('button'); b.type='button'; b.className='tono-btn'; b.textContent = t;
    b.addEventListener('click', () => {
      const same = b.classList.contains('selected');
      picker.querySelectorAll('.tono-btn').forEach(x => x.classList.remove('selected'));
      selectedTono = same ? '' : t;
      if (!same) b.classList.add('selected');
    });
    picker.appendChild(b);
  });
  inner.insertBefore(picker, inner.firstChild);

  textarea.addEventListener('input', () => { textarea.style.height='auto'; textarea.style.height=textarea.scrollHeight+'px'; });

  function refreshCPreview() {
    renderPreview(cItems, previewId, i => {
      URL.revokeObjectURL(cItems[i].previewUrl);
      cItems.splice(i, 1);
      refreshCPreview();
    });
  }
  function cAddFile(f, type) {
    if (cItems.length >= MAX_FILES) return;
    cItems.push({ file:f, type, name:f.name||type, previewUrl:URL.createObjectURL(f) });
    refreshCPreview();
  }

  wrap.querySelector('.ci-foto').addEventListener('change', e => { Array.from(e.target.files).forEach(f=>cAddFile(f,'image')); e.target.value=''; });
  wrap.querySelector('.ci-foto-cam').addEventListener('change', e => { Array.from(e.target.files).forEach(f=>cAddFile(f,'image')); e.target.value=''; });
  wrap.querySelector('.ci-vid').addEventListener('change', e => { Array.from(e.target.files).forEach(f=>cAddFile(f,'video')); e.target.value=''; });
  wrap.querySelector('.ci-aud').addEventListener('change', e => { Array.from(e.target.files).forEach(f=>cAddFile(f,'audio')); e.target.value=''; });

  recBtn.addEventListener('click', async () => {
    if (cRecording) { cRec.stop(); cRecording=false; recBtn.textContent='🎙️'; recBtn.classList.remove('recording'); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      cAudioChunks = [];
      const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
      cRec = new MediaRecorder(stream, { mimeType });
      cRec.ondataavailable = e => cAudioChunks.push(e.data);
      cRec.onstop = () => { const ext=mimeType.includes('mp4')?'mp4':'webm'; cAddFile(new File([new Blob(cAudioChunks,{type:mimeType})],`rec_${Date.now()}.${ext}`,{type:mimeType}),'audio'); stream.getTracks().forEach(t=>t.stop()); };
      cRec.start(); cRecording=true; recBtn.textContent='⏹️'; recBtn.classList.add('recording');
    } catch(err) { alert('Microfono non disponibile'); }
  });

  sendBtn.addEventListener('click', async () => {
    if (!currentUser) { alert('Accedi!'); return; }
    const text = textarea.value.trim();
    if (!text && cItems.length === 0) return;
    const tono = selectedTono; selectedTono='';
    picker.querySelectorAll('.tono-btn').forEach(b=>b.classList.remove('selected'));
    sendBtn.disabled=true; sendBtn.textContent='…';
    try {
      const snapshot = [...cItems];
      const media = snapshot.length ? await Promise.all(snapshot.map(item => uploadOne(item.file,item.type).then(url=>({url,type:item.type,name:item.name})))) : [];
      const { nome, foto } = await getDatiAutore();
      await addDoc(collection(db, COLL, postId, 'comments'), { authorId:currentUser.uid, authorName:nome, authorPhoto:foto, text, tono, media, timestamp:serverTimestamp(), reactions:{} });
      await updateDoc(doc(db, COLL, postId), { commentsCount: increment(1) });
      await aggiungiPunteggio(currentUser.uid, 'commento');
      textarea.value=''; textarea.style.height='auto';
      cItems.forEach(i=>URL.revokeObjectURL(i.previewUrl)); cItems.length=0;
      renderPreview([],previewId,()=>{});
      const footerBtn = wrap.closest('[data-post-id]')?.querySelector('.btn-comments');
      if (footerBtn) { const cur=parseInt(footerBtn.textContent.match(/\d+/)?.[0]||'0'); footerBtn.textContent=`💬 ${cur+1} commenti`; }
    } catch(err) { alert('Errore: '+err.message); }
    finally { sendBtn.disabled=false; sendBtn.textContent='Invia'; }
  });

  return wrap;
}
