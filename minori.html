<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ragazzi – Campo dei Fiori</title>
  <meta name="theme-color" content="#e07b39">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f5f5f5; padding-bottom: 70px; }

    .top-header {
      background: #e07b39; color: #fff;
      display: flex; align-items: center;
      padding: 0 1rem; height: 56px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .back-btn {
      background: none; border: none; color: #fff;
      font-size: 1.3rem; cursor: pointer; padding: 0 10px 0 0;
      text-decoration: none;
    }
    .top-header h1 { font-size: 1.1rem; font-weight: 800; flex: 1; }
    .top-header .subtitle { font-size: 0.78rem; opacity: 0.85; }

    /* GRIGLIA 2 COLONNE */
    .list-minori {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 2px;
    }
    @media (min-width: 769px) {
      .list-minori { grid-template-columns: 1fr 1fr 1fr; gap: 3px; padding: 3px; }
    }

    .card-minore {
      background: #fff;
      text-decoration: none; color: #222;
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: opacity 0.15s;
    }
    .card-minore:hover { opacity: 0.88; }

    .card-foto {
      width: 100%; aspect-ratio: 1 / 1;
      overflow: hidden; background: #e8f4e0;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }
    .card-foto img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top center; display: block;
    }
    .card-nome {
      padding: 8px 10px 10px; background: #fff;
      font-size: 0.88rem; font-weight: 700; color: #222;
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 62px; background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex; align-items: stretch; z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.07);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-decoration: none; color: #999;
      font-size: 0.62rem; font-weight: 600; gap: 2px;
    }
    .nav-item.active { color: #e07b39; }
    .nav-item .nav-icon { font-size: 1.3rem; line-height: 1; }

    .spinner {
      width: 34px; height: 34px;
      border: 3px solid #eee; border-top-color: #5a8a4a;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin: 2rem auto; grid-column: 1/-1;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-msg { color: #aaa; text-align: center; padding: 2rem; grid-column: 1/-1; }
  </style>
</head>
<body>

  <header class="top-header">
    <a href="comunita.html" class="back-btn">←</a>
    <div style="flex:1">
      <div id="comunita-title" style="font-size:1.1rem;font-weight:800">Caricamento…</div>
      <div class="subtitle" id="page-subtitle"></div>
    </div>
    <div id="nav-auth-slot"></div>
  </header>

  <div id="list-minori" class="list-minori">
    <div class="spinner"></div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
    <a href="comunita.html" class="nav-item"><span class="nav-icon">🏡</span>Comunità</a>
    <a href="ragazzi.html" class="nav-item active"><span class="nav-icon">🧒</span>Ragazzi</a>
    <a href="staff.html" class="nav-item"><span class="nav-icon">🤡</span>Staff</a>
    <a href="#" class="nav-item"><span class="nav-icon">📋</span>Progetti</a>
    <a href="giornale.html" class="nav-item"><span class="nav-icon">📰</span>Giornale</a>
  </nav>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { setupNavAuth } from './js/nav-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyC18lzwqhYcW29TsEO6Oy4Bqvb2PMBUmAg",
      authDomain: "campo-dei-fiori.firebaseapp.com",
      projectId: "campo-dei-fiori",
      storageBucket: "campo-dei-fiori.firebasestorage.app",
      messagingSenderId: "928976798756",
      appId: "1:928976798756:web:1b90027ec9f03b203e44b1"
    };
    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    setupNavAuth();

    const params     = new URLSearchParams(location.search);
    const comunitaId = params.get('comunita');
    const list       = document.getElementById('list-minori');

    async function init() {
      if (!comunitaId) { list.innerHTML = '<p class="empty-msg">Comunità non specificata.</p>'; return; }

      try {
        const snap = await getDoc(doc(db, 'comunita', comunitaId));
        if (snap.exists()) {
          document.getElementById('comunita-title').textContent = snap.data().nomeComunita;
          document.getElementById('page-subtitle').textContent  = snap.data().descrizione || '';
        }
      } catch (_) {}

      try {
        const snap = await getDocs(query(
          collection(db, 'utenti'),
          where('comunitaId', '==', comunitaId)
        ));
        list.innerHTML = '';
        if (snap.empty) { list.innerHTML = '<p class="empty-msg">Nessun ragazzo/a in questa comunità.</p>'; return; }
        snap.forEach(d => {
          const data = d.data();
          const fotoHtml = data.fotoProfilo
            ? `<img src="${data.fotoProfilo}" alt="${data.nome}" loading="lazy">`
            : '🧒';
          list.innerHTML += `
            <a class="card-minore" href="profilo.html?uid=${d.id}">
              <div class="card-foto">${fotoHtml}</div>
              <div class="card-nome">${data.nome || '—'}</div>
            </a>`;
        });
      } catch (e) {
        list.innerHTML = `<p class="empty-msg">Errore: ${e.message}</p>`;
      }
    }

    init();
  </script>
</body>
</html>
