<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campo dei Fiori Nola</title>
  <meta name="description" content="Un posto dove ogni storia merita di essere raccontata e custodita">
  <meta name="theme-color" content="#1a2e1a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a2e1a; font-family: 'Nunito', sans-serif; }

    .cover {
      display: block;
      width: 100vw;
      height: 100vh;
      background: center center / cover no-repeat;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .cover { background-image: url('https://res.cloudinary.com/dxqyprtzh/image/upload/v1780146302/logo_camp_app_cellulare_txohak.png'); }
    }
    @media (min-width: 769px) {
      .cover { background-image: url('https://res.cloudinary.com/dxqyprtzh/image/upload/v1780146911/logo_campo_sito_web_ed52gm.png'); }
    }

    /* Auth slot in alto a destra */
    .index-nav {
      position: fixed;
      top: 0; right: 0;
      padding: 12px 16px;
      z-index: 200;
    }

    /* ---- DESKTOP: top nav orizzontale ---- */
    .top-nav-desktop {
      display: none;
    }
    @media (min-width: 769px) {
      .top-nav-desktop {
        display: flex;
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 150;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(8px);
        align-items: center;
        padding: 0 24px;
        height: 52px;
        gap: 4px;
      }
      .top-nav-desktop .brand {
        font-size: 0.92rem;
        font-weight: 800;
        color: #fff;
        text-decoration: none;
        margin-right: 24px;
        opacity: 0.9;
        white-space: nowrap;
      }
      .top-nav-desktop a {
        color: rgba(255,255,255,0.82);
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: 700;
        padding: 6px 14px;
        border-radius: 20px;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
      }
      .top-nav-desktop a:hover {
        background: rgba(255,255,255,0.15);
        color: #fff;
      }
      .top-nav-desktop .spacer { flex: 1; }
    }

    /* ---- MOBILE: bottom nav fissa ---- */
    .bottom-nav-mobile {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 62px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex;
      align-items: stretch;
      z-index: 150;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
    }
    .bottom-nav-mobile .nav-item {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-decoration: none;
      color: #999;
      font-size: 0.62rem;
      font-weight: 700;
      gap: 2px;
    }
    .bottom-nav-mobile .nav-item .nav-icon { font-size: 1.3rem; line-height: 1; }
    @media (min-width: 769px) {
      .bottom-nav-mobile { display: none; }
    }
  </style>
</head>
<body>

  <a class="cover" href="comunita.html" aria-label="Entra nel mondo di Campo dei Fiori"></a>

  <!-- DESKTOP: barra in cima -->
  <nav class="top-nav-desktop">
    <a href="index.html" class="brand">🌸 Campo dei Fiori</a>
    <a href="comunita.html">🏡 Comunità</a>
    <a href="ragazzi.html">🧒 Ragazzi</a>
    <a href="staff.html">🤡 Staff</a>
    <a href="#">📋 Progetti</a>
    <a href="giornale.html">📰 Giornale</a>
    <div class="spacer"></div>
    <div id="nav-auth-slot-desktop" style="display:flex;align-items:center"></div>
  </nav>

  <!-- Auth su mobile (in alto a destra) -->
  <div class="index-nav">
    <div id="nav-auth-slot"></div>
  </div>

  <!-- MOBILE: bottom nav -->
  <nav class="bottom-nav-mobile">
    <a href="comunita.html" class="nav-item"><span class="nav-icon">🏡</span>Comunità</a>
    <a href="ragazzi.html" class="nav-item"><span class="nav-icon">🧒</span>Ragazzi</a>
    <a href="staff.html" class="nav-item"><span class="nav-icon">🤡</span>Staff</a>
    <a href="#" class="nav-item"><span class="nav-icon">📋</span>Progetti</a>
    <a href="giornale.html" class="nav-item"><span class="nav-icon">📰</span>Giornale</a>
  </nav>

  <script type="module">
    import { setupNavAuth } from './js/nav-auth.js';
    const isMobile = window.innerWidth < 769;
    setupNavAuth(isMobile ? 'nav-auth-slot' : 'nav-auth-slot-desktop');
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
