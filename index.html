<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campo dei Fiori Nola</title>
  <meta name="description" content="La comunità residenziale per minori di Campo dei Fiori">
  <meta name="theme-color" content="#5a8a4a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    .cover {
      display: block;
      width: 100%;
      height: 100vh;
      background: url('https://res.cloudinary.com/dxqyprtzh/image/upload/v1780144964/logo_campo_app_fa5nbj.png') center center / cover no-repeat;
      cursor: pointer;
    }

    /* Desktop: ancora in alto per mostrare volto e scritta */
    @media (min-width: 768px) {
      .cover {
        background-position: center top;
      }
    }
  </style>
</head>
<body>
  <a class="cover" href="comunita.html" aria-label="Entra nel mondo di Campo dei Fiori"></a>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
