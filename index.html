<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="La comunità residenziale per minori di Campo dei Fiori">
  <meta name="theme-color" content="#5a8a4a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero {
      background: url('https://res.cloudinary.com/dxqyprtzh/image/upload/v1780138623/le_scelte_qd4la3.png') center center / cover no-repeat;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }
    .hero > * { position: relative; z-index: 1; }
    .hero h1 { text-shadow: 0 2px 12px rgba(0,0,0,0.6); }
    .hero p  { text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-logo">🌸</div>
    <h1>Campo dei Fiori Nola</h1>
    <p>Un posto dove ogni storia merita di essere raccontata</p>
    <a href="comunita.html" class="btn-hero">Entra</a>
  </section>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
