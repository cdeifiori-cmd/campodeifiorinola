<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campo dei Fiori Nola</title>
  <meta name="description" content="La comunità residenziale per minori di Campo dei Fiori">
  <meta name="theme-color" content="#1a2e1a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a2e1a; }

    .cover {
      display: block;
      width: 100vw;
      height: 100vh;
      background: center center / cover no-repeat;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .cover {
        background-image: url('https://res.cloudinary.com/dxqyprtzh/image/upload/v1780146302/logo_camp_app_cellulare_txohak.png');
      }
    }

    @media (min-width: 769px) {
      .cover {
        background-image: url('https://res.cloudinary.com/dxqyprtzh/image/upload/v1780146911/logo_campo_sito_web_ed52gm.png');
      }
    }

    .index-nav {
      position: fixed;
      top: 0; right: 0;
      padding: 12px 16px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <a class="cover" href="comunita.html" aria-label="Entra nel mondo di Campo dei Fiori"></a>

  <div class="index-nav">
    <div id="nav-auth-slot"></div>
  </div>

  <script type="module">
    import { setupNavAuth } from './js/nav-auth.js';
    setupNavAuth();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
